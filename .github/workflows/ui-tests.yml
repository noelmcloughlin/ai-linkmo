name: UI Tests

on:
  push:
    branches: [main]
    paths:
      - "lib/frontend/**"
      - ".github/workflows/ui-tests.yml"
  pull_request:
    paths:
      - "lib/frontend/**"
      - ".github/workflows/ui-tests.yml"
  workflow_dispatch:

concurrency:
  group: ui-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: lib/frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: lib/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (svelte-check)
        run: npm run check

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit + browser tests
        run: npm test

      - name: Production build
        run: npm run build
