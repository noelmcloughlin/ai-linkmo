  - id: AIR-SEC-009
    name: Data Poisoning
    description: >-
      Data poisoning occurs when adversaries tamper with training or fine-tuning
      data to manipulate an AI model’s behaviour, often by injecting misleading
      or malicious patterns. This can lead to biased decision-making, such as incorrectly
      approving fraudulent transactions or degrading model performance in subtle
      ways. The risk is heightened in systems that continuously learn from unvalidated
      or third-party data, with impacts that may remain hidden until a major failure
      occurs.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
