  - id: AIR-PREV-012
    name: Role-Based Access Control for AI Data
    description: >-
      Role-Based Access Control (RBAC) is a fundamental security mechanism designed
      to ensure that users, AI models, and other systems are granted access only
      to the specific data assets and functionalities necessary to perform their
      authorized tasks. Within the context of AI systems in a financial institution,
      RBAC is critical for protecting the confidentiality, integrity, and availability
      of data used throughout the AI lifecycle – from data sourcing and preparation
      to model training, validation, deployment, and operation. This control ensures
      that access to sensitive information is strictly managed based on defined
      roles and responsibilities.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
