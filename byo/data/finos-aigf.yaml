      - si-4
      - at-2
      - ca-2
      - eu-ai-act-c3-s2-a14
      - eu-ai-act-c9-s1-a72
    type: RiskControl
    detectsRiskConcept:
      - AIR-OP-005
      - AIR-OP-006
      - AIR-OP-014
      - AIR-OP-016
      - AIR-OP-020
    dateCreated: '2026-06-25'

  - id: AIR-DET-013
    name: Providing Citations and Source Traceability for AI-Generated
      Information
    description: >-
      This control outlines the practice of designing Artificial Intelligence (AI)
      systems—particularly Large Language Models (LLMs) and Retrieval Augmented
      Generation (RAG) systems that produce informational content to provide verifiable
      citations, references, or traceable links back to the original source data
      or knowledge used to formulate their outputs.
    isDefinedByTaxonomy: finos-aigf
