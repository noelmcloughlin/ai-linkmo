  - id: AIR-RC-022
    name: Regulatory Compliance and Oversight
    description: >-
      AI systems in financial services must comply with the same regulatory standards
      as human-driven processes, including those related to suitability, fairness,
      record-keeping, and marketing conduct. Failure to supervise or govern AI tools
      properly can lead to non-compliance, particularly in areas like financial
      advice, credit decisions, or trading. As regulations evolve—such as the upcoming
      EU AI Act—firms face increasing obligations to ensure AI transparency, accountability,
      and risk management, with non-compliance carrying potential fines or legal
      consequences.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-rc
    hasDocumentation:
