  - id: AIR-PREV-019
    name: Tool Chain Validation and Sanitization
    description: >-
      Tool Chain Validation and Sanitization implements comprehensive validation
      mechanisms for agent tool selection decisions, API parameter sanitization,
      and safe tool execution sequences. This preventive control ensures that agents
      cannot be manipulated into selecting inappropriate tools, injecting malicious
      parameters into API calls, or executing dangerous tool combinations that could
      result in unauthorized actions or system compromise.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
