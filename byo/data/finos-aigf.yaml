  - id: AIR-OP-017
    name: Lack of Explainability
    description: >-
      AI systems, particularly those using complex foundation models, often lack
      transparency, making it difficult to interpret how decisions are made. This
      limits firms’ ability to explain outcomes to regulators, stakeholders, or
      customers, raising trust and compliance concerns. Without explainability,
      errors and biases can go undetected, increasing the risk of inappropriate
      use, regulatory scrutiny, and undiagnosed failures.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
