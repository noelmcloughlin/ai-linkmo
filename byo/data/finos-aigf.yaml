  - id: AIR-PREV-020
    name: MCP Server Security Governance
    description: >-
      MCP Server Security Governance establishes comprehensive security controls
      for Model Context Protocol servers including supply chain verification, secure
      communication channels, data integrity validation, and continuous monitoring.
      This preventive control ensures that MCP servers providing specialized capabilities
      to agentic AI systems maintain appropriate security standards and cannot be
      used as vectors for systematic compromise of agent decision-making.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
