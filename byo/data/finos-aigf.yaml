  - id: AIR-PREV-008
    name: Quality of Service (QoS) and DDoS Prevention for AI Systems
    description: >-
      The increasing integration of Artificial Intelligence (AI) into financial
      applications, particularly through Generative AI, Retrieval Augmented Generation
      (RAG), and Agentic workflows, introduces significant operational risks. These
      include potential disruptions in service availability, degradation of performance,
      and inequities in service delivery. This control addresses the critical need
      to ensure Quality of Service (QoS) and implement robust Distributed Denial
      of Service (DDoS) prevention measures for AI systems.
    isDefinedByTaxonomy: finos-aigf
