      - AIR-RC-022
    dateCreated: '2026-06-25'

  - id: AIR-DET-015
    name: Using Large Language Models for Automated Evaluation
      (LLM-as-a-Judge)
    description: >-
      "LLM-as-a-Judge" (also referred to as LLM-based evaluation) is an emerging
      detective technique where one Large Language Model (the "judge" or "evaluator
      LLM") is employed to automatically assess the quality, safety, accuracy, adherence
      to guidelines, or other specific characteristics of outputs generated by another
      (primary) AI system, typically also an LLM.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-det
    hasDocumentation:
