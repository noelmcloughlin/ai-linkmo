    description: 'FINOS financial data sensitivity tier: High.'
    type: Term
    isDefinedByVocabulary: finos-data-sensitivity-tiers
    dateCreated: '2026-06-25'

  - id: data-classification-customer-pii-data
    name: Customer PII Data
    description: >-
      FINOS data classification (sensitivity: High). Non-public personal information
      (NPI) about consumers obtained in the course of providing financial services.
      Covers identity, contact, and account-level information as defined under GLBA.
      Storage location: Encrypted storage, access-controlled systems. Regulations:
      GLBA, GDPR, CCPA. Examples: Customer names, addresses, and contact details;
      Account numbers and financial history; Credit application data and income
      declarations; Long-term relationship and preference profiles.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-high
    dateCreated: '2026-06-25'

  - id: jurisdiction-us
    name: United States
    description: 'FINOS jurisdiction: United States (US).'
    type: Term
    isDefinedByVocabulary: finos-jurisdictions
    dateCreated: '2026-06-25'

  - id: jurisdiction-eu
    name: European Union
    description: 'FINOS jurisdiction: European Union (EU).'
    type: Term
    isDefinedByVocabulary: finos-jurisdictions
    dateCreated: '2026-06-25'

  - id: jurisdiction-international
    name: International
    description: 'FINOS jurisdiction: International (International).'
    type: Term
    isDefinedByVocabulary: finos-jurisdictions
    dateCreated: '2026-06-25'

  - id: data-classification-sensitive-financial-data
    name: Sensitive Financial Data
    description: >-
      FINOS data classification (sensitivity: High). Detailed financial data about
      individuals or entities that reveals sensitive business operations, transaction
      behaviour, or financial position. Subject to multiple financial privacy regulations.
      Data that should be handle with care and only used for specific purposes,  such
      as model training or risk assessment, with appropriate safeguards in place.
      Storage location: Encrypted storage, access-controlled systems. Regulations:
      GLBA, PSD2, GDPR, CCPA, MiFID II. Examples: Individual transaction records
      and payment history; Account balances and investment holdings; Credit scores
      (input and model-generated); Investment Policy Statements and portfolio constraints.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-high
    dateCreated: '2026-06-25'

  - id: sensitivity-medium
    name: Medium sensitivity
    description: 'FINOS financial data sensitivity tier: Medium.'
    type: Term
    isDefinedByVocabulary: finos-data-sensitivity-tiers
    dateCreated: '2026-06-25'

  - id: data-classification-internal-proprietary-data
    name: Internal Proprietary Data
    description: >-
      FINOS data classification (sensitivity: Medium). Data generated or held within
      the organization, not intended for public release. Includes aggregated risk
      data, models, and internal policies. That provide an advantatage to AI model
      training and development,  but do not contain sensitive customer information.
      Storage location: Private cloud, internal servers. Regulations: SOX. Examples:
      Aggregated transaction data and internal metrics; Risk model parameters and
      lending policies; Stress test assumptions and scenario data; Internal performance
      and financial reporting.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-medium
    dateCreated: '2026-06-25'

  - id: sensitivity-critical
    name: Critical sensitivity
    description: 'FINOS financial data sensitivity tier: Critical.'
    type: Term
    isDefinedByVocabulary: finos-data-sensitivity-tiers
    dateCreated: '2026-06-25'

  - id: data-classification-phi-other-personal-data
    name: PHI Other Personal Data
    description: >-
      FINOS data classification (sensitivity: Critical). Personal data revealing
      health, biometric, racial or ethnic origin, genetic, or other highly sensitive
      characteristics linked to financial decisions. Subject to the most restrictive
      processing conditions under GDPR Art 9 and CCPA Sensitive PI — explicit consent
      or specific legal basis required. Storage location: Isolated encrypted systems,
      TEE recommended, strict access controls. Regulations: GDPR Art 9, CCPA Sensitive
      PI, HIPAA (if health-adjacent). Examples: Health events and medical conditions
      linked to financial decisions; Biometric identifiers used for authentication;
      Personal life events affecting risk profiles (disability, chronic illness);
      Racial or ethnic origin data arising in credit or insurance contexts.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-critical
    dateCreated: '2026-06-25'

  - id: sensitivity-low
    name: Low sensitivity
    description: 'FINOS financial data sensitivity tier: Low.'
    type: Term
    isDefinedByVocabulary: finos-data-sensitivity-tiers
    dateCreated: '2026-06-25'

  - id: data-classification-public-financial-data
    name: Public Financial Data
    description: >-
      FINOS data classification (sensitivity: Low). Data that is publicly available
      and poses minimal risk if disclosed. Storage location: Public cloud, CDN.
      Regulations: None specific. Examples: Published financial statements and annual
      reports; Public market prices and exchange rates; Regulatory filings and public
      disclosures.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-low
    dateCreated: '2026-06-25'

  - id: data-classification-confidential-financial-data
    name: Confidential Financial Data
    description: >-
      FINOS data classification (sensitivity: High). Data that contains sensitive
      financial information about the firm or its customers. Subject to strict access
      controls and regulatory protections. Storage location: Encrypted storage,
      access-controlled systems. Regulations: GLBA, GDPR, CCPA, BCBS 239. Examples:
      Customer account details and transaction history; Credit risk profiles and
      internal ratings; Proprietary trading strategies and model outputs; Internal
      audit findings and compliance reports.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-high
    dateCreated: '2026-06-25'

  - id: data-classification-restricted-financial-data
    name: Restricted Financial Data
    description: >-
      FINOS data classification (sensitivity: Critical). Data that is highly sensitive
      and whose compromise could lead to severe financial, operational, or reputational
      damage. Subject to the most stringent access controls and regulatory protections.
      Ment only for a small group of people in the organization, such as senior
      management, risk officers, and model developers. Storage location: High-security
      encrypted storage, isolated systems, HSM for keys. Regulations: PCI DSS, GLBA,
      Basel III/IV, SR 11-7. Examples: Payment card data (PAN) and cardholder information;
      Credentials and access tokens for financial systems; Proprietary trading algorithms
      and model IP; Encryption keys and cryptographic material.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-critical
    dateCreated: '2026-06-25'

  - id: data-classification-mnpi-data
    name: MNPI Data
    description: >-
      FINOS data classification (sensitivity: High). Material Non-Public Information
      (MNPI) about publicly traded companies or financial instruments. Subject to
      insider trading laws and strict confidentiality requirements under securities
      regulations. Storage location: Encrypted storage, access-controlled systems,
      strict need-to-know basis. Regulations: SEC Insider Trading Rules, EU Market
      Abuse Regulation (MAR). Examples: Unreleased earnings reports and financial
      forecasts; M&A activity and strategic initiatives; Significant contract wins
      or losses; Regulatory investigations or legal proceedings.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-high
    dateCreated: '2026-06-25'

  - id: data-classification-risk-aggregation-data
    name: Risk Aggregation Data
    description: >-
      FINOS data classification (sensitivity: High). Aggregated risk exposures and
      positions across the firm, subject to BCBS 239 principles for accuracy, completeness,
      timeliness, and adaptability. Distinct from individual customer data — this
      is firm-level risk intelligence requiring specific data lineage and governance
      controls. Storage location: Secure internal systems with full data lineage
      and audit trail. Regulations: BCBS 239, Basel III/IV, SR 11-7. Examples: Aggregated
      credit exposures and concentration data; Trading book positions and market
      risk metrics; Liquidity gaps and funding profiles; Stress test outputs and
      capital adequacy data.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-high
    dateCreated: '2026-06-25'

  - id: data-classification-critical-financial-data
    name: Critical Financial Data
    description: >-
      FINOS data classification (sensitivity: Critical). Data whose compromise could
      cause severe financial, operational, or reputational damage. Includes payment
      card data (PAN), credentials, and proprietary IP such as trading algorithms.
      Excludes Sensitive Authentication Data which must never be stored. Storage
      location: High-security encrypted storage, isolated systems, HSM for keys.
      Regulations: PCI DSS (CHD), GLBA, Basel III. Examples: Payment card numbers
      (PAN) and cardholder data; Banking credentials and access tokens; Proprietary
      trading algorithms and model IP; Encryption keys and cryptographic material.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-critical
    dateCreated: '2026-06-25'

  - id: data-classification-payment-authentication-data
    name: Payment Authentication Data
    description: >-
      FINOS data classification (sensitivity: Critical). Sensitive Authentication
      Data (SAD) as defined by PCI DSS. Must never be stored after payment authorisation
      is complete, without exception. Distinct from Cardholder Data — no compensating
      controls exist; post-authorisation storage is prohibited regardless of encryption.
      Storage location: Never stored post-authorisation — processing only, in-memory.
      Regulations: PCI DSS (SAD — never store rule). Examples: Full magnetic stripe
      data or chip equivalent; CVV2/CVC2/CID card verification values; PIN blocks
      and encrypted PINs; Full card credentials used in authorisation.
    type: Term
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - sensitivity-critical
    dateCreated: '2026-06-25'

