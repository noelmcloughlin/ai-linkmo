  - id: AIR-PREV-023
    name: Agentic System Credential Protection Framework
    description: >-
      The Agentic System Credential Protection Framework implements comprehensive
      security controls to prevent agents from discovering, accessing, or exfiltrating
      authentication credentials, API keys, secrets, and other sensitive authentication
      materials. This preventive control establishes credential isolation, secure
      credential injection mechanisms, behavioral monitoring, and zero-trust authentication
      architectures specifically designed to protect against agent-mediated credential
      harvesting while maintaining operational functionality for legitimate agent
      operations.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
