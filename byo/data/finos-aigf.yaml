  - id: AIR-SEC-010
    name: Prompt Injection
    description: >-
      Prompt injection occurs when attackers craft inputs that manipulate a language
      model into producing unintended, harmful, or unauthorized outputs. These attacks
      can be direct—overriding the model’s intended behaviour—or indirect, where
      malicious instructions are hidden in third-party content and later processed
      by the model. This threat can lead to misinformation, data leakage, reputational
      damage, or unsafe automated actions, especially in systems without strong
      safeguards or human oversight.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
