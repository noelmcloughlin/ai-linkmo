    dateCreated: '2026-06-25'

  - id: AIR-SEC-025
    name: Tool Chain Manipulation and Injection
    description: >-
      Malicious inputs manipulate agents into selecting inappropriate tools, executing
      dangerous API call sequences, or injecting malicious parameters into legitimate
      API calls. This extends beyond traditional prompt injection by targeting the
      agent's tool selection and execution logic, potentially causing financial
      transactions, data exposure, or system compromise through carefully crafted
      tool chain attacks.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
