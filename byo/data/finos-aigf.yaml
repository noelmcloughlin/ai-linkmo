      - AIR-DET-015
    dateCreated: '2026-06-25'

  - id: AIR-OP-020
    name: Reputational Risk
    description: >-
      AI failures or misuse—especially in customer-facing systems—can quickly escalate
      into public incidents that damage a firm’s reputation and erode trust. Inaccurate,
      offensive, or unfair outputs may lead to regulatory scrutiny, media backlash,
      or widespread customer dissatisfaction, particularly in high-stakes sectors
      like finance. Because AI systems can scale errors rapidly, firms must ensure
      robust oversight, as each AI-driven decision reflects directly on their brand
      and conduct.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
