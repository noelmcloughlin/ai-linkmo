  - id: AIR-SEC-024
    name: Agent Action Authorization Bypass
    description: >-
      Agent systems may bypass intended authorization controls and perform actions
      beyond their designated scope, potentially executing unauthorized financial
      transactions, accessing restricted data, or violating business logic constraints.
      This occurs when agents exploit API vulnerabilities, escalate privileges through
      tool chains, or circumvent approval workflows designed to maintain segregation
      of duties and regulatory compliance.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
      - finos-ai-governance-framework-site
