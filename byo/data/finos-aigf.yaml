  - id: AIR-DET-021
    name: Agent Decision Audit and Explainability
    description: >-
      Agent Decision Audit and Explainability implements comprehensive logging,
      documentation, and explainability mechanisms for agent decisions to support
      regulatory compliance, security incident investigation, and decision accountability.
      This detective control ensures that all agent actions, reasoning processes,
      and decision factors are captured in sufficient detail to meet regulatory
      requirements and enable effective forensic analysis when incidents occur.
