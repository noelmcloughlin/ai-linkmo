  - id: AIR-PREV-010
    name: AI Model Version Pinning
    description: >-
      Model Version Pinning is the deliberate practice of selecting and using a
      specific, fixed version of an Artificial Intelligence (AI) model within a
      production environment, rather than automatically adopting the latest available
      version. This is particularly crucial when utilizing externally sourced models,
      such as foundation models provided by third-party vendors. The primary goal
      of model version pinning is to ensure operational stability, maintain predictable
      AI system behavior, and enable a controlled, risk-managed approach to adopting
      model updates. This practice helps prevent unexpected disruptions, performance
      degradation, or the introduction of new vulnerabilities that might arise from
      unvetted changes in newer model versions.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
