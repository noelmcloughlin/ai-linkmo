entries:
  - id: AIR-RC-001
    name: Information Leaked To Hosted Model
    description: >-
      Using third-party hosted LLMs creates a two-way trust boundary where neither
      inputs nor outputs can be fully trusted. Sensitive financial data sent for
      inference may be memorized by models, leaked through prompt attacks, or exposed
      via inadequate provider controls. This risks exposing customer PII, proprietary
      algorithms, and confidential business information, particularly with free
      or poorly-governed LLM services.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-rc
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://ithandbook.ffiec.gov/
    related_mappings:
      - AIR-SEC-002
      - AIR-RC-023
      - nist-ai-600-1-2-4
      - nist-ai-600-1-2-9
      - eu-ai-act-c3-s2-a10
      - eu-ai-act-c3-s2-a13
      - eu-ai-act-c5-s2-a53
      - ffiec-itbook-sec-2
      - ffiec-itbook-sec-3
      - ffiec-itbook-ots-2
      - owasp-llm-top-10-2025-llm02-2025
    hasRelatedAction:
      - AIR-PREV-002
      - AIR-PREV-006
      - AIR-PREV-007
      - AIR-PREV-012
      - AIR-PREV-020
    isDetectedBy:
      - AIR-DET-001
      - AIR-DET-004
      - AIR-DET-015
    dateCreated: '2026-06-25'

  - id: AIR-SEC-002
    name: Information Leaked to Vector Store
    description: >-
      LLM applications pose data leakage risks not only through vector stores but
      across all components handling derived data, such as embeddings, prompt logs,
      and caches. These representations, while not directly human-readable, can
      still expose sensitive information via inversion or inference attacks, especially
      when security controls like access management, encryption, and auditing are
      lacking. To mitigate these risks, robust enterprise-grade security measures
      must be applied consistently across all parts of the LLM pipeline.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://platform.openai.com/docs/guides/embeddings
    related_mappings:
      - AIR-RC-001
      - AIR-SEC-009
      - nist-ai-600-1-2-4
      - nist-ai-600-1-2-9
      - eu-ai-act-c3-s2-a10
      - eu-ai-act-c3-s2-a15
      - eu-ai-act-c3-s3-a16
      - ffiec-itbook-sec-3
      - ffiec-itbook-sec-4
      - ffiec-itbook-aud-4
      - owasp-llm-top-10-2025-llm02-2025
      - owasp-llm-top-10-2025-llm08-2025
    hasRelatedAction:
      - AIR-PREV-006
      - AIR-PREV-014
    isDetectedBy:
      - AIR-DET-016
    dateCreated: '2026-06-25'

  - id: AIR-OP-004
    name: Hallucination and Inaccurate Outputs
    description: >-
      LLM hallucinations occur when a model generates confident but incorrect or
      fabricated information due to its reliance on statistical patterns rather
      than factual understanding. Techniques like Retrieval-Augmented Generation
      can reduce hallucinations by providing factual context, but they cannot fully
      prevent the model from introducing errors or mixing in inaccurate internal
      knowledge. As there is no guaranteed way to constrain outputs to verified
      facts, hallucinations remain a persistent and unresolved challenge in LLM
      applications.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://arxiv.org/abs/2305.14292
    related_mappings:
      - AIR-OP-014
      - AIR-OP-006
      - AIR-OP-019
      - nist-ai-600-1-2-2
      - nist-ai-600-1-2-8
      - eu-ai-act-c3-s2-a15
      - eu-ai-act-c3-s2-a13
      - eu-ai-act-c3-s2-a9
      - ffiec-itbook-dam-3
      - ffiec-itbook-aud-4
      - ffiec-itbook-mgt-2
      - owasp-llm-top-10-2025-llm09-2025
      - owasp-ml-top-10-2023-ml09-2023
    hasRelatedAction:
      - AIR-PREV-005
      - AIR-PREV-006
    isDetectedBy:
      - AIR-DET-013
      - AIR-DET-015
    dateCreated: '2026-06-25'

  - id: AIR-OP-005
    name: Foundation Model Versioning
    description: >-
      Foundation model instability refers to unpredictable changes in model behavior
      over time due to external factors like version updates, system prompt modifications,
      or provider changes. Unlike inherent non-determinism (ri-6), this instability
      stems from upstream modifications that alter the model's fundamental behavior
      patterns. Such variability can undermine testing, reliability, and trust when
      no version control or change notification mechanisms are in place.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://www.arxiv.org/abs/2408.14595
    related_mappings:
      - AIR-OP-007
      - AIR-SEC-008
      - nist-ai-600-1-2-8
      - eu-ai-act-c3-s2-a9
      - eu-ai-act-c3-s2-a15
      - eu-ai-act-c5-s2-a53
      - ffiec-itbook-ots-2
      - ffiec-itbook-dam-7
      - ffiec-itbook-aud-4
      - owasp-llm-top-10-2025-llm09-2025
      - owasp-ml-top-10-2023-ml07-2023
    hasRelatedAction:
      - AIR-PREV-005
      - AIR-PREV-010
    isDetectedBy:
      - AIR-DET-004
      - AIR-DET-011
      - AIR-DET-015
    dateCreated: '2026-06-25'

  - id: AIR-OP-006
    name: Non-Deterministic Behaviour
    description: >-
      LLMs exhibit non-deterministic behaviour, meaning they can generate different
      outputs for the same input due to probabilistic sampling and internal variability.
      This unpredictability can lead to inconsistent user experiences, undermine
      trust, and complicate testing, debugging, and performance evaluation. Inconsistent
      results may appear as varying answers to identical queries or fluctuating
      system performance across runs, posing significant challenges for reliable
      deployment and quality assurance.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://arxiv.org/abs/2308.02828
    related_mappings:
      - AIR-OP-004
      - AIR-OP-014
      - eu-ai-act-c3-s2-a9
      - eu-ai-act-c3-s2-a15
      - eu-ai-act-c3-s2-a14
      - ffiec-itbook-dam-3
      - ffiec-itbook-aud-4
      - owasp-llm-top-10-2025-llm09-2025
    hasRelatedAction:
      - AIR-PREV-005
      - AIR-PREV-010
    isDetectedBy:
      - AIR-DET-004
      - AIR-DET-011
      - AIR-DET-015
    dateCreated: '2026-06-25'

  - id: AIR-OP-007
    name: Availability of Foundational Model
    description: >-
      Foundation models often rely on GPU-heavy infrastructure hosted by third-party
      providers, introducing risks related to service availability and performance.
      Key threats include Denial of Wallet (excessive usage leading to cost spikes
      or throttling), outages from immature Technology Service Providers, and VRAM
      exhaustion due to memory leaks or configuration changes. These issues can
      disrupt operations, limit failover options, and undermine the reliability
      of LLM-based applications.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://www.prompt.security/blog/denial-of-wallet-on-genai-apps-ddow
    related_mappings:
      - AIR-OP-005
      - AIR-SEC-008
      - eu-ai-act-c3-s2-a15
      - eu-ai-act-c3-s3-a26
      - eu-ai-act-c5-s2-a53
      - ffiec-itbook-bcm-4
      - ffiec-itbook-bcm-5
      - ffiec-itbook-ots-2
      - ffiec-itbook-aio-6
      - owasp-llm-top-10-2025-llm10-2025
    hasRelatedAction:
      - AIR-PREV-003
      - AIR-PREV-008
      - AIR-PREV-017
    isDetectedBy:
      - AIR-DET-004
      - AIR-DET-009
    dateCreated: '2026-06-25'

  - id: AIR-SEC-008
    name: Tampering With the Foundational Model
    description: >-
      Foundational models provided by third-party SaaS vendors are vulnerable to
      supply chain risks, including tampering with training data, model weights,
      or infrastructure components such as GPU firmware and ML libraries. Malicious
      actors may introduce backdoors or adversarial triggers during training or
      fine-tuning, leading to unsafe or unfiltered behaviour under specific conditions.
      Without transparency or control over model provenance and update processes,
      consumers of these models are exposed to upstream compromises that can undermine
      system integrity and safety.
    type: Risk
