  - id: AIR-OP-016
    name: Bias and Discrimination
    description: >-
      AI systems can systematically disadvantage protected groups through biased
      training data, flawed design, or proxy variables that correlate with sensitive
      characteristics. In financial services, this manifests as discriminatory credit
      decisions, unfair fraud detection, or biased customer service, potentially
      violating fair lending laws and causing significant regulatory and reputational
      damage.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
