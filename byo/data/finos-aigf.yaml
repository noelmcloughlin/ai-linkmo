  - id: AIR-PREV-017
    name: AI Firewall Implementation and Management
    description: >-
      An AI Firewall is conceptualized as a specialized security system designed
      to protect Artificial Intelligence (AI) models and applications by inspecting,
      filtering, and controlling the data and interactions flowing to and from them.
      As AI, particularly Generative AI and agentic systems, becomes more integrated
      into critical workflows, it introduces novel risks that traditional security
      measures may not adequately address.
