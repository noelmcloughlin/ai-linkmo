controls:
  - id: AIR-DET-001
    name: AI Data Leakage Prevention and Detection
    description: >-
      Data Leakage Prevention and Detection (DLP&D) for Artificial Intelligence
      (AI) systems encompasses a combination of proactive measures to prevent sensitive
      data from unauthorized egress or exposure through these systems, and detective
      measures to identify such incidents promptly if they occur. This control is
      critical for safeguarding various types of information associated with AI,
      including:
       Session Data: Information exchanged during interactions with AI models (e.g.,
      user prompts, model responses, intermediate data).
       Training Data: Proprietary or sensitive datasets used to train or fine-tune
      AI models.
       Model Intellectual Property: The AI models themselves (weights, architecture)
      which represent significant intellectual property.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-det
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
      - AIR-PREV-002
      - AIR-DET-004
      - AIR-PREV-014
      - iso-42001-A-7-2
      - iso-42001-A-6-2-6
      - iso-42001-A-5-2
      - ac-4
      - ac-20
      - au-13
      - ca-3
      - ca-7
      - ir-4
      - ir-9
      - mp-6
      - sa-9
      - sc-7
      - sc-8
      - sc-28
      - si-4
      - si-20
    type: RiskControl
    detectsRiskConcept:
      - AIR-RC-001
    dateCreated: '2026-06-25'

  - id: AIR-DET-004
    name: AI System Observability
    description: >-
      AI System Observability encompasses the comprehensive collection, analysis,
      and monitoring of data about AI system behavior, performance, interactions,
      and outcomes. This control is essential for maintaining operational awareness,
      detecting anomalies, ensuring performance standards, and supporting incident
      response for AI-driven applications and services within a financial institution.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-det
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
