  - id: AIR-OP-018
    name: Model Overreach / Expanded Use
    description: >-
      Model overreach occurs when AI systems are used beyond their intended purpose,
      often due to overconfidence in their capabilities. This can lead to poor-quality,
      non-compliant, or misleading outputs, especially when users apply AI to high-stakes
      tasks without proper validation or oversight. Overreliance and misplaced trust
      (such as treating AI as a human expert) can result in operational errors and
      regulatory breaches.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
