  - id: AIR-PREV-014
    name: Encryption of AI Data at Rest
    description: >-
      Encryption of data at rest is a fundamental security control that involves
      transforming stored information into a cryptographically secured format using
      robust encryption algorithms. This process renders the data unintelligible
      and inaccessible to unauthorized parties unless they possess the corresponding
      decryption key. The primary objective is to protect the confidentiality and
      integrity of sensitive data associated with AI systems, even if the underlying
      storage medium (e.g., disks, servers, backup tapes) is physically or logically
      compromised. While considered a standard security practice across IT, its
      diligent application to all components of AI systems, including newer technologies
      like vector databases, is critical.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
