  - id: AIR-PREV-022
    name: Multi-Agent Isolation and Segmentation
    description: >-
      Multi-Agent Isolation and Segmentation implements comprehensive security boundaries
      between agents in multi-agent systems to prevent cross-agent compromise, limit
      blast radius of security incidents, and maintain appropriate trust boundaries.
      This preventive control ensures that compromise or malfunction of one agent
      cannot systematically affect other agents, protecting the integrity of complex
      multi-agent workflows in financial services.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
