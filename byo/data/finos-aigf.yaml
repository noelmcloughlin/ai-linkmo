  - id: AIR-RC-023
    name: Intellectual Property (IP) and Copyright
    description: >-
      Generative AI models may be trained on copyrighted or proprietary material,
      raising the risk that outputs could unintentionally infringe on intellectual
      property rights. In financial services, this could lead to legal liability
      if AI-generated content includes copyrighted text, code, or reveals sensitive
      business information. Additional risks arise when employees input confidential
      data into public AI tools, potentially leaking trade secrets or violating
      licensing terms.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-rc
    hasDocumentation:
