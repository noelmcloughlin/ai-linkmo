  - id: AIR-OP-014
    name: Inadequate System Alignment
    description: >-
      LLM-powered RAG systems may generate responses that diverge from their intended
      business purpose, producing outputs that appear relevant but contain inaccurate
      financial advice, biased recommendations, or inappropriate tone for the financial
      context. Misalignment often occurs when the LLM prioritizes response fluency
      over accuracy, fails to respect financial compliance constraints, or draws
      inappropriate conclusions from retrieved documents. This risk is particularly
      acute in financial services where confident-sounding but incorrect responses
      can lead to regulatory violations or customer harm.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
