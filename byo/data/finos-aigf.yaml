      - AIR-DET-021
    dateCreated: '2026-06-25'

  - id: AIR-SEC-026
    name: MCP Server Supply Chain Compromise
    description: >-
      Compromised or malicious Model Context Protocol (MCP) servers provide tainted
      data, capabilities, or execution environments to agentic AI systems, leading
      to systematic compromise of agent decision-making. This supply chain attack
      vector allows adversaries to influence agent behavior at scale through corrupted
      external services that agents rely upon for specialized data and capabilities.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://spec.modelcontextprotocol.io/
    related_mappings:
      - AIR-SEC-008
      - AIR-SEC-009
      - AIR-RC-001
    hasRelatedAction:
      - AIR-PREV-020
      - AIR-PREV-023
    dateCreated: '2026-06-25'

  - id: AIR-SEC-027
    name: Agent State Persistence Poisoning
    description: >-
      Agents retain malicious instructions, corrupted reasoning patterns, or compromised
      decision-making logic across sessions through poisoned persistent state, creating
      long-term backdoors that systematically affect multiple transactions and user
      interactions. This persistent compromise can influence agent behavior over
      extended periods, making detection challenging and amplifying the impact of
      initial attacks.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://arstechnica.com/security/2024/09/false-memories-planted-in-chatgpt-give-hacker-persistent-exfiltration-channel/
    related_mappings:
      - AIR-SEC-010
      - AIR-SEC-024
      - AIR-SEC-009
    hasRelatedAction:
      - AIR-PREV-022
    dateCreated: '2026-06-25'

  - id: AIR-OP-028
    name: Multi-Agent Trust Boundary Violations
    description: >-
      In multi-agent systems, compromised agents affect other agents through shared
      resources, communication channels, or state corruption, leading to systemic
      failures and cascading security incidents. Trust boundary violations allow
      compromise to propagate across agent networks, potentially affecting entire
      business processes and requiring comprehensive incident response across multiple
      agent systems.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://www.nist.gov/cyberframework
    related_mappings:
      - AIR-SEC-024
      - AIR-SEC-027
      - AIR-OP-020
    hasRelatedAction:
      - AIR-PREV-022
    dateCreated: '2026-06-25'

  - id: AIR-SEC-029
    name: Agent-Mediated Credential Discovery and Harvesting
    description: >-
      Agents are manipulated or exploited to systematically discover, access, and
      exfiltrate authentication credentials, API keys, secrets, and other sensitive
      authentication materials from systems, applications, and data stores. This
      risk extends beyond traditional credential theft by leveraging agents' autonomous
      tool selection capabilities and legitimate system access to conduct systematic
      credential harvesting operations that can compromise entire infrastructure
      and enable widespread lateral movement.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-sec
    hasDocumentation:
      - finos-ai-governance-framework-site
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
