      - AIR-OP-005
      - AIR-OP-006
      - AIR-OP-014
      - AIR-OP-016
      - AIR-OP-019
    dateCreated: '2026-06-25'

  - id: AIR-DET-016
    name: Preserving Source Data Access Controls in AI Systems
    description: >-
      This control addresses the critical requirement that when an Artificial Intelligence
      (AI) system—particularly one employing Retrieval Augmented Generation (RAG)
      or similar techniques—ingests data from various internal or external sources,
      the original access control permissions, restrictions, and entitlements associated
      with that source data must be understood, preserved, and effectively enforced
      when the AI system subsequently uses or presents information derived from
      that data.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-det
    hasDocumentation:
