  - id: AIR-OP-019
    name: Data Quality and Drift
    description: >-
      Generative AI systems rely heavily on the quality and freshness of their training
      data, and outdated or poor-quality data can lead to inaccurate, biased, or
      irrelevant outputs. In fast-moving sectors like financial services, stale
      models may miss market changes or regulatory updates, resulting in flawed
      risk assessments or compliance failures. Ongoing data integrity and retraining
      efforts are essential to ensure models remain accurate, relevant, and aligned
      with current conditions.
    type: Risk
    isDefinedByTaxonomy: finos-aigf
    isPartOf: finos-aigf-op
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
