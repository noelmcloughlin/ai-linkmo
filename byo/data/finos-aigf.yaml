actions:
  - id: AIR-PREV-002
    name: Data Filtering From External Knowledge Bases
    description: >-
      This control addresses the critical need to sanitize, filter, and appropriately
      manage sensitive information when AI systems ingest data from internal knowledge
      sources such as wikis, document management systems, databases, or collaboration
      platforms (e.g., Confluence, SharePoint, internal websites). The primary objective
      is to prevent the inadvertent exposure, leakage, or manipulation of confidential
      organizational knowledge when this data is processed by AI models, converted
      into embeddings for vector databases, or used in Retrieval Augmented Generation
      (RAG) systems.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
      - AIR-DET-001
      - AIR-PREV-006
      - AIR-DET-016
      - iso-42001-A-7-2
      - iso-42001-A-7-3
      - iso-42001-A-7-4
      - iso-42001-A-7-6
      - ac-4
      - ac-22
      - mp-6
      - pt-2
      - si-4
      - si-12
      - si-15
      - si-19
    hasRelatedRisk:
      - AIR-RC-001
      - AIR-SEC-009
    dateCreated: '2026-06-25'

  - id: AIR-PREV-003
    name: User/App/Model Firewalling/Filtering
    description: >-
      Effective security for AI systems involves monitoring and filtering interactions
      at multiple points: between the AI model and its users, between different
      application components, and between the model and its various data sources
      (e.g., Retrieval Augmented Generation (RAG) databases).
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-prev
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
      - AIR-PREV-017
      - AIR-PREV-008
      - AIR-DET-015
      - iso-42001-A-6-1-3
      - iso-42001-A-6-2-2
      - iso-42001-A-9-2
      - ac-4
      - sc-5
      - sc-7
      - si-4
      - si-10
      - si-15
    hasRelatedRisk:
      - AIR-OP-007
      - AIR-SEC-010
      - AIR-OP-018
      - AIR-OP-020
    dateCreated: '2026-06-25'

  - id: AIR-PREV-005
    name: System Acceptance Testing
    description: >-
      System Acceptance Testing (SAT) for AI systems is a crucial validation phase
      within a financial institution. Its primary goal is to confirm that a developed
      AI solution rigorously meets all agreed-upon business and user requirements,
      functions as intended from an end-user perspective, and is fit for its designated
      purpose before being deployed into any live operational environment. This
      testing focuses on the user's viewpoint and verifies the system's overall
      operational readiness, including its alignment with risk and compliance standards.
