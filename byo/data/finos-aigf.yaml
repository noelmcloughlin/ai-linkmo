  - id: AIR-PREV-007
    name: Legal and Contractual Frameworks for AI Systems
    description: >-
      Robust legal and contractual agreements are essential for governing the development,
      procurement, deployment, and use of AI systems within a financial institution.
      This control ensures that comprehensive frameworks are established and maintained
      to manage risks, define responsibilities, protect data, and ensure compliance
      with legal and regulatory obligations when engaging with AI technology vendors,
      data providers, partners, and even in defining terms for end-users. These
      agreements must be thoroughly understood and actively managed to ensure adherence
