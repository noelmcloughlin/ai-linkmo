      - au-6
      - au-11
      - au-12
      - ca-7
      - ir-4
      - ir-5
      - ra-10
      - si-4
      - si-7
    type: RiskControl
    detectsRiskConcept:
      - AIR-RC-001
      - AIR-OP-005
      - AIR-OP-006
      - AIR-OP-007
      - AIR-OP-014
      - AIR-OP-018
      - AIR-OP-019
    dateCreated: '2026-06-25'

  - id: AIR-DET-009
    name: AI System Alerting and Denial of Wallet (DoW) / Spend Monitoring
    description: >-
      The consumption-based pricing models common in AI services (especially cloud-hosted
      Large Language Models and compute-intensive AI workloads) create unique financial
      and operational risks. "Denial of Wallet" (DoW) attacks specifically target
      these cost structures by attempting to exhaust an organization's AI service
      budgets through excessive resource consumption, potentially leading to service
      suspension, degraded performance, or unexpected financial impact.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-det
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
      - AIR-PREV-008
      - AIR-DET-004
      - AIR-PREV-003
      - iso-42001-A-6-2-6
      - iso-42001-A-4-2
      - ac-2
      - ca-7
      - ir-4
      - sc-5
      - sc-6
      - si-4
    type: RiskControl
    detectsRiskConcept:
      - AIR-OP-007
    dateCreated: '2026-06-25'

  - id: AIR-DET-011
    name: Human Feedback Loop for AI Systems
    description: >-
      A Human Feedback Loop is a critical detective and continuous improvement mechanism
      that involves systematically collecting, analyzing, and acting upon feedback
      provided by human users, subject matter experts (SMEs), or reviewers regarding
      an AI system's performance, outputs, or behavior. In the context of financial
      institutions, this feedback is invaluable for:
       Monitoring AI System Efficacy: Understanding how well the AI system is meeting
      its objectives in real-world scenarios.
       Identifying Issues: Detecting problems such as inaccuracies, biases, unexpected
      behaviors (ri-5, ri-6), security vulnerabilities (e.g., successful prompt
      injections, data leakage observed by users), usability challenges, or instances
      where the AI generates inappropriate or harmful content.
       Enabling Continuous Improvement: Providing data-driven insights to refine
      AI models, update underlying data (e.g., for RAG systems), tune prompts, and
      enhance user experience.
       Supporting Incident Response: Offering a channel for users to report critical
      failures or adverse impacts, which can trigger incident response processes.
       Informing Governance: Providing qualitative and quantitative data to AI governance
      bodies and ethics committees.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
      - finos-aigf-control-det
    hasDocumentation:
      - finos-ai-governance-framework-site
    related_mappings:
      - AIR-DET-015
      - AIR-DET-004
      - AIR-PREV-005
      - iso-42001-A-6-2-6
