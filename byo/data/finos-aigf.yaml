taxonomies:
  - id: finos-aigf
    name: FINOS AI Governance Framework v2
    type: RiskTaxonomy
    description: >-
      Financial-services-focused AI risk taxonomy and control catalogue published
      by the FINOS AI Readiness project. Covers AI risks, mitigations and use cases
      relevant to regulated financial institutions.
    url: https://air-governance-framework.finos.org/
    version: v2
    hasDocumentation:
      - finos-ai-governance-framework-site
    dateCreated: '2026-06-25'

  - id: finos-ai-use-cases-v1
    name: FINOS AI Use-Cases Taxonomy (Financial Services)
    type: AiTaskTaxonomy
    description: >-
      FINOS-published taxonomy of AI use cases relevant to financial services. Organised
      into five top-level sector domains (AiTaskDomain), subcategories (AiTaskGroup),
      and leaf AI tasks (AiTask).
    url: https://air-governance-framework.finos.org/
    version: v1
    hasDocumentation:
      - finos-ai-governance-framework-site
    dateCreated: '2026-06-25'

  - id: finos-ai-capabilities-v1
    name: FINOS AI Capabilities (Financial Services)
    type: CapabilityTaxonomy
    description: >-
      FINOS-published cross-cutting AI capabilities applicable across financial
      services use cases, covering foundational engineering, operational, and governance
      concerns.
    url: https://air-governance-framework.finos.org/
    version: v1
    hasDocumentation:
      - finos-ai-governance-framework-site
    dateCreated: '2026-06-25'

  - id: finos-ai-deployment-model
    name: FINOS AI Deployment Model
    type: RiskTaxonomy
    description: >-
      FINOS-published seven-axis facet taxonomy for classifying AI deployments across
      financial services. The axes are: AI type, architecture pattern, deployment
      type, data handling, regulatory alignment, operational model, and integration
      pattern.
    url: https://github.com/finos/ai-governance-framework/blob/main/docs/_data/ai_deployment_model.yml
    version: v1
    dateCreated: '2026-06-25'


