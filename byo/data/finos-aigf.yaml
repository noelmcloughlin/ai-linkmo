  - id: AIR-PREV-018
    name: Agent Authority Least Privilege Framework
    description: >-
      The Agent Authority Least Privilege Framework implements granular access controls
      ensuring agents can only access APIs, tools, and data strictly necessary for
      their designated functions. This preventive control establishes dynamic privilege
      management, contextual access restrictions, and comprehensive authorization
      enforcement to prevent agents from exceeding their intended operational scope
      and causing unauthorized actions or regulatory violations.
    isDefinedByTaxonomy: finos-aigf
    isCategorizedAs:
