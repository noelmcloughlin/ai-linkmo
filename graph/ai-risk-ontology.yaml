  hasDocumentation:
  - doc-FLI2024
- id: A0165_Future_of_Life_Institute2024
  name: Dangerous capability evaluations
  description: This indicator reports on pre-deployment capability evaluations related
    to catastrophic risks. Model evaluations for other risks are not included here,
