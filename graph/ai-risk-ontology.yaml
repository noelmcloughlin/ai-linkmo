  name: Dual control
  description: Critical decisions in model development and deployment should be made
    by at least two people (e.g. promotion to production, changes to training datasets,
    or modifications to production).*
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-Schuett2023
