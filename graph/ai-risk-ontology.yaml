  name: Disclosure of energy consumption by AI systems to authorities
  description: Disclosures can direct more necessary attention and scrutiny to projects
    that consume significant energy. Disclosure involves releasing a summary of key
    details of the energy consumption of the AI system by all users, including the
    compute resources used, the amount of power consumed, the measures to reduce excess
