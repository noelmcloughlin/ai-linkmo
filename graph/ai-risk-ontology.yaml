- id: A0884_UK_Government2023
  name: Societal Impact Research
  description: Study the societal impacts of AI systems they have deployed, particularly
    by collaborating with external researchers, independent research organisations,
    and third party data owners. By collaborating and joining their data with that
    of third parties, such as internet platforms, frontier AI organisations can assess
    the impacts of their AI systems. Privacy-enhancing technologies could be employed
    to enable data sharing between frontier AI organisations, third parties, and external
    researchers while protecting confidential information. As well as data, frontier
    AI organisations could also facilitate research on the societal impacts of their
    AI systems by providing access to the necessary infrastructure and compute.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.7
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0885_UK_Government2023
  name: Third Party Knowledge for AI systems' Downstream societal impacts
  description: Draw on multidisciplinary expertise and the lived experience of impacted
    communities to assess the downstream societal impacts of their AI systems. Impact
    assessments that account for a wide range of potential societal impacts and meaningfully
    involve affected stakeholder groups could help to anticipate further downstream
    societal impacts.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.7
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0886_UK_Government2023
  name: Societal Impact Informed Risk Assessments
  description: Use assessments of downstream societal impacts to inform and corroborate
    risk assessments. Downstream societal impacts, such as threats to democracy, widespread
    unemployment, and environmental impacts, could be considered in risk assessments
    of AI systems, alongside more direct risks. See the Responsible Capability Scaling
    section for more information on good practices for risk assessment.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.7
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0910_UK_Government2023
  name: Assessment of Safeguard Costs for Users
  description: Regularly assess the costs of safeguards to users, including bias and
    loss of privacy, as well as restrictions on users’ freedom to discuss sensitive
    topics with AI agents in appropriate contexts. This may involve, for instance,
    estimating the false positive rates of filters by sampling blocked inputs and
    outputs; comparing the capabilities, efficiency, and user ratings of models that
    lack certain safeguards against models that have the safeguards in place; and
    conducting user interviews to understand how concerned informed users are about
    losses in privacy and the emergence of biases in algorithmically filtered content.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.7
  type: Action
  hasDocumentation:
  - doc-UK Government2023
