- id: A0086_Future_of_Life_Institute2024
  name: AI Safety Team
  description: Does your organization have a safety team? If yes, please provide the
    team name, a URL to the team’s website (if applicable), the team size (defined
    as FTE technical staff), and briefly describe its mission.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0089_Future_of_Life_Institute2024
  name: Board of directors
  description: Information about board independence; any non-standard safety-related
    powers; whether it has a mandate to prioritize safety over profits.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0091_Future_of_Life_Institute2024
  name: BOD formal risk committee
  description: Does the board of directors feature a formal risk committee that is
    tasked with overseeing the firm’s risk management practices? If yes, please name
    the members of this committee.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0092_Future_of_Life_Institute2024
  name: BOD regular crisis training
  description: Does the BOD engage in regular crisis response training?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0096_Future_of_Life_Institute2024
  name: Chief Information Security Officer (CISO)
  description: Does your firm's leadership team feature a chief information security
    officer (CISO)?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0099_Future_of_Life_Institute2024
  name: Company structure
  description: Information that indicates whether the structure of the firm would
    allow it to prioritize safety in critical situations or whether shareholder pressure
    could drive it to deploy capable but dangerous systems.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0123_Future_of_Life_Institute2024
  name: Internal review of high-stakes deployment decisions
  description: Does your company have one or more internal bodies that review deployment
    decisions related to highly capable AI models? This might be an ethics board or
    other body with a responsibility/safety related mandate.
  isCategorizedAs:
