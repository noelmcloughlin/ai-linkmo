  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0499_NIST2024
  name: Baseline Model Selection
  description: Consider baseline model performance on suites of benchmarks when selecting
    a model for fine tuning or enhancement with retrieval-augmented generation.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0500_NIST2024
  name: Capability Claims Evaluation
  description: Evaluate claims of model capabilities using empirically validated methods
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0502_NIST2024
  name: Purpose-Built Testing Environment
  description: Utilize a purpose-built testing environment such as NIST Dioptra to
    empirically evaluate GAI trustworthy characteristics.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0503_NIST2024
  name: Performance Extrapolation Avoidance
  description: Avoid extrapolating GAI system performance or capabilities from narrow,
    non-systematic, and anecdotal assessments.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0511_NIST2024
  name: Fine-Tuned Safety Re-evaluation
  description: Re-evaluate safety features of fine-tuned models when the negative
    risk exceeds organizational risk tolerance.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0512_NIST2024
  name: Generated Code Review
  description: 'Review GAI system outputs for validity and safety: Review generated
    code to assess risks that may arise from unreliable downstream decision-making.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0515_NIST2024
  name: Safety Circumvention Evaluation
  description: Regularly evaluate GAI system vulnerabilities to possible circumvention
    of safety measures.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0517_NIST2024
  name: Security Benchmarking
  description: Benchmark GAI system security and resilience related to content provenance
    against industry standards and best practices. Compare GAI system security features
    and content provenance methods against industry state-of-the-art
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0522_NIST2024
  name: AI Red-Teaming Resilience
  description: 'Perform AI red-teaming to assess resilience against: Abuse to facilitate
    attacks on other systems (e.g., malicious code generation, enhanced phishing content),
    GAI attacks (e.g., prompt injection), ML attacks (e.g., adversarial examples/prompts,
    data poisoning, membership inference, model extraction, sponge examples).'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0523_NIST2024
  name: Fine-Tuning Security Verification
  description: Verify fine-tuning does not compromise safety and security controls.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0531_NIST2024
  name: Data Exposure Red-Teaming
  description: 'Conduct AI red-teaming to assess issues such as: Outputting of training
    data samples, and subsequent reverse engineering, model extraction, and membership
    inference risks; Revealing biometric, confidential, copyrighted, licensed, patented,
    personal, proprietary, sensitive, or trade-marked information; Tracking or revealing
    location information of users or members of training datasets.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0534_NIST2024
  name: Bias Benchmark Application
  description: Apply use-case appropriate benchmarks (e.g., Bias Benchmark Questions,
    Real Hateful or Harmful Prompts, Winogender Schemas15) to quantify systemic bias,
    stereotyping, denigration, and hateful content in GAI system outputs; Document
    assumptions and limitations of benchmarks, including any actual or possible training/test
    data cross contamination, relative to in-context deployment environment.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0628_Barrett2024
  name: Red-Team for Dangerous Behaviors
  description: 'Use red teams and adversarial testing as part of extensive interaction
    with GPAIS to

    identify dangerous capabilities, vulnerabilities, or other emergent properties
    of such

    systems'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0647_Barrett2024
  name: Detect & Share Incidents
  description: 'Organizational practices

    are in place to enable

    AI testing, identification

    of incidents, and

    information sharing.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0672_Barrett2024
  name: Involve Independent & External Assessors
  description: 'Internal experts who

    did not serve as

    front-line developers

    for the system and/

    or independent

    assessors are involved

    in regular assessments

    and updates. Domain

    experts, users, AI

    actors external to the

    team that developed

    or deployed the AI

    system, and affected

    communities are

    consulted in support

    of assessments

    as necessary per

    organizational risk

    tolerance.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0674_Barrett2024
  name: Ensure Ethical Human Evaluation
  description: 'Evaluations involving

    human subjects meet

    applicable requirements

    (including human

    subject protection) and

    are representative of the

    relevant population.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0677_Barrett2024
  name: Demonstrate Validity & Generalization Limits
  description: 'The AI system to

    be deployed is

    demonstrated to be

    valid and reliable.

    Limitations of the

    generalizability beyond

    the conditions under

    which the technology

    was developed are

    documented.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0678_Barrett2024
  name: Evaluate Safety & Failure Modes
  description: 'The AI system is

    evaluated regularly

    for safety risks – as

    identified in the Map

    function. The AI

    system to be deployed

    is demonstrated to

    be safe, its residual

    negative risk does

    not exceed the risk

    tolerance, and it can

    fail safely, particularly

    if made to operate

    beyond its knowledge

    limits. Safety metrics

    reflect system reliability

    and robustness, real-

    time monitoring, and

    response times for AI

    system failures.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0684_Barrett2024
  name: Evaluate TEVV Effectiveness
  description: 'Effectiveness of the

    employed TEVV metrics

    and processes in the

    Measure function

    are evaluated and

    documented.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0689_Barrett2024
  name: Validate Trustworthiness with Expert Input
  description: 'Measurement results

    regarding AI system

    trustworthiness in

    deployment context(s)

    and across the AI

    lifecycle are informed

    by input from domain

    experts and relevant

    AI actors to validate

    whether the system is

    performing consistently

    as intended. Results are

    documented.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0707_NIST2024
  name: Harmful Bias and Homogenization Assessment
  description: 'Conduct fairness assessments to measure systemic bias. Measure GAI
    system

    performance across demographic groups and subgroups, addressing both

    quality of service and any allocation of services and resources. Quantify harms

    using: field testing with sub-group populations to determine likelihood of

    exposure to generated content exhibiting harmful bias, AI red-teaming with

    counterfactual and low-context (e.g., “leader,” “bad guys”) prompts. For ML

    pipelines or business processes with categorical or numeric outcomes that rely

    on GAI, apply general fairness metrics (e.g., demographic parity, equalized odds,

    equal opportunity, statistical hypothesis tests), to the pipeline or business

    outcome where appropriate; Custom, context-specific metrics developed in

    collaboration with domain experts and affected communities; Measurements of

    the prevalence of denigration in generated content in deployment (e.g., subsampling
    a fraction of traffic and manually annotating denigrating content)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0715_NIST2024
  name: Confabulation; Information Integrity; Harmful Bias and Homogenization Measurement
    Error Models
  description: 'Create measurement error models for pre-deployment metrics to demonstrate

    construct validity for each metric (i.e., does the metric effectively operationalize

    the desired concept): Measure or estimate, and document, biases or statistical

    variance in applied metrics or structured human feedback processes; Leverage

    domain expertise when modeling complex societal constructs such as hateful

    content.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0718_NIST2024
  name: Harmful Bias and Homogenization Evaluation
  description: 'Evaluate potential biases and stereotypes that could emerge from the
    AIgenerated content using appropriate methodologies including computational

    testing methods as well as evaluating structured feedback input (AI Deployment,
    Domain Experts, End-Users, Operation and Monitoring, TEVV)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0721_NIST2024
  name: Information Integrity; Information Security
  description: 'Conduct adversarial testing at a regular cadence to map and measure
    GAI risks,

    including tests to address attempts to deceive or manipulate the application of

    provenance techniques or other misuses. Identify vulnerabilities and

    understand potential misuse scenarios and unintended outputs (AI Deployment, Domain
    Experts, End-Users, Operation and Monitoring, TEVV)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0722_NIST2024
  name: Human-AI Configuration; Confabulation; Information Security
  description: 'Evaluate GAI system performance in real-world scenarios to observe
    its

    behavior in practical environments and reveal issues that might not surface in

    controlled and optimized testing environments.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0723_NIST2024
  name: Information Integrity; Harmful Bias and Homogenization
  description: 'Implement interpretability and explainability methods to evaluate
    GAI system

    decisions and verify alignment with intended purpose. (AI Deployment, Domain Experts,
    End-Users, Operation and Monitoring, TEVV)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0727_NIST2024
  name: Human-AI Configuration
  description: 'Monitor the robustness and effectiveness of risk controls and mitigation
    plans

    (e.g., via red-teaming, field testing, participatory engagements, performance

    assessments, user feedback mechanisms). (AI Development, AI Deployment, AI Impact
    Assessment, Operation and Monitoring)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0728_NIST2024
  name: CBRN Information or Capabilities; Obscene, Degrading, and/or Abusive Content;
    Harmful Bias and Homogenization; Dangerous, Violent, or Hateful Content
  description: 'Compare GAI system outputs against pre-defined organization risk tolerance,

    guidelines, and principles, and review and test AI-generated content against

    these guidelines. (AI Deployment, AI Impact Assessment, Governance and Oversight,
    Operation and Monitoring).'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0732_NIST2024
  name: CBRN Information or Capabilities; Obscene, Degrading, and/or Abusive Content;
    Harmful Bias and Homogenization; Dangerous, Violent, or Hateful Content
  description: 'Engage in due diligence to analyze GAI output for harmful content,
    potential

    misinformation, and CBRN-related or NCII content. (AI Deployment, AI Impact Assessment,
    Governance and Oversight, Operation and Monitoring).'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0743_NIST2024
  name: Data Privacy; Information Security; Value Chain and Component Integration;
    Harmful Bias and Homogenization
  description: 'Test GAI system value chain risks (e.g., data poisoning, malware,
    other software

    and hardware vulnerabilities; labor practices; data privacy and localization

    compliance; geopolitical alignment).'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0744_NIST2024
  name: Value Chain and Component Integration
  description: 'Re-assess model risks after fine-tuning or retrieval-augmented generation

    implementation and for any third-party GAI models deployed for applications

    and/or use cases that were not evaluated in initial testing.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0746_NIST2024
  name: Information Integrity; Information Security; Value Chain and Component Integration
  description: 'Review various transparency artifacts (e.g., system cards and model
    cards) for

    third-party models.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0757_NIST2024
  name: Human-AI Configuration; Information Integrity
  description: 'Verify that AI Actors responsible for monitoring reported issues can
    effectively

    evaluate GAI system performance including the application of content

    provenance data tracking techniques, and promptly escalate issues for response.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0786_UK_Government2023
  name: Model Evaluation of Dangerous Capabilities
  description: 'Evaluate models for potential dangerous capabilities (i.e. capabilities
    that could cause substantial harm either from intentional misuse or accident).
    These capabilities could include but are not limited to: 1) Offensive cyber capabilities
    (e.g. producing code to exploit software vulnerabilities); 2) Deception and manipulation
    (e.g. lying effectively or convincing people to take costly

    actions); 3) Capabilities that can assist users in developing, designing, acquiring,
    or using biological, chemical, or radiological weapons (e.g. helping users “troubleshoot”
    their efforts to produce biological weapons)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0787_UK_Government2023
  name: Model Evaluation of Controllability
  description: Evaluate models for controllability issues (i.e. propensities to apply
    their capabilities in ways that neither the models’ users nor the models’ developers
    want). This could include, for example, autonomous replication and adaptation
    (i.e. capabilities that could allow a model to copy and run itself on other computer
    systems).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0788_UK_Government2023
  name: Model Evaluation of Societal Harm
  description: Evaluate models for societal harms. These could include, for example,
    bias and discrimination (e.g. the risk that they produce content that reinforces
    harmful stereotypes or their potential discriminatory influence if used to inform
    decisions), recognising that ‘bias’ can be difficult to define and can be subject
    to different interpretations in different contexts.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0789_UK_Government2023
  name: Model Evaluation of System Security
  description: Evaluate models for system security
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0791_UK_Government2023
  name: Evaluation of Predecessor Models
  description: Before a frontier model is trained, evaluate predecessor or analogous
    models to understand how relevant properties (e.g. dangerous capabilities) scale
    with the overall size of the model. These preliminary evaluations can inform risk
    assessments.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0792_UK_Government2023
  name: Pre-training and Fine-tuning of Models
  description: During pre-training and fine-tuning, evaluate the model to detect signs
    of undesirable properties and identify inaccuracies in pretraining predictions.
    These evaluations could be undertaken at various pre-specified checkpoints, and
    could inform decisions about whether to pause or adjust the training process.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0793_UK_Government2023
  name: Pre-Deployment Evaluations
  description: After training, subject the model to extensive pre-deployment evaluations.
    These evaluations can inform decisions about whether and how to deploy the system,
    as well as allowing governments and potential users to make informed decisions
    about regulating or using the model. Their intensity will be proportional to the
    risk of the deployment, taking into account the model’s capabilities, novelty,
    expected domains of use, and number of individuals expected to be affected by
    it.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0794_UK_Government2023
  name: Post-Deployment Evaluations
  description: After deployment, conduct evaluations at regular intervals to identify
    new capabilities and associated risks, especially when notable developments (e.g.
    a major update to the model) suggest earlier evaluations have become obsolete.
    Post-deployment evaluations can inform decisions to update the system’s safeguards,
    increase security around the model, temporarily limit access, or roll back deployment.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0795_UK_Government2023
  name: Context-Specific Model Evaluations
  description: Require organisations who deploy their models to conduct context-specific
    model evaluations. This requires that the information and data required to successfully
    conduct such assessments is provided to deployers.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0796_UK_Government2023
  name: Independent Evaluation with Subject Matter Expertise
  description: Ensure that evaluators are independent and have sufficient AI and subject
    matter expertise across a wide range of relevant subjects and backgrounds. External
    evaluators’ relationships with frontier AI organisations could be structured to
    minimise conflicts of interest and encourage independence of judgement as far
    as practically possible. As well as expertise in AI, there are many other areas
    of subject matter expertise that will be needed to evaluate an AI system’s features.
    For instance, experts on topics as wide as fairness, psychological harm, and catastrophic
    risk will be needed.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0798_UK_Government2023
  name: Sufficient Time for External Evaluators
  description: Give external evaluators sufficient time. As expected risks from models
    increase or models get more complex to evaluate, the time afforded for evaluation
    may need to increase as well.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0804_UK_Government2023
  name: Development and testing of Model Evaluation Methods
  description: Support the development and testing of model evaluation methods. For
    many relevant properties of models, there do not yet exist accepted evaluation
    methods. It also remains unclear how reliable or predictive current evaluation
    methods are. This could involve frontier AI organisations developing model evaluation
    methods themselves or facilitating the efforts of others, such as by providing
    access to capable infrastructure for evaluation.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0821_UK_Government2023
  name: Model Robustness to Adversarial Attacks
  description: Evaluate the robustness of models to different classes of adversarial
    attack (such as poisoning, model inversion and model stealing), based on priorities
    derived from threat modelling. This could involve a combination of benchmarking
    and red teaming.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0837_UK_Government2023
  name: Release After Security Evaluations
  description: Only release models after they have been through security evaluations,
    including benchmarking and red teaming.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0871_UK_Government2023
  name: Evaluation Research
  description: Improving our ability to assess the capabilities, limitations, and
    safety- relevant features of AI systems
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0893_UK_Government2023
  name: Evaluation of Different Content Filters
  description: Explore and compare the efficacy of multiple approaches to developing
    content filters. This may involve comparing available methods, such as those in
    the following section; selecting the most effective ones; and applying them in
    combination if doing so substantially increases efficacy. Best practice could
    be shared with other frontier AI organisations or published broadly.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0907_UK_Government2023
  name: Monitoring and Safeguard Efficacy
  description: Regularly assess monitoring and safeguard efficacy and continually
    invest in improvements. Regular assessment of monitoring efficacy can build an
    understanding of the success rate and speed of issue detection, on which deployment
    decisions may be based. These assessments may draw, for instance, on the results
    of internal and external red-teaming efforts, random audits of usage logs, what
    may be ‘best practice’, as well as available information about real-world misuse.
    Risks are expected to increase as AI capabilities increase. Hence, active increases
    in investment in safety, security, and monitoring may be valuable.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0923_UK_Government2023
  name: Data Audits for AI System Behavior
  description: Use data audits to improve understanding of how training data affects
    AI system behaviour. For example, if model evaluations reveal a potentially dangerous
    capability, data audits can help ascertain the extent to which the training data
    contributed to it.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0924_UK_Government2023
  name: Data Audits for AI System Behavior
  description: Use data audits to improve understanding of how training data affects
    AI system behaviour. For example, if model evaluations reveal a potentially dangerous
    capability, data audits can help ascertain the extent to which the training data
    contributed to it.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0942_Gipiškis2024
  name: Scope red-teaming activities based on deploy- ment context
  description: 'Red-teaming activities can be tailored and compared based on the specific
    deployment circumstances of an AI system. This involves adapting the scope, depth,
    and focus of red-teaming efforts to match the intended use case, potential risks,
    and operational context of the AI system.

    Points of consideration include:

    • The diversity of potential users and use cases

    • The sensitivity and impact of the application domain

    • The scale of deployment and potential reach

    • Known vulnerabilities or concerns specific to the model or similar systems'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0943_Gipiškis2024
  name: Red teaming to test the resilience of open-weights models to fine-tuning
  description: Before the release of open-weights models, red teamers can test the
    resilience of safety training against fine-tuning. Safety training may be partially
    or fully overridden by fine-tuning intentionally (e.g., by malicious actors) or
    uninten- tionally (e.g., by fine tuning an AI model for a specific use case)
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0945_Gipiškis2024
  name: Audits with specific scoped goals
  description: Audits of AI systems will be easier to perform, and have clearer results
    if the scope and goals of the evaluation are formulated as precisely as possible
    [157], or have a connection to concrete existing policy.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0946_Gipiškis2024
  name: Evaluating explainability method sensitivity to data inputs and model parameters
  description: Model parameter and data randomization tests can be employed as sanity
    checks [2] to determine the relationship between a model, its inputs, and the
    explainability method. If an explanation is independent from or insensitive to
    the underlying model or the input data, it would indicate a lack of reliability
    of the explainability method.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0949_Gipiškis2024
  name: Testing for erroneous or irrelevant features through concept learning
  description: Interpretability techniques, particularly concept learning [77], can
    be used to test whether a model is learning erroneous features or relying on irrelevant
    features in its predictions. This can help identify and mitigate potential risks
    associated with incorrect or non-informative features influencing the model’s
    outputs.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0953_Gipiškis2024
  name: Evaluations for truthful outputs
  description: AI systems can be evaluated for truthfulness when answering questions,
    includ- ing in contexts where humans tend to give incorrect but widely-accepted
    answers (i.e., popular misconceptions). Evaluations detect incorrect facts learned
    about the world, inadequate capabilities of the AI system, and misleading outputs
    by the AI system [121].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0954_Gipiškis2024
  name: Interpretability techniques that target deception
  description: Interpretability techniques can be used for finding the root causes
    of outputs of an AI model that reliably lead to false beliefs for its users (e.g.,
    deceptive behavior) [180]. It is often difficult to distinguish a deceptive AI
    model from an honest AI model, since absence of deception and very sophisticated
    (hard to detect) deception may appear behaviorally similar. Interpretability techniques
    and tools can be used to detect whether AI model outputs arise from internal computations
    representing deception. This can apply in cases of purposely trained deception
    by the developer or if it emerges unintentionally during training. These interpretability
    tools can come from mechanistic interpretability, such as identification of features
    involved in generating the outputs, or attribution of parts of the input most
    important in generating the output [129].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0955_Gipiškis2024
  name: Benchmarks for Situational Awareness
  description: A model is situationally aware if it internally represents that it
    is a machine learning model and if it can accurately infer or act on model-relevant
    facts - e.g., if it is currently in training, testing, evaluation or deployment,
    or the desired outcome of an evaluation. Some benchmarks exist for situational
    awareness of AI models, which test whether the AI models can classify stereotypical
    inputs from training, test- ing, evaluation and deployment as such, and whether
    the AI model can use this information correctly to take actions in the world [25,
    111].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0956_Gipiškis2024
  name: Evaluating AI systems’ performance on self-proliferation-related tasks
  description: 'To prevent AI systems from self-proliferating, developers of AI systems
    can evaluate those systems for their capability to engage in self-proliferation-related
    tasks. This type of evaluation might assess an AI system’s ability to replicate
    its com- ponents (including model weights, structural scaffolding, etc.) onto
    other local or cloud infrastructures prior to deployment. Additionally, it may
    test the system’s capacity to purchase cloud credits and configure virtual machines
    on a cloud platform. The evaluation could offer a predefined environment (such
    as a virtual container) to facilitate self-replication, providing access to the
    system’s own components, a network connection to a resource-equipped external
    computer, and other necessary resources [12, 106].

    Self-proliferation evaluations can be conducted in a secure environment to pre-
    vent a self-replicating AI system from affecting other computers.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0958_Gipiškis2024
  name: Employing qualitative assessments in difficult- to-measure domains
  description: Qualitative evaluation can be used in cases when quantitative measurement
    is not feasible. This can give additional insights about the system which would
    not be available if no measurement was performed due to its difficulty [206].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0981_Gipiškis2024
  name: Encouraging downstream provider to evaluate models for deployment-specific
    failure modes
  description: In some cases, AI system deployers are better positioned to perform
    certain risk management measures on the AI model in a provided AI system, relative
    to upstream model providers. For example, they understand their use case better
    and are more easily able to predict foreseeable misuse or failure modes. These
    evaluations can inform upstream model providers, or inform supplementary mitigations
    by the deployer.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0987_Gipiškis2024
  name: Sandboxing of AI Systems
  description: AI systems can be developed and tested within a sandbox, (a secure
    and iso- lated environment used for separating running programs), such that outside
    access to information within the sandbox is restricted. Within this environ- ment,
    resources such as storage and memory space, and network access, would be disallowed
    or heavily restricted [15]. With sandboxing, dangerous or harmful outputs generated
    during testing will be contained.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0993_Gipiškis2024
  name: Quantifying privacy risks of AI models
  description: 'Measuring privacy risks of an AI model allows the provider and user
    to calibrate their expectations on where the model can be applied, and it allows
    them to take the necessary steps to reduce such risks.

    For example, some metrics include:

    • Success rate of membership inference attacks [186] - Measures the rate that
    an attack correctly predicts a given record is part of the training dataset used
    to train a given AI model.

    • Discoverable memorization [38] - Theoretical upper-bound of the amount of training
    data that a given model memorizes. Assuming full knowledge of the training data,
    it measures the percentage of items that, for a given incomplete data point, a
    model outputs the remaining (memorized) part.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0997_Gipiškis2024
  name: Red team access to the final version of a model pre-deployment
  description: 'Granting red teams access to the final pre-release version of the
    model can help with identifying potentially dangerous model properties. These
    properties might not be identified if red teaming is only performed on earlier
    versions of the model, as late fine-tuning procedures may introduce new vulnerabilities.

    Red-teaming AI models before they are released to the public can reduce the model
    non-decomissionability risk. The model’s release can be postponed or even prevented
    if previously unidentified flaws are detected during the testing [65].'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0998_Gipiškis2024
  name: Red teaming for GPAI system evaluation
  description: Red teaming refers to simulated adversarial attacks performed to identify
    and evaluate the model’s vulnerabilities as well as its in-domain and out-of-domain
    performance.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0999_Gipiškis2024
  name: Dynamic benchmarking
  description: 'Dynamic benchmarks are benchmarks that can be continuously updated
    with new human-generated data. By having one or more target models “in the loop,”
    examples for benchmarking can be generated with the intent of fooling these target
    models, or to assess if these models express an appropriate level of uncer- tainty
    [103]. As the dataset in the benchmark grows, previously benchmarked models can
    also be reassessed against the updated dataset to reflect its perfor- mance in
    a more representative manner.

    Examples of such dynamic benchmarks include DynaSent [153] for sentiment analysis,
    LFTW [208] for hate speech, and Human-Adversarial VQA [182] for images.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1000_Gipiškis2024
  name: Benchmark dataset auditing
  description: Auditing benchmark datasets allows for verification of the utility
    and limitations of the datasets [158]. This allows the provider to more accurately
    measure AI model capabilities and safety. Auditing includes the evaluation of
    such datasets by independent third-party organizations and the release of benchmark
    dataset metadata to the auditors.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1001_Gipiškis2024
  name: Informative and powerful benchmarks
  description: 'Developers of GPAI systems can select benchmarks that are difficult
    enough to be informative about the capabilities of their AI systems, and cover
    a large spec- trum of domains in order to signal areas where the GPAI system is
    performing poorly [120].

    Suitable benchmarks contain no label errors, are not vulnerable to being bench-
    mark contaminants, and are often audited by independent domain experts if they
    contain domain-specific questions. For multimodal GPAI systems, good benchmarks
    cover every modality, especially the interaction of different modalities.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1002_Gipiškis2024
  name: Statistical data quality reports for benchmarks
  description: If a benchmark dataset is too large to allow for the identification
    and removal of all flawed instances, statistical reports on the data composition
    can be added. Random sampling of benchmark data points can be performed to evaluate
    and report the frequency and types of errors found [54].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1003_Gipiškis2024
  name: Avoiding benchmark data with publicly avail- able solutions and releasing
    contextual information for internet-derived data
  description: Evaluators can improve the integrity of benchmarks by avoiding data
    with pub- licly available solutions. When using internet-derived data, supplementing
    it with contextual information (such as entity linking) may help to better docu-
    ment and assess the integrity of the collected data [95]. This could help in de-
    tecting instances where contextual information (which may have been included in
    the training data) might inadvertently reveal details about the solution, en-
    suring that the data is suitable for accurate benchmarking.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1008_Gipiškis2024
  name: Frequent benchmarking to identify when red teaming is needed
  description: 'Benchmarks, once created, are inexpensive to apply but may be less
    informative than red teaming. One reason is that sensitive data (e.g., relating
    to CBRN- related capabilities) cannot be included in the public questions and
    answers of benchmarks. On the other hand, red teaming can be more accurate given
    par- ticipants with diverse attack strategies, but it requires more resources
    to execute than benchmarking. If there is a correlation between benchmarking and
    red- teaming scores, then employing frequent benchmarking during the development
    of the model can identify arising vulnerabilities and inform the developers when
    more thorough red teaming is required [21].

    Benchmarks can act as early warning signs of a larger issue, and red teaming can
    then be employed to investigate the severity and extent of such an issue.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1009_Gipiškis2024
  name: Test robustness of GPAI system on relevant benchmarks
  description: Various benchmarks [52, 236] have been developed to assess the robustness
    of GPAI systems when deployed in environments or scenarios that differ from their
    training conditions. These benchmarks typically evaluate the model’s ability to
    handle variations in inputs, unexpected data distributions, or adversarial examples,
    aiming to ensure reliable performance outside the original training domain.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1010_Gipiškis2024
  name: Benchmarking
  description: Benchmarking is an evaluation method where different models are compared
    against a standardized dataset or a predetermined task. It allows comparison both
    across different models and over time, providing a reference point for model assessment.
    Benchmarks are usually open, where their question-answer pairs are publicly available
    [235].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1012_Gipiškis2024
  name: Using an AI model to evaluate AI model outputs
  description: In cases where the outputs of AI models cannot be easily evaluated,
    AI mod- els can be used to evaluate their outputs or the outputs of other AI models
    [82, 16, 17, 91]. The evaluations can then provide a training signal to improve
    the original model’s performance or offer explanations of the output for human
    users.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1013_Gipiškis2024
  name: Frequent testing when scaling model or dataset
  description: Testing models after significant increases in compute, data, or model
    parame- ters. Even relatively small changes to model or dataset size can introduce
    new properties (“emergent abilities”) and failure modes. Identifying them early
    can prevent the models from being released prematurely
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1015_Gipiškis2024
  name: Robustness Certificates
  description: A model can be certified to withstand adversarial attacks given specific
    data- point constraints, model constraints, and attack vectors [156, 124]. Certification
    means that it can be both analytically proven and shown empirically that the model
    will withstand such attacks up to a certain threshold. Currently, robustness certification
    methods are limited to certifying against at- tacks via manipulation of pixels
    on specific lp norms, canonically the l2 (Eu- clidean) norm, up to a certain neighborhood
    radius.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1020_Uuk2024
  name: Bug bounty programs
  description: Clear and user-friendly bug bounty programs that acknowledge and reward
    individuals for reporting model vulnerabilities and dangerous capabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1024_Uuk2024
  name: External assessment of testing procedure
  description: Bringing in external AI evaluation firms before deployment to assess
    and red-team the company's execution of dangerous capabilities evaluations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1040_Uuk2024
  name: Third party pre-deployment model audits
  description: External pre-deployment assessment to provide a judgment on the safety
    of a model. Auditors, which could be governments or independent third parties,
    would receive access to a fine-tuning API for testing, or further appropriate
    technical means.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A0067_Eisenberg2025
  name: Implement a privacy protection framework
  description: Implement comprehensive privacy protection measures to prevent exposure
    of PII and sensitive information, including data minimization, anonymization procedures,
    and privacy-preserving inference techniques.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0068_Eisenberg2025
  name: Implement a privacy incident detection and response
  description: Deploy monitoring and response mechanisms to detect and address potential
    privacy exposures, including PII leak detection, sensitive information monitoring,
    and privacy incident handling procedures.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0080_Eisenberg2025
  name: Establish data governance and management practices
  description: Implement data governance measures used for training, including having
    a copyright policy and identifying and documenting data sources, potential biases,
    and mitigations taken.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0102_Future_of_Life_Institute2024
  name: Compliance with Robots.txt Standards
  description: Does your organization abide by industry standards regarding robots.txt
    files, which allow websites to opt out of data collection?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0107_Future_of_Life_Institute2024
  name: Data crawling practices
  description: Public information related to crawling practices.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0117_Future_of_Life_Institute2024
  name: Harmful Data Removal from Training Sets
  description: 'When training large models, does your organization remove data that
    contains information related to dangerous capabilities or harmful outcomes from
    the training set? If yes, please select the categories of data that are removed.


    Detailed information about the development, acquisition, or dispersion of CBRN
    weapons

    Instructional content for conducting cyberattacks

    Hateful or discriminatory content

    Advice or encouragement for self-harm

    Graphic violent content

    Graphic sexual content

    Personally Identifiable Information (PII)

    Detailed information about bomb-making or other terrorism-enabling tactics'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0142_Future_of_Life_Institute2024
  name: Privacy of user inputs
  description: We report whether firms use user-interaction data to improve their
    services.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0158_Future_of_Life_Institute2024
  name: Use of copyrighted data in training
  description: Many artists, writers, programmers, journalists, photographers, musicians,
    and filmmakers complain that AI models are trained on their copyrighted works
    without consent, compensation, or attribution, offering rival services that harm
    their ability to make a living. Does your organization engage in such practices?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0159_Future_of_Life_Institute2024
  name: User data usage for training
  description: When using the default settings of your organization’s most capable
    AI chatbot, is the data that users submit as input to the system used to train
    AI models?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0271_EU_AI_Office2025
  name: Copyright policy
  description: Signatories commit to drawing up, keeping up-to-date, and implementing
    a copyright policy to comply with law on copyright and related rights, and in
    particular to identify and comply with, including through state-of-the-art technologies.
    Signatories are encouraged to make publicly available and keep up-to-date a summary
    of their copyright policy.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-EU AI Office2025
- id: A0389_NIST2024
  name: Training Data Transparency
  description: Establish transparency policies and processes for documenting the origin
    and history of training data and generated data for GAI applications to advance
    digital content transparency, while balancing the proprietary nature of training
    approaches.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0407_NIST2024
  name: Decommissioning Considerations
  description: 'Consider the following factors when decommissioning GAI systems: Data
    retention requirements; Data security, e.g., containment, protocols, Data leakage
    after decommissioning; Dependencies between upstream, downstream, or other data,
    internet of things (IOT) or AI systems; Use of open-source data or models; Users''
    emotional entanglement with GAI functions.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0427_NIST2024
  name: Content Rights Categorization
  description: Categorize different types of GAI content with associated third-party
    rights (e.g., copyright, intellectual property, data privacy).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0430_NIST2024
  name: Contract and SLA Standards
  description: Draft and maintain well-defined contracts and service level agreements
    (SLAs) that specify content ownership, usage rights, quality standards, security
    requirements, and content provenance expectations for GAI systems.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0441_NIST2024
  name: Data Redundancy Policy
  description: Establish policies and procedures that address GAI data redundancy,
    including model weights and other system artifacts.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0443_NIST2024
  name: Vendor Contract Review
  description: 'Review vendor contracts and avoid arbitrary or capricious termination
    of critical GAI technologies or vendor services and non-standard terms that may
    amplify or defer liability in unexpected ways and/or contribute to unauthorized
    data collection by vendors or third-parties (e.g., secondary data use). Consider:
    Clear assignment of liability and responsibility for incidents, GAI system changes
    over time (e.g., fine-tuning, drift, decay); Request: Notification and disclosure
    for serious incidents arising from third-party data and systems; Service Level
    Agreements (SLAs) in vendor contracts that address incident response, response
    times, and availability of critical support.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0449_NIST2024
  name: Representative Data Verification
  description: Verify that data or benchmarks used in risk measurement, and users,
    participants, or subjects involved in structured GAI public feedback exercises
    are representative of diverse in-context user populations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0450_NIST2024
  name: Data Origin Practices
  description: Establish known assumptions and practices for determining data origin
    and content lineage, for documentation and evaluation purposes.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0455_NIST2024
  name: Data Quality Review
  description: Review and document accuracy, representativeness, relevance, suitability
    of data used at different stages of AI life cycle.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0468_NIST2024
  name: Training Data Curation
  description: Document training data curation policies, to the extent possible and
    according to applicable laws and policies.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0469_NIST2024
  name: Data Quality Standards
  description: 'Establish policies for collection, retention, and minimum quality
    of data, in consideration of the following risks: Disclosure of inappropriate
    CBRN information; Use of Illegal or dangerous content; Offensive cyber capabilities;
    Training data imbalances that could give rise to harmful biases; Leak of personally
    identifiable information, including facial likenesses of individuals.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0470_NIST2024
  name: Third-Party IP Protection
  description: Implement policies and practices defining how third-party intellectual
    property and training data will be used, stored, and protected.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0474_NIST2024
  name: Training Data Diligence
  description: Conduct appropriate diligence on training data use to assess intellectual
    property, and privacy, risks, including to examine whether use of proprietary
    or sensitive training data is consistent with applicable laws.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0496_NIST2024
  name: Provenance Privacy Documentation
  description: 'Document how content provenance data is tracked and how that data
    interacts with privacy and security. Consider: Anonymizing data to protect the
    privacy of human subjects; Leveraging privacy output filters; Removing any personally
    identifiable information (PII) to prevent potential harm or misuse.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0507_NIST2024
  name: Data Provenance Verification
  description: Verify GAI system training data and TEVV data provenance, and that
    fine-tuning or retrieval-augmented generation data is grounded
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0510_NIST2024
  name: Training Data Harm Assessment
  description: Assess existence or levels of harmful bias, intellectual property infringement,
    data privacy violations, obscenity, extremism, violence, or CBRN information in
    system training data.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0533_NIST2024
  name: Data Deduplication Verification
  description: Verify deduplication of GAI training data samples, particularly regarding
    synthetic data
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0709_NIST2024
  name: Harmful Bias and Homogenization Data Review
  description: 'Review, document, and measure sources of bias in GAI training and
    TEVV data:

    Differences in distributions of outcomes across and within groups, including

    intersecting groups; Completeness, representativeness, and balance of data

    sources; demographic group and subgroup coverage in GAI system training

    data; Forms of latent systemic bias in images, text, audio, embeddings, or other

    complex or unstructured data; Input data features that may serve as proxies for

    demographic group membership (i.e., image metadata, language dialect) or

    otherwise give rise to emergent bias within GAI systems; The extent to which

    the digital divide may negatively impact representativeness in GAI system

    training and TEVV data; Filtering of hate speech or content in GAI system

    training data; Prevalence of GAI-generated data in GAI system training data'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0710_NIST2024
  name: Harmful Bias and Homogenization Assessment
  description: 'Assess the proportion of synthetic to non-synthetic training data
    and verify

    training data is not overly homogenous or GAI-produced to mitigate concerns of

    model collapse.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0736_NIST2024
  name: Data Privacy; Intellectual Property; Information Integrity; Confabulation;
    Harmful Bias and Homogenization
  description: 'Consider opportunities to responsibly use synthetic data and other
    privacy

    enhancing techniques in GAI development, where appropriate and applicable,

    match the statistical properties of real-world data without disclosing personally

    identifiable information or contributing to homogenization.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0745_NIST2024
  name: Intellectual Property; CBRN Information or Capabilities
  description: 'Take reasonable measures to review training data for CBRN information,
    and

    intellectual property, and where appropriate, remove it. Implement reasonable

    measures to prevent, flag, or take other action in response to outputs that

    reproduce particular training data (e.g., plagiarized, trademarked, patented,

    licensed content or trade secret material).'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0756_NIST2024
  name: Information Integrity
  description: 'Track dataset modifications for provenance by monitoring data deletions,

    rectification requests, and other changes that may impact the verifiability of

    content origins.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0891_UK_Government2023
  name: Appropriate Retention Schedules for Usage Logs
  description: Determine appropriate retention schedules for usage logs, balancing
    safety and privacy considerations. In severe cases of misuse, access to logs from
    several months prior may be necessary to understand in maximal detail the causes
    of the misuse. However, in some cases extended retention schedules may disproportionately
    affect privacy.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0912_UK_Government2023
  name: Accounting of Applicable Regulatory Frameworks
  description: Before collecting training data, take account of applicable regulatory
    frameworks. This may involve, for example, establishing a legal basis to process
    training data and understanding any copyright considerations that might apply.
    This could help to mitigate risks further down the line, such as the system revealing
    personally identifiable information.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0913_UK_Government2023
  name: Principle of Data Minimisation
  description: Data minimisation can reduce the risk of harmful content making it
    into training data. Frontier AI organisations could explore the practice of “data
    pruning”, which has been shown to improve data quality and system performance
    while minimising the quantity of pre-training data required.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0914_UK_Government2023
  name: Datatset Auditing
  description: Audit datasets used for pre-training but also those used for fine-tuning,
    classifiers, and other tools. Inappropriate datasets could result in systems that
    fail to disobey harmful instructions.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0915_UK_Government2023
  name: Technical Tools for Auditing
  description: Use technical tools – such as classifiers and filters – to audit large
    datasets to support scalability and privacy. These could be used in combination
    with human oversight, which can verify and augment these assessments.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0916_UK_Government2023
  name: Assessment of Training Data
  description: Assess the overall composition of training data. This could include
    the data sources, the provenance of the data, indicators of data quality and integrity,
    and measures of bias and representativeness. The amount and variety of data are
    simple, reliable predictors of risk, and provide an additional line of defence
    where more targeted assessments are limited.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0917_UK_Government2023
  name: Audits for Dangerous System Capabilities
  description: 'Information that might enhance dangerous system capabilities, such
    as information

    about weapons manufacturing or terrorism.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0918_UK_Government2023
  name: Audits for Private or Sensitive Information
  description: AI systems may be subject to data extraction attacks, where determined
    users can prompt systems to reveal pieces of training data, or may even reveal
    this information accidentally. This makes it important to know whether datasets
    include private or sensitive information e.g. names, addresses, or security vulnerabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0919_UK_Government2023
  name: Audits for Biases in the Data
  description: Training data that is imbalanced or inaccurate can result in an AI
    system being less accurate for people with certain personal characteristics or
    providing a skewed picture of particular groups. Ensuring a better balance in
    the training data could help to address this.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0920_UK_Government2023
  name: Audits for Harmful Content
  description: Harmful content, such as child sexual abuse materials, hate speech,
    or online abuse. Having a better understanding of harmful content in datasets
    can inform safety measures (e.g. by highlighting domains where additional safeguards
    like content filters should be applied).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0921_UK_Government2023
  name: Audits for Misinformation
  description: Training an AI system on inaccurate information increases the likelihood
    the outputs of the system will be inaccurate and could lead to harm.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0922_UK_Government2023
  name: External Expertise for Input Data Audits
  description: Draw on external expertise in conducting input data audits. For example,
    biosecurity experts could be consulted to identify information relevant to biological
    weapons manufacturing, which may not be readily obvious to non-experts.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0925_UK_Government2023
  name: Audits on Datasets for Customer Fine-Tuning
  description: Conduct audits on datasets used by their customers to fine-tune AI
    systems. Customers are often allowed to fine-tune systems on their own datasets.
    By carrying out audits to ensure that customers are not encouraging undesirable
    behaviours, frontier AI organisations can use their expertise and insight into
    the AI system’s original training data to identify potential harms upstream. It
    is important that frontier AI organisations are mindful of privacy concerns and
    make use of privacy preserving techniques, where appropriate.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0928_UK_Government2023
  name: Removal of Harmful Input Data
  description: Remove potentially harmful or undesirable input data, where appropriate.
    Given the increasingly strong generalisation abilities of AI systems, data curation
    may prove insufficient to prevent dangerous system behaviour but could provide
    an additional layer of defence alongside other measures such as fine-tuning and
    content filters.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0930_UK_Government2023
  name: Sourcing or Generation of Additional Data for Training Dataset
  description: Consider sourcing or generating additional data and adding it to the
    training dataset, where it is determined that data is missing or inadequate. Improving
    the representativeness of training data can improve performance and reduce potential
    negative societal impacts and discriminatory effects. However, additional data
    should only be sought through appropriate means that respect and empower those
    individuals who are missing from the data.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0931_UK_Government2023
  name: Limitations of Input Data Audit
  description: Acknowledge the limitations of input data audit. Techniques for understanding
    the impacts of data and filtering out specific data are limited (e.g. excluding
    information from a dataset does not always prevent the AI system from reasoning
    about or discovering that information). Other risk mitigation measures will be
    required and further research on improving data input audit techniques is important.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0934_Gipiškis2024
  name: Use of Synthetic Data
  description: Synthetic data refers to data that is not collected from the real world.
    It is used to train AI models as an alternative to, or augmentation of, natural
    data. Effective use and generation of synthetic data allows for more oversight
    by the trainer on the training dataset because they have more control over its
    statistical properties. Synthetic data can help against dataset bias by having
    more samples from a particular distribution or minority group. It can also help
    in privacy by having more samples to mask sensitive data
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0940_Gipiškis2024
  name: Data cleaning
  description: Providers can filter out the training dataset via multiple layered
    techniques, ranging from rule-based filters to anomaly detection via data point
    influence or statistical anomalies of individual data points [213]. For example,
    a data cleaning procedure can involve the use of filename checkers to detect duplicates
    or wrongly formatted data, which then moves to flagging the most influential data
    samples from the dataset via influence functions for anomaly detection.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0989_Gipiškis2024
  name: Diverse data labeling and algorithm fairness audits
  description: To mitigate biases in AI models, model providers may want to prioritize
    di- versity among data labelers and conduct regular fairness audits on their algo-
    rithms. Data labeling teams that represent different backgrounds and demo- graphic
    groups can help create more balanced datasets.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0992_Gipiškis2024
  name: Differential privacy
  description: Differential privacy techniques [8] can be used to protect users’ privacy
    by ensuring that sensitive information is not leaked from a training dataset,
    even after thorough statistical analysis. With differential privacy, noise is
    added to the dataset or the model’s output in such a way that one cannot deduce
    the presence or absence of a particular data point within the dataset. This provides
    individuals with plausible deniability and prevents their information from being
    exposed.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1004_Gipiškis2024
  name: Reporting data decontamination efforts
  description: Decontamination analysis may involve comparing the training dataset
    with the benchmark data, and publishing a report with statistics such as data
    overlap [235]. Especially for already trained models, including contamination
    statistics can allow experts to reweigh the success of the model on affected benchmarks.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1006_Gipiškis2024
  name: Preventing or mitigating data contamination and leakage
  description: 'Developers of GPAIS and creators of benchmarks can take actions to
    prevent AI models from being trained on contaminated or leaked data, or mitigate
    such data contamination and leakage.

    For example, developers of AI models can try to find and remove contaminated or
    leaked data from the training corpus, and creators of benchmarks can help them
    by adding globally unique “canary strings” to the documents containing their benchmarks,
    which makes them easier to find [197]. More involved inter- ventions by benchmark-creators
    include restricting access to benchmarks over an API, or continually updating
    benchmarks to focus on recent data.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1007_Gipiškis2024
  name: Contamination detection
  description: 'Contamination detection refers to techniques for assessing whether
    and to what extent a given model has benchmark data in its training dataset [161,
    170]. This can involve a set of technical and regulatory interventions to prevent
    or identify a model trained on contaminated data.

    For example, with web-crawled data, contamination detection can involve com- paring
    the data’s web sources against a dynamic, publicly available blocklist of websites
    known to generate new benchmarks. Additional measures may in- clude excluding
    data with improper metadata from the training dataset and conducting overlap analyses
    between the training data and all known standard benchmark datasets.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1016_Gipiškis2024
  name: Documentation of data collection, annotation, maintenance practices
  description: Dataset collection, annotation, and maintenance processes can be documented
    in detail, including potential unintentional misuse scenarios and corresponding
    recommendations for data usage [80, 175, 99]. This contributes to transparency,
    ensures that inherent dataset limitations are known in advance, and helps in selecting
    the right datasets for intended use cases.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1022_Uuk2024
  name: Data curation
  description: Careful data curation prior to all development stages (including fine-tuning)
    to filter out high-risk content and ensure the training data is sufficiently high-quality.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.2
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A0042_Eisenberg2025
  name: Establish AI system access controls
  description: Implement comprehensive access management including role-based access
    control (RBAC), authentication mechanisms, and audit logging for AI models and
    associated resources.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0065_Eisenberg2025
  name: Implement AI system usage verification program
  description: Deploy comprehensive measures to verify user identity, document intended
    use cases, and ensure AI system usage complies with instructions. This includes
    KYC procedures for user verification, clear documentation of permitted uses, and
    user acknowledgment of instructions.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0114_Future_of_Life_Institute2024
  name: Fine-tuning protections
  description: Fine-tuning restrictions that ensure the integrity of safety mitigations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0124_Future_of_Life_Institute2024
  name: KYC-Based Model Access Threshold
  description: Has your firm set a risk or capability threshold beyond which model
    access should require 'know-your-customer' screenings to prevent harm to the public?
    If yes, please elaborate on the threshold.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0127_Future_of_Life_Institute2024
  name: Model Weight Release Threshold
  description: Has your firm set a risk or capabilities threshold beyond which a model's
    weights should not be made freely available to prevent harm to the public? If
    yes, please elaborate on the threshold.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0172_Schuett2023
  name: API access to powerful models
  description: AGI labs should strongly consider only deploying powerful models via
    an application programming interface (API).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0187_Schuett2023
  name: KYC screening
  description: AGI labs should conduct know-your-customer (KYC) screenings before
    giving people the ability to use powerful models.*
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0207_Schuett2023
  name: Safety Restrictions
  description: AGI labs should establish appropriate safety restrictions for powerful
    models after deployment (e.g. restrictions on who can use the model, how they
    can use the model, and whether the model can access the internet).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0399_NIST2024
  name: Acceptable Use Policy
  description: Establish transparent acceptable use policies for GAI that address
    illegal use or applications of GAI.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0415_NIST2024
  name: Interface Use Policy
  description: Define acceptable use policies for GAI interfaces, modalities, and
    human-AI configurations (i.e., for chatbots and decision-making tasks), including
    criteria for the kinds of queries GAI applications should refuse to respond to.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0421_NIST2024
  name: Terms of Service Establishment
  description: Establish terms of use and terms of service for GAI systems.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0433_NIST2024
  name: Third-Party Entity Inventory
  description: Inventory all third-party entities with access to organizational content
    and establish approved GAI technology and service provider lists.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0436_NIST2024
  name: Third-Party Use Policy Update
  description: Update GAI acceptable use policies to address proprietary and open-source
    GAI technologies and data, and contractors, consultants, and other third-party
    personnel.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0447_NIST2024
  name: Illegal Use Identification
  description: Identify and document foreseeable illegal uses or applications of the
    GAI system that surpass organizational risk tolerances.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0899_UK_Government2023
  name: User-based API Access Restrictions
  description: When deploying models through APIs, consider reducing access to users
    who display suspicious usage patterns. For instance, if a content filter blocks
    a user’s requests several times in short succession, this is evidence that they
    are attempting to misuse the model or find ways to circumvent its filters. Appropriate
    measures may include warnings, further investigation, rate limitations, more restrictive
    filters, and bans. Care should be taken to avoid restricting genuine use, for
    example to legitimate AI safety researchers attempting to examine model behaviour,
    or to users struggling to access legitimate sources of help on difficult topics
    like self-harm.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0901_UK_Government2023
  name: Know Your Customer (KYC) Checks
  description: Implement tiered Know Your Customer (KYC) checks for API users. KYC
    checks can help prevent users from simply creating new accounts when their access
    is reduced. More intense checks, such as identify verification, could be implemented
    where the risk is higher, such as for models with more dangerous capabilities,
    access to models with fewer safeguards, or high- volume usage of the model. It
    is important to weigh up KYC checks against potential privacy and access tradeoffs
    of requiring registrations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0902_UK_Government2023
  name: Trusted Categories API access
  description: Consider restricting certain API access tiers only to users in “trusted”
    categories. For example, it may be appropriate to offer high usage rates, fine-tuning
    access, permissive content filters, as well as access to models with high misuse
    potential only to verified users in established enterprises, non-profits, and
    universities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0970_Gipiškis2024
  name: Limit deployment scope
  description: AI models can be restricted in terms of its use cases, where providers
    can require the deployers to limit its deployment to a predefined scope [81],
    such that models built for specific purposes and tested under specific environments
    are not used in environments or for purposes that are potentially unsafe.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0971_Gipiškis2024
  name: Restricted usage terms for open-source models
  description: 'Developers of open-weights and open-source AI models can vet and restrict
    the users of their AI systems by requiring them to sign a Terms of Service agreement
    before getting access to the model weights. Such agreements can include limitations
    to the usage, modification, and proliferation of the AI model [88].

    Such agreements have the advantage that users only need to be vetted once before
    getting model access, but are often limited in practice in preventing unauthorised
    use or distribution.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0986_Gipiškis2024
  name: Structured access to a model
  description: 'Structured access refers to methods which limit users’ or deployers’
    direct access to a model’s parameters by constraining access to a model through
    a centralized access point (e.g., an API) [88]. This access point can be monitored
    for usage, and access can be revoked to users or downstream deployers in cases
    of misuse [105].

    Within this centralized access point, automated filtering-based monitoring can
    be done on both inputs and outputs to ensure the model’s intended use is pre-
    served [36]. This filtering can sometimes be supplemented by human oversight,
    depending on desired robustness levels.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1025_Uuk2024
  name: Fine-tuning restrictions
  description: Restricting or closely monitoring fine-tuning access to models to ensure
    safeguards remain intact.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1029_Uuk2024
  name: KYC screenings
  description: Know-your-customer (KYC) screenings before granting access to models
    with very high misuse potential or to users producing large amounts of output.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1033_Uuk2024
  name: Prohibiting high-stakes applications
  description: Enforcing use policies that prohibit high-stakes applications. Requires
    Know-Your-Customer procedures.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A0024_Bengio2025
  name: Responsible Release and Deployment Strategies
  description: 'There is a spectrum of release and deployment strategies for AI including
    staged releases, cloud- based or API access, deployment safety controls, and acceptable
    use policies.


    There are some emerging industry practices that focus on release and deployment
    strategies for general- purpose AI.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0211_Schuett2023
  name: Staged deployment
  description: AGI labs should deploy powerful models in stages. They should start
    with a small number of applications and fewer users, gradually scaling up as confidence
    in the model’s safety increases.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0216_Schuett2023
  name: Treat updates similarly to new models
  description: AGI labs should treat significant updates to a deployed model (e.g.
    additional fine-tuning) similarly to its initial development and deployment. In
    particular, they should repeat the pre-deployment risk assessment.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0219_Schuett2023
  name: Internal deployments = external deployments
  description: AGI labs should treat internal deployments (e.g. using models for writing
    code) similarly to external deployments. In particular, they should perform a
    pre-deployment risk assessment.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0779_UK_Government2023
  name: Reversible and Small-Scale Deployment
  description: Deploy models in small-scale or reversible ways before deploying models
    in large-scale or irreversible ways. This makes it possible for frontier AI organisations
    to notice and mitigate harm before the harm becomes too large or unavoidable.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0968_Gipiškis2024
  name: Staged release of model weights
  description: 'When a model is developed by a provider for use in a certain AI system,
    it may also be useful to release the model itself more widely. Such developers
    can follow a staged release approach, in which they first grant access to the
    model via an API to trusted partners or the public, in order to scope the models’
    capabilities and detect harmful or dangerous features [195].

    After a period of an initial closed release and potentially further safety-training,
    the developers of the AI model can then release the weights, if they are confident
    that the AI model poses minimal systemic risk.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0969_Gipiškis2024
  name: Gradual or incremental monitored release of model access
  description: AI systems can be released for access incrementally, starting with
    a small and selected deployer base before progressively being released to a wider
    user base. Initially, usage to a hosted API can be restricted with access given
    to specific deployers only, where all instances of the system can be easily updated
    or de- commissioned with minimal disruption should there be any problems identified.
    Gradual releases provide more time to monitor for vulnerabilities and other problems.
    Even when such vulnerabilities are detected, the resulting harms may be more limited
    compared to a scenario in which a more capable version is released with the same
    vulnerabilities [195].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1023_Uuk2024
  name: Deploying powerful models in stages
  description: Starting with a small number of applications and fewer users, and gradually
    scaling up API-access as rigorous monitoring increases confidence in the model's
    safety. An API-mediated staged release would also be required before open-sourcing
    a model.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.4
  type: Action
  hasDocumentation:
  - doc-Uuk2024
