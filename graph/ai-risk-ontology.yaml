  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0254_Wiener2024
  name: Implement a written safe and security plan (SSP)
  description: 'This bill would enact the Safe and Secure Innovation for Frontier

    Artificial Intelligence Models Act to, among other things, require

    that a developer, before beginning to initially train a covered model,

    as defined, comply with various requirements, including

    implementing the capability to promptly enact a full shutdown, as

    defined, and implement a written and separate safety and security

    protocol, as specified.


    (3)  Implement a written and separate safety and security protocol

    that does all of the following:

    (A)  Specifies protections and procedures that, if successfully

    implemented, would successfully comply with the developer’s

    duty to take reasonable care to avoid producing a covered model

    or covered model derivative that poses an unreasonable risk of

    causing or materially enabling a critical harm.

    (B)  States compliance requirements in an objective manner and

    with sufficient detail and specificity to allow the developer or a

    third party to readily ascertain whether the requirements of the

    safety and security protocol have been followed.

    (C)  Identifies a testing procedure, which takes safeguards into

    account as appropriate, that takes reasonable care to evaluate if

    both of the following are true:

    (i)  A covered model poses an unreasonable risk of causing or

    enabling a critical harm.

    (ii)  Covered model derivatives pose an unreasonable risk of

    causing or enabling a critical harm.

    (D)  Describes in detail how the testing procedure assesses the

    risks associated with post-training modifications.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.5
  type: Action
  hasDocumentation:
  - doc-Wiener2024
- id: A0260_EU_AI_Office2025
  name: Safety and Security Framework
  description: 'Signatories commit to adopting and implementing a Safety and Security
    Framework that will: (1) apply to their GPAISRs (general-purpose AI models with
    systemic risk); and (2) detail the systemic risk assessment, systemic risk mitigation,
    and governance risk mitigation measures and procedures that they intend to adopt
    to keep systemic risks stemming from their GPAISRs within acceptable levels.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.5
  type: Action
  hasDocumentation:
  - doc-EU AI Office2025
- id: A0279_Campos2025
  name: Modeling of the risks
  description: Based on risks identified in the literature and during open-ended red-teaming
    exercises, AI developers should create detailed scenarios mapping how an AI model’s
    capabilities or propensities could lead to real-world harms. These scenarios should
    break down complex risk pathways into discrete, measurable steps.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.5
  type: Action
  hasDocumentation:
  - doc-Campos2025
- id: A0281_Campos2025
  name: Risk Tolerance Threshold
  description: In the second step of the framework, AI developers need first to set
    a risk tolerance, that is, a risk level that they commit to not overshoot.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.5
  type: Action
  hasDocumentation:
  - doc-Campos2025
- id: A0282_Campos2025
  name: Operationalizing Risk Tolerance
  description: AI developers must operationalize their risk tolerance. This means
    translating the risk tolerance into concrete indicators of the level of risk—Key
    Risk Indicators (KRIs)—and the corresponding targets for mitigations—Key Control
    Indicators (KCIs)—that have to be reached.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.5
  type: Action
  hasDocumentation:
  - doc-Campos2025
- id: A0332_Campos2025
  name: Decision-Making Protocols
  description: Senior management should have clear go/no-go decision protocols and
    rules to follow in their decision-making…
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.5
  type: Action
  hasDocumentation:
  - doc-Campos2025
