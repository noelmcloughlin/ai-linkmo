  - doc-FLI2024
- id: A0147_Future_of_Life_Institute2024
  name: Regular third-party penetration testing
  description: Does your organization regularly task third-party cybersecurity penetration
    testers to find vulnerabilities in the infrastructure on which models are developed
    and deployed? If yes, please share the cumulative budget your firm has dedicated
    to external pen tests in 2023 and specify the regularity at which your firm invites
