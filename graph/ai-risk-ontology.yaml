  name: Appoint Chief Risk Officer
  description: There should be a senior executive responsible for risk management
    processes (often called a Chief Risk Officer) who is accountable for the risk
    management processes, but is importantly not a risk owner making risk decisions
    themselves.
  isCategorizedAs:
