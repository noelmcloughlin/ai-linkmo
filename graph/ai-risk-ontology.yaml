- id: mit-draft-ai-risk-mitigation-group-1
  name: 1. Governance & Oversight Controls
  description: Formal organizational structures and policy frameworks that establish
    human oversight mechanisms and decision protocols to ensure human accountability,
    ethical conduct, and risk management throughout AI development and deployment.
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  narrower:
  - mit-draft-ai-risk-mitigation-group-1.1
  - mit-draft-ai-risk-mitigation-group-1.2
  - mit-draft-ai-risk-mitigation-group-1.3
  - mit-draft-ai-risk-mitigation-group-1.4
  - mit-draft-ai-risk-mitigation-group-1.5
  - mit-draft-ai-risk-mitigation-group-1.6
  - mit-draft-ai-risk-mitigation-group-1.7
- id: mit-draft-ai-risk-mitigation-group-2
  name: 2. Technical & Security Controls
  description: Technical, physical, and engineering safeguards that secure AI systems
    and constrain model behaviors to ensure security, safety, alignment with human
    values, and content integrity.
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  narrower:
  - mit-draft-ai-risk-mitigation-group-2.1
  - mit-draft-ai-risk-mitigation-group-2.2
  - mit-draft-ai-risk-mitigation-group-2.3
  - mit-draft-ai-risk-mitigation-group-2.4
- id: mit-draft-ai-risk-mitigation-group-3
  name: 3. Operational Process Controls
  description: Processes and management frameworks governing AI system deployment,
    usage, monitoring, incident handling, and validation, which promote safety, security,
    and accountability throughout the system lifecycle.
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  narrower:
  - mit-draft-ai-risk-mitigation-group-3.1
  - mit-draft-ai-risk-mitigation-group-3.2
  - mit-draft-ai-risk-mitigation-group-3.3
  - mit-draft-ai-risk-mitigation-group-3.4
  - mit-draft-ai-risk-mitigation-group-3.5
- id: mit-draft-ai-risk-mitigation-group-4
  name: 4. Transparency & Accountability Controls
  description: Formal disclosure practices and verification mechanisms that communicate
    AI system information and enable external scrutiny to build trust, facilitate
    oversight, and ensure accountability to users, regulators, and the public.
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  narrower:
  - mit-draft-ai-risk-mitigation-group-4.1
  - mit-draft-ai-risk-mitigation-group-4.2
  - mit-draft-ai-risk-mitigation-group-4.3
  - mit-draft-ai-risk-mitigation-group-4.4
  - mit-draft-ai-risk-mitigation-group-4.5
  - mit-draft-ai-risk-mitigation-group-4.6
- id: mit-draft-ai-risk-mitigation-group-1.1
  name: 1.1 Board Structure & Oversight
  description: 'Governance structures and leadership roles that establish executive
    accountability for AI safety and risk management.

    Examples: Dedicated risk committees, safety teams, ethics boards, crisis simulation
    training, multi-party authorization protocols, deployment veto powers.'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-1.2
  name: 1.2 Risk Management
  description: 'Systematic methods that identify, evaluate, and manage AI risks for
    comprehensive risk governance.

    Examples: Enterprise risk management frameworks, risk registers with capability
    thresholds, compliance programs, pre-deployment risk assessments, independent
    risk assessments'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-1.3
  name: 1.3 Conflict of Interest Protections
  description: 'Governance mechanisms that manage financial interests and organizational
    structures to ensure leadership can prioritize safety over profit

    Examples: Background checks for key personnel, windfall profit redistribution
    plans, stake limitation policies, protections against shareholder pressure'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-1.4
  name: 1.4 Whistleblower Reporting & Protection
  description: 'Policies and systems that enable confidential reporting of safety
    concerns or ethical violations to prevent retaliation.

    Examples: Anonymous reporting channels, non-retaliation guarantees, limitations
    on non-disparagement agreements, external whistleblower handling services'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-1.5
  name: 1.5 Safety Decision Frameworks
  description: 'Protocols and commitments that constrain decision-making about model
    development, deployment, and capability scaling.

    Examples: If-then safety protocols, capability ceilings, deployment pause triggers,
    safety-capability resource ratios'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-1.6
  name: 1.6 Environmental Impact Management
  description: 'Processes for measuring, reporting, and reducing the environmental
    footprint of AI systems.

    Examples: Carbon footprint assessment, emission offset programs, energy efficiency
    optimization, resource consumption tracking'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-1.7
  name: 1.7 Societal Impact Assessment
  description: 'Processes that assess AI systems'' effects on society, including impacts
    on employment, power dynamics, political processes.

    Examples: Fundamental rights impact assessments, expert consultations on risk
    domains, stakeholder engagement processes, governance gap analyses'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-1
- id: mit-draft-ai-risk-mitigation-group-2.1
  name: 2.1 Model & Infrastructure Security
  description: 'Technical and physical safeguards that secure AI models, weights,
    and infrastructure to prevent unauthorized access, theft, tampering.

    Examples: Model weight tracking systems, multi-factor authentication protocols,
    physical access controls, background security checks, information security standard
    compliance'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-2
- id: mit-draft-ai-risk-mitigation-group-2.2
  name: 2.2 Model Alignment
  description: 'Technical methods to ensure AI systems understand and adhere to human
    values and intentions

    Examples: Reinforcement learning from human feedback (RLHF), direct preference
    optimization (DPO), constitutional AI training, value alignment verification systems'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-2
- id: mit-draft-ai-risk-mitigation-group-2.3
  name: 2.3 Model Safety Engineering
  description: 'Technical methods and safeguards that constrain model behaviors and
    protect against exploitation and vulnerabilities.

    Examples: Safety analysis protocols, capability restriction mechanisms, hazardous
    knowledge unlearning techniques, input/output filtering systems, adversarial robustness
    training'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-2
- id: mit-draft-ai-risk-mitigation-group-2.4
  name: 2.4 Content Safety Controls
  description: 'Technical systems and processes that detect, filter, and label AI-generated
    content to identify misuse.

    Examples: Synthetic media watermarking, content filtering mechanisms, prohibited
    content detection, metadata tagging protocols, deepfake creation restrictions'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-2
- id: mit-draft-ai-risk-mitigation-group-3.1
  name: 3.1 Testing & Auditing
  description: 'Systematic internal and external evaluations that assess AI systems,
    infrastructure, and compliance processes.

    Examples: Third-party audits, red teaming, penetration testing, dangerous capability
    evaluations, bug bounty programs'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-3
- id: mit-draft-ai-risk-mitigation-group-3.2
  name: 3.2 Data Governance
  description: 'Policies and procedures that govern responsible data acquisition,
    curation, and usage to ensure compliance, quality, privacy.

    Examples: Harmful content filtering protocols, compliance checks for data collection
    standards, user data privacy controls, data curation processes'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-3
- id: mit-draft-ai-risk-mitigation-group-3.3
  name: 3.3 Access Management
  description: 'Operational policies and verification systems that govern who can
    use AI systems and for what purposes.

    Examples: KYC verification requirements, API-only access controls, fine-tuning
    restrictions, acceptable use policies, high-stakes application prohibitions'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-3
- id: mit-draft-ai-risk-mitigation-group-3.4
  name: 3.4 Staged Deployment
  description: 'Implementation protocols that deploy AI systems in stages, requiring
    safety validation before expanding access.

    Examples: Limited API access programs, gradual user base expansion, capability
    threshold assessments, pre-deployment validation checkpoints, treating model updates
    as new deployments'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-3
- id: mit-draft-ai-risk-mitigation-group-3.5
  name: 3.5 Post-deployment Monitoring
  description: 'Ongoing monitoring processes that track AI behavior, user interactions,
    and societal impacts post-deployment.

    Examples: User interaction tracking systems, capability evolution assessments,
    periodic impact reports, automated misuse detection, usage pattern analysis tools'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-3
- id: mit-draft-ai-risk-mitigation-group-3.6
  name: 3.6 Incident Response & Recovery
  description: 'Protocols and technical systems that respond to security incidents,
    safety failures, or capability misuse.

    Examples: Incident response plans, emergency shutdown/rollback procedures, model
    containment mechanisms, safety drills, critical infrastructure protection measures'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-3
- id: mit-draft-ai-risk-mitigation-group-4.1
  name: 4.1 System Documentation
  description: 'Comprehensive documentation protocols that record technical specifications,
    intended uses, capabilities, limitations.

    Examples: Model cards, system architecture documentation, compute resource disclosures,
    safety test result reports, system prompt, model specifications'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-4
- id: mit-draft-ai-risk-mitigation-group-4.2
  name: 4.2 Risk Disclosure
  description: 'Formal reporting protocols and notification systems that communicate
    risk information, mitigation plans, safety evaluations.

    Examples: Publishing risk assessment summaries, pre-deployment notifications to
    government, reporting large training runs, disclosing mitigation strategies, notifying
    affected parties'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-4
- id: mit-draft-ai-risk-mitigation-group-4.3
  name: 4.3 Incident Reporting
  description: 'Formal processes that document and share AI safety incidents, security
    breaches, near-misses with appropriate stakeholders.

    Examples: Cyber threat intelligence sharing networks, mandatory breach notification
    procedures, incident database contributions, cross-industry safety reporting mechanisms,
    standardized near-miss documentation'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-4
- id: mit-draft-ai-risk-mitigation-group-4.4
  name: 4.4 Governance Disclosure
  description: 'Formal disclosure mechanisms that communicate governance structures,
    decision frameworks, safety commitments.

    Examples: Published safety and/or alignment strategies, governance documentation,
    safety cases, model registration protocols, public commitment disclosures'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-4
- id: mit-draft-ai-risk-mitigation-group-4.5
  name: 4.5 Third-Party System Access
  description: 'Mechanisms granting controlled system access to vetted external parties
    to enable independent assessment.

    Examples: Researcher access programs, third-party capability assessments, government
    access provisions, legal safe harbors for public interest evaluations'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-4
- id: mit-draft-ai-risk-mitigation-group-4.6
  name: 4.6 User Rights & Recourse
  description: 'Frameworks and procedures that enable users to identify and understand
    AI system interactions and seek remediation.

    Examples: User reporting channels, appeal processes, explanation request systems,
    remediation protocols, content verification'
  isDefinedByTaxonomy: mit-draft-ai-risk-mitigation
  type: RiskControlGroup
  broader:
  - mit-draft-ai-risk-mitigation-group-4
