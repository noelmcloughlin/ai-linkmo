- id: A0176_Schuett2023
  name: Board risk committee
  description: AGI labs should have a board risk committee, i.e. a permanent committee
    within the board of directors which oversees the lab’s risk management practices.*
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-Schuett2023
