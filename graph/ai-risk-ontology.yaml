- id: A0988_Gipiškis2024
  name: Redundant systems not reliant on GPAI
  description: 'Redundant systems provide continuation of a given system’s processes
    in case of failure of the given system. Importantly, redundant systems should
    not rely on the factors that caused the original system to fail in the first place,
    which can include an AI system [47].

    For example, if an AI system is incorporated into the landing gear system of an
    aircraft, such as during autonomous control of the aircraft, redundant systems
    in the form of mechanical or hydraulic mechanisms must be present to allow for
    deployment of the landing gear in case of AI system failure.'
