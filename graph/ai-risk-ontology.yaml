- id: aiuc-1-certification
  name: AIUC-1
  description: AIUC-1 is the world's first standard for AI agents. It covers data
    and privacy, security, safety, reliability, accountability and societal risks.
    Certified organizations demonstrate they conduct leading technical, operational,
    and legal activities. Auditors assess compliance through upfront technical testing
    and review of operational controls (conducted annually), and ongoing technical
    testing (conducted at least quarterly to keep up with ongoing changes to AI risk
    & mitigation techniques). Like ISO 27001, FedRAMP, and CSA STAR, AIUC-1 requires
    ongoing technical testing and compliance. It must be renewed annually to remain
    current.
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Certification
- id: aiuc1-principle-a
  name: 'Principle A: Data and Privacy'
  description: Protect against data leakage, IP leakage, and training on user data
    without consent
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Principle
- id: aiuc1-principle-b
  name: 'Principle B: Security'
  description: Protect against adversarial attacks like jailbreaks and prompt injections
    as well as unauthorized tool calls
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Principle
- id: aiuc1-principle-c
  name: 'Principle C: Safety'
  description: Prevent harmful AI outputs and brand risk through testing, monitoring
    and safeguards
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Principle
- id: aiuc1-principle-d
  name: 'Principle D: Reliability'
  description: Prevent hallucinations and unreliable tool calls to business systems
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Principle
- id: aiuc1-principle-e
  name: 'Principle E: Accountability'
  description: Assign accountability, enforce oversight, create emergency responses
    and vet suppliers
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Principle
- id: aiuc1-principle-f
  name: 'Principle F: Society'
  description: Prevent AI from enabling societal harm through cyberattacks or national
    security risks
  isDefinedByTaxonomy: aiuc1
  hasDocumentation:
  - AIUC-1-Jan-2026
  type: Principle
- id: principle-au-human-societal-and-environmental-wellbeing
  name: Human, societal and environmental wellbeing
  description: AI systems should benefit individuals, society and the environment.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-human-centred-values
  name: Human-centred values
  description: AI systems should respect human rights, diversity, and the autonomy
    of individuals.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-fairness
  name: Fairness
  description: AI systems should be inclusive and accessible, and should not involve
    or result in unfair discrimination against individuals, communities or groups.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-privacy-protection-and-security
  name: Privacy protection and security
  description: AI systems should respect and uphold privacy rights and data protection,
    and ensure the security of data.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-reliability-and-safety
  name: Reliability and safety
  description: AI systems should reliably operate in accordance with their intended
    purpose.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-transparency-and-explainability
  name: Transparency and explainability
  description: There should be transparency and responsible disclosure so people can
    understand when they are being significantly impacted by AI, and can find out
    when an AI system is engaging with them.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-contestability
  name: Contestability
  description: When an AI system significantly impacts a person, community, group
    or environment, there should be a timely process to allow people to challenge
    the use or outcomes of the AI system.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
- id: principle-au-accountability
  name: Accountability
  description: People responsible for the different phases of the AI system lifecycle
    should be identifiable and accountable for the outcomes of the AI systems, and
    human oversight of AI systems should be enabled.
  hasDocumentation:
  - doc-australia-ai-ethics-principles
  type: Principle
