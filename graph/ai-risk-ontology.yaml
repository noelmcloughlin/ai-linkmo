  type: Action
  hasDocumentation:
  - doc-Wiener2024
- id: A0269_EU_AI_Office2025
  name: Public Transparency
  description: Signatories commit to publishing information relevant to the public
    understanding of systemic risks stemming from their GPAISRs, where necessary to
    effectively enable assessment and mitigation of systemic risks, including new
    or updated versions of their Frameworks and Model Reports.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-EU AI Office2025
- id: A0273_EU_AI_Office2025
  name: Safety and Security Model Reports
  description: 'Signatories should commit to reporting to the AI Office about their
    implementation of the Code, and especially the application of their Framework
    to the development, making available on the market, and/or use of their GPAISRs,
    by creating a Safety and Security Model Report, which will document: (1) the results
    of systemic risk assessment and mitigation for the model in question; and (2)
    justifications of decisions to make the model in question available on the market.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-EU AI Office2025
- id: A0280_Campos2025
  name: Stakeholder Sharing of Risk Documentation
  description: The results of the risk modeling work should be well documented, including
    the methodologies used, the experts involved, and the list of identified scenarios.
    This documentation should be shared with relevant stakeholders
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Campos2025
- id: A0411_NIST2024
  name: National Security Involvement
  description: When systems may raise national security risks, involve national security
    professionals in mapping, measuring, and managing those risks.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0501_NIST2024
  name: Pre-Deployment Results Sharing
  description: Share results of pre-deployment testing with relevant GAI Actors, such
    as those with system release approval authority
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0526_NIST2024
  name: Annotator Instruction Documentation
  description: Document the instructions given to data annotators or AI red-teamers.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0632_Barrett2024
  name: Document Mitigation Rationale
  description: 'Document the process used in considering risk mitigation controls,

    the options considered, and reasons for choices.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0646_Barrett2024
  name: Document & Share AI Risk Impacts
  description: 'Organizational teams

    document the risks and

    potential impacts of

    the AI technology they

    design, develop, deploy,

    evaluate, and use, and

    they communicate

    about the impacts more

    broadly.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Barrett2024
- id: A0755_NIST2024
  name: Human-AI Configuration; Harmful Bias and Homogenization
  description: 'Share transparency reports with internal and external stakeholders
    that detail

    steps taken to update the GAI system to enhance transparency and

    accountability'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0782_UK_Government2023
  name: Risk Assessment Disclosure to Third Parties
  description: 'Regularly update relevant stakeholders on risk assessment and mitigation
    measures: This will enable assessment of whether AI organisations have sufficient
    risk management processes in place, build up a picture of best practices, and
    make recommendations to address gaps. When sharing this information with external
    actors, consideration should be given to commercially sensitive information. Additional
    ad hoc updates could be provided in cases of major developments.Include information
    on evaluations, risk assessment and mitigation, and individuals involved. For
    example: 1) What types of tests and evaluations are being run on which types of
    models; 2) What other risk assessment methods are being used, which kinds of expertise
    are

    drawn on, and whether impacted stakeholders are being involved; 3) How risk mitigation
    measures are being monitored; 4) Which teams and individuals are involved at different
    stages of the risk management process (and how, if at all, third parties are involved);
    5) Measures taken to address specific categories of risk, such as cybersecurity
    measures'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0803_UK_Government2023
  name: Discretionary Evaluator Disclosure
  description: Allow evaluators to share and discuss the results of their evaluations,
    with potential restrictions where necessary e.g. not sharing proprietary information,
    information whose spread could lead to substantial harm or information that would
    have an adverse effect on competition in the market. Sharing the results of evaluations
    can allow governments, regulators, users, and other frontier AI organisations
    to make informed decisions.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0805_UK_Government2023
  name: Disclosure of Model Evaluation Research and Development
  description: Share the products of their model evaluation research and development,
    except when sharing the results might be harmful. In some cases, findings (e.g.
    about how to elicit dangerous capabilities) could be harmful if spread. When the
    expected harm is sufficiently small, the AI research community, other frontier
    AI organisations, and relevant government bodies could benefit from being informed
    of their work.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0806_UK_Government2023
  name: Disclosure of Risk Assessment Processes
  description: Share details of risk assessment processes and risk mitigation measures
    with relevant government authorities and other AI companies, as set out in Responsible
    Capability Scaling.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0809_UK_Government2023
  name: Pre-training Disclosure of High-Level Model Details to Government Authorities
  description: 'Before training, share high-level model details with the relevant
    government authorities and justify why the training run does not impose unacceptable
    risk. This includes: 1) A high-level description of the model (including high-level
    information on intended use cases, intended users, training data, and model architecture);
    2) Compute details (including the maximum the organisation plans to use, as well
    as information about its location and who provides it); 3) Description of the
    data that will be used to train the model; 4) Evidence from scaling small models
    that the full training run does not pose unacceptably high risks; 5) Descriptions
    of specific internal and external risk assessments and mitigation efforts,3 and
    an overall safety assessment justifying why and how the training run is sufficiently
    low-risk to execute; 6) Description of which, if any, domain experts and impacted
    stakeholders have been involved in the project’s design, as well as risk and impact
    assessment; 7) Plans for model evaluations during and after training, as well
    as predicted dangerous capabilities'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0810_UK_Government2023
  name: Updates to Government Authorities During Training
  description: 'During training, update information provided to relevant government
    authorities with any significant changes to the model itself or its risk profile.
    This could include: 1) Updates on model development at each evaluation checkpoint
    as well as any significant updates to the development plan; 2) Results from model
    evaluations, including details of emergent dangerous capabilities and whether
    these were expected; 3) Whether and how the risk context has changed (e.g. if
    other AI tools have been published that the model could interact with)'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0811_UK_Government2023
  name: Disclosure of Risk Context to Government Authorities at Deployment
  description: 'At the point of deployment, share details of the model, any risks
    the model might pose and what steps have been taken to mitigate those risks with
    relevant government authorities and the wider public. Information can be provided
    in full to the relevant government authority, ensuring that robust security measures
    are in place to protect sensitive information. Some of this information can be
    made available to the public by publishing a transparency report (e.g. a model
    card) and providing general overviews of model purpose and risk assessment evaluation
    results. Information that exposes model vulnerabilities or facilitates the spread
    of dangerous capabilities should be redacted from the transparency report, unless
    sharing this information publicly would be sufficiently helpful for mitigating
    the risks the model poses. Information that is commercially sensitive (e.g. detailed
    information on training data) or exposes the capabilities or vulnerabilities of
    the model should be redacted. Commercially sensitive information could be shared
    with government or regulators, who could share this information with industry
    in an aggregated or anonymised form. Information shared at deployment could include:
    1) A description of the model; 2) Information about safe practices for model usage
    (including domains of inappropriate and appropriate use, or guidelines on determining
    whether a use is appropriate); 3) Training details, including a detailed description
    of the training data and any biases they may encode; 4) The model’s biases, risks
    and limitations; 5) Pre-development and pre-deployment risk and impact assessment
    procedures; 6) Details of the evaluation process the frontier AI organisation
    conducted, including time and resources spent, information about the expertise
    and independence of people conducting the evaluations, the level of access given
    to evaluators, and anticipated limitations of the evaluations used; 7) Details
    about which, if any, domain experts and impacted stakeholders have been involved
    in the project’s design and risk and impact assessment; 8) The results of any
    internal or external evaluations that were conducted; 9) Holistic assessments
    of the models’ robustness, interpretability, and controllability,

    drawing on more specific evaluation results; 9) Significant measures taken to
    mitigate potential harmful consequences of deployment, including accountability
    and verification mechanisms put in place, and internal governance processes carried
    out; 10) Capabilities and risks of the final, public-release model before and
    after safety mitigations, including a description of the mitigations to prevent
    accidents and misuse (e.g. available tools and their expected effectiveness);
    11) Plans for ongoing, post-deployment monitoring of risks and capabilities and
    how the organisation will respond to future incidents (unless releasing this information
    would allow bad actors to circumvent post-deployment safety measures); 12) Descriptions
    of post-deployment access controls; 13) Expected compute requirements for running
    the model during deployment'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0812_UK_Government2023
  name: Adjucation around Publicly Sharing Risks
  description: Before sharing information, consider the risks of sharing this information
    and judge whether it is inappropriate to share certain pieces of information.
    In particular, it is important to consider potential harms from publicly sharing
    information about dangerous capabilities and methods for eliciting them, as this
    information could motivate or help other actors to acquire these capabilities.
    It is also important to consider potential harms from publicly sharing detailed
    information about how models were produced, as this may lower barriers to producing
    similar models. If the models have or could be modified to possess dangerous capabilities
    (e.g. biological capabilities or surveillance capabilities), then facilitating
    widespread distribution of the model in this way may be harmful. The National
    Protective Security Authority (NPSA) guidance on a security-minded approach to
    information management may prove helpful for sharing information appropriately.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0813_UK_Government2023
  name: Principled Policies for Disclosure
  description: Develop principled policies about what information to share publicly,
    with governments, or not at all. These policies could specify situations under
    which sharing some piece of information is subject to a risk assessment, along
    with guidelines for conducting the risk assessment and responding to it. It is
    important, however, to avoid creating risk assessment criteria and procedures
    that are overly strict and intensive to prevent excessive opacity. These policies
    could be guided and overseen by an independent review panel of multidisciplinary
    experts to ensure decisions made about or against information sharing are justifiable
    and oriented to optimal transparency.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0814_UK_Government2023
  name: Disclosure of Information with AI-focused Government Authorities
  description: Share complete forms of this information with central AI-focused government
    authorities (including central government bodies, security agencies, and regulators)
    to enable robust government oversight of potentially high-risk areas of AI development
    and the processes in place to identify and manage those risks. These authorities
    could then further share information selectively with additional government bodies
    where relevant. Some particularly security-relevant pieces of information may
    need to be shared directly with security agencies, such as the cybersecurity measures
    being used in model development (which would make it easier for those agencies
    to identify potential security risks), or specific physical or cybersecurity threat
    incidents. Robust security measures are in place when sharing more sensitive information.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0815_UK_Government2023
  name: Sharing of Limited Information
  description: Share more limited information with other AI organisations in order
    to facilitate learning and the development of best practices. This could include
    best practices and lessons learned in the development of risk assessment and mitigation
    measures and risk governance processes, some details about safety and security
    incidents (to enable increased awareness while protecting intellectual property),
    and highlights and lessons learned from risk assessments and capability evaluation.
    In general, it will be easier for organisations to share model-agnostic information
    with one another than model-specific information, which may be more commercially
    sensitive. It will also be important to consider that there is no privileged access
    to information that may give a competitive advantage to some firms.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0818_UK_Government2023
  name: Sharing General Information with the Public
  description: Share more general versions of the information outlined with the public
    to enable public scrutiny and build public confidence in the safety and reliability
    of AI systems. This could include high-level summaries of risk assessment and
    mitigation processes, high-level details of safety and security incidents, summaries
    of risk governance processes, and general overviews of model purpose, use cases,
    and the results of risk assessments and capability evaluations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0863_UK_Government2023
  name: Cost-Benefit Analysis of Sharing Vulnerability Reports
  description: Consider the ways in which sharing information about vulnerabilities
    can both exacerbate and mitigate risks. Sharing can alert would-be attackers,
    but also alert would-be victims and actors with the power to create defences.
    One particularly important factor is how easily fixable the model vulnerability
    is. If a vulnerability will take a very long time to fix, or cannot be fixed,
    then public reporting may not be justified.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0864_UK_Government2023
  name: Development of Protocols for Disclosure of Model Vulnerability Information
  description: Developing – and publicly describe – protocols for deciding how to
    share model vulnerability information. These protocols may, for example, outline
    conditions under which information is to be shared with different actors depending
    on the type of harm or vulnerability identified.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0865_UK_Government2023
  name: Mechanisms to Disclose Vulnerability Reports to Third Parties
  description: Put in place mechanisms to disclose information about vulnerabilities
    to relevant government authorities, law enforcement, and other affected organisations.
    This may be particularly relevant for vulnerabilities where public disclosure
    might increase the risk of harm.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0866_UK_Government2023
  name: Public Sharing of Model Vulnerability Reporting Programs
  description: Publicly share general lessons learned from model vulnerability reporting
    programs. This might include, for example, lessons about challenges faced and
    the relative efficacy of different incentive strategies. Such sharing could be
    done via a mechanism similar to the National Institute for Science and Technology’s
    National Vulnerability Database in the US.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0882_UK_Government2023
  name: Discretion around sharing Defense Tools
  description: Disseminate defensive tools responsibly, sometimes sharing them publicly
    and sometimes sharing them only with particular actors. In some cases, making
    a tool freely available (e.g. by open-sourcing it) may reduce its effectiveness
    by allowing malicious actors to study it and circumvent it.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0888_UK_Government2023
  name: Public Sharing of Societal Impact Assessments
  description: In the absence of sufficiently substantial downsides to sharing, frontier
    AI organisations are encouraged to share the products of this work broadly.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0890_UK_Government2023
  name: Reporting of Broad Patterns of Misuse
  description: Report information on broad patterns of misuse. This information can
    help governments, the public, and other frontier AI organisations to better understand
    risks. Reports may focus on population-level metrics related to API usage, such
    as the rate of harmful inputs filtered or the number of users banned for misuse.
    This information may benefit from being presented in a clear and understandable
    way and made optimally accessible.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0903_UK_Government2023
  name: Protocols for Sharing API users Information with government authorities
  description: Establish protocols for deciding when and how to share information
    about API users with relevant government authorities. These protocols may include
    covering circumstances under which information about a user is proactively shared
    with government bodies (e.g. cases where there is reason to think a user may be
    attempting to cause grave harm), and how to respond to government requests for
    data.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0933_UK_Government2023
  name: Disclosure of Input Data Audits with External Stakeholders
  description: Share information about input data audits with users and external stakeholders.
    Some information could be included in transparency reports, such as high-level
    information about training data (including data sources), data auditing procedures,
    and measures taken to reduce risk (see Model Reporting and Information Sharing).
    More sensitive information may be shared directly with regulators and external
    auditors.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A1032_Uuk2024
  name: Pre-registration of large training runs
  description: Registering upcoming training runs above a certain size with an appropriate
