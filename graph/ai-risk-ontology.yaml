- id: A0895_UK_Government2023
  name: Discretion for Development, Storage, and Sharing of Content Filters
  description: Exercise appropriate caution when developing, storing, or sharing content
    filters – and any specialised datasets used to produce them. In some cases, components
    of filters or datasets used to create them can be used to train higher-risk models.
    For instance, a classifier that evaluates the aggressiveness of a model’s outputs
    may be used to train the model to be more aggressive.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0984_Gipiškis2024
  name: Protect proprietary or unreleased AI model ar- chitecture and parameters
  description: 'The developers of AI models can invest in cybersecurity to prevent
    compute re- sources, training source code, model weights, and other critical resources
    from being accessed and copied by unauthorized third parties (e.g., through insider
    threats or supply chain attacks).

    Access to model source code and weights can be restricted through an access control
    scheme, such as role-based access control. If access to model outputs by third
    parties is required, it can be provided through an API. Air gaps can block unauthorized
    remote access. In the case of necessary interaction with an external network,
    network bandwidth limitations can also be enforced to increase the detection window
    of potential breaches [108].'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0985_Gipiškis2024
  name: Hardware limitations on data center network connections
  description: 'Hardware-enforced bandwidth limitations on data center network connections
    can protect AI model weights from unauthorized access or exfiltration, by lim-
    iting the speed of model weight access on the connections between data centers
    and the outside world.

    Such limitations can be put in place in multiple ways, for example by only constructing
    connections with a specific bandwidth. The output rate on all data channels can
    be set low enough that copying the weights is possible in principle (e.g., to
    enable regular backups), but would take so long that an unauthorized exfiltration
    of the weights could be detected and prevented.

    Such rate-limiting is only effective if it applies to all output connections for
    all storage locations on which the weights of the model are stored [139].'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1045_Uuk2024
  name: Advanced information security
  description: Implementing advanced cybersecurity measures and insider threat safeguards
    to protect proprietary and unreleased model weights.
  isCategorizedAs:
