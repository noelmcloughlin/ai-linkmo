- id: atlas-data-privacy-rights
  name: Data privacy rights alignment
  description: Applicable laws can establish data subject rights such as opt-out rights,
    right to access, and right to be forgotten. Synthetic data might raise unique
    concerns, such as the potential for reidentification of individuals from seemingly
    anonymous synthetic data. Data subject rights might also be relevant in scenarios
    where synthetic data is derived from sensitive or personal information.
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/data-privacy-rights.html
