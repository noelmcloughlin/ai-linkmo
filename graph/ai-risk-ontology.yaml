- id: doc-Schuett2023
  name: 'Towards Best Practices in AGI Safety and Governance: A Survey of Expert Opinion'
  description: A number of leading AI companies, including OpenAI, Google DeepMind,
    and Anthropic, have the stated goal of building artificial general intelligence
    (AGI) - AI systems that achieve or exceed human performance across a wide range
    of cognitive tasks. In pursuing this goal, they may develop and deploy AI systems
    that pose particularly significant risks. While they have already taken some measures
    to mitigate these risks, best practices have not yet emerged. To support the identification
    of best practices, we sent a survey to 92 leading experts from AGI labs, academia,
    and civil society and received 51 responses. Participants were asked how much
    they agreed with 50 statements about what AGI labs should do. Our main finding
    is that participants, on average, agreed with all of them. Many statements received
    extremely high levels of agreement. For example, 98% of respondents somewhat or
    strongly agreed that AGI labs should conduct pre-deployment risk assessments,
    dangerous capabilities evaluations, third-party model audits, safety restrictions
    on model usage, and red teaming. Ultimately, our list of statements may serve
    as a helpful foundation for efforts to develop best practices, standards, and
    regulations for AGI labs.
  url: https://arxiv.org/abs/2305.07153
  dateCreated: 2023-05-11
  dateModified: 2023-05-11
  author: Jonas Schuett, Noemi Dreksler, Markus Anderljung, David McCaffary, Lennart
    Heim, Emma Bluemke, Ben Garfinkel
- id: doc-Uuk2024
  name: Effective Mitigations for Systemic Risks from General-Purpose AI
  description: 'The systemic risks posed by general-purpose AI models are a growing
    concern, yet the effectiveness of mitigations remains underexplored. Previous
    research has proposed frameworks for risk mitigation, but has left gaps in our
    understanding of the perceived effectiveness of measures for mitigating systemic
    risks. Our study addresses this gap by evaluating how experts perceive different
    mitigations that aim to reduce the systemic risks of general-purpose AI models.
    We surveyed 76 experts whose expertise spans AI safety; critical infrastructure;
    democratic processes; chemical, biological, radiological, and nuclear risks (CBRN);
    and discrimination and bias. Among 27 mitigations identified through a literature
    review, we find that a broad range of risk mitigation measures are perceived as
    effective in reducing various systemic risks and technically feasible by domain
    experts. In particular, three mitigation measures stand out: safety incident reports
    and security information sharing, third-party pre-deployment model audits, and
    pre-deployment risk assessments. These measures show both the highest expert agreement
    ratings (>60%) across all four risk areas and are most frequently selected in
    experts'' preferred combinations of measures (>40%). The surveyed experts highlighted
    that external scrutiny, proactive evaluation and transparency are key principles
    for effective mitigation of systemic risks. We provide policy recommendations
    for implementing the most promising measures, incorporating the qualitative contributions
    from experts. These insights should inform regulatory frameworks and industry
    practices for mitigating the systemic risks associated with general-purpose AI.'
  url: https://doi.org/10.48550/arXiv.2412.02145
  dateCreated: 2024-11-14
  dateModified: 2024-11-14
  author: Risto Uuk, Annemieke Brouwer, Tim Schreier, Noemi Dreksler, Valeria Pulignano,
    Rishi Bommasani
- id: doc-Wiener2024
  name: California State Senate Bill 1047
  description: Proposed legislation establishing safety requirements for organizations
    developing frontier AI models - specifically, models which cost more than $100
    million to train, with compute of >10^26 FLOP (or fine-tuned models of similar
    size). Though ultimately vetoed by the Governor of California, SB 1047 set important
    precedents for AI regulation.
  url: https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB1047
  dateCreated: 2024-02-07
  dateModified: 2024-02-07
  author: 'Senator Wiener, Coauthors: Senators Roth, Rubio, and Stern'
- id: doc-FLI2024
  name: FLI AI Safety Index 2024
  description: The 2024 FLI AI Safety Index conducted a comprehensive review of six
    prominent AI companies by an independent panel of seven technical AI and governance
    specialists. Key findings include significant risk management discrepancies across
    the companies, vulnerability to adversarial attacks, lack of control protocols,
    and the insufficient external oversight. Mitigation strategies are recommended
    to counteract these AI risk deficiencies.
  url: https://futureoflife.org/document/fli-ai-safety-index-2024/
  dateCreated: 2024-12-11
  dateModified: 2024-12-11
  author: Future of Life Institute
- id: doc-Casper2025
  name: Pitfalls of Evidence-Based AI Policy
  description: Nations across the world are working to govern AI. However, from a
    technical perspective, there is uncertainty and disagreement on the best way to
    do this. Meanwhile, recent debates over AI regulation have led to calls for 'evidence-based
    AI policy' which emphasize holding regulatory action to a high evidentiary standard.
    Evidence is of irreplaceable value to policymaking. However, holding regulatory
    action to too high an evidentiary standard can lead to systematic neglect of certain
    risks. In historical policy debates (e.g., over tobacco ca. 1965 and fossil fuels
    ca. 1985) 'evidence-based policy' rhetoric is also a well-precedented strategy
    to downplay the urgency of action, delay regulation, and protect industry interests.
    Here, we argue that if the goal is evidence-based AI policy, the first regulatory
    objective must be to actively facilitate the process of identifying, studying,
    and deliberating about AI risks. We discuss a set of 15 regulatory goals to facilitate
    this and show that Brazil, Canada, China, the EU, South Korea, the UK, and the
    USA all have substantial opportunities to adopt further evidence-seeking policies.
  url: https://arxiv.org/abs/2502.09618
  dateCreated: 2025-02-13
  dateModified: 2025-02-13
  author: Stephen Casper, David Krueger, Dylan Hadfield-Menell
- id: doc-Eisenberg2025
  name: 'The Unified Control Framework: Establishing a Common Foundation for Enterprise
    AI Governance, Risk Management and Regulatory Compliance'
  description: 'The rapid adoption of AI systems presents enterprises with a dual
    challenge: accelerating innovation while ensuring responsible governance. Current
    AI governance approaches suffer from fragmentation, with risk management frameworks
    that focus on isolated domains, regulations that vary across jurisdictions despite
    conceptual alignment, and high-level standards lacking concrete implementation
    guidance. This fragmentation increases governance costs and creates a false dichotomy
    between innovation and responsibility. We propose the Unified Control Framework
    (UCF): a comprehensive governance approach that integrates risk management and
    regulatory compliance through a unified set of controls. The UCF consists of three
    key components: (1) a comprehensive risk taxonomy synthesizing organizational
    and societal risks, (2) structured policy requirements derived from regulations,
    and (3) a parsimonious set of 42 controls that simultaneously address multiple
    risk scenarios and compliance requirements. We validate the UCF by mapping it
    to the Colorado AI Act, demonstrating how our approach enables efficient, adaptable
    governance that scales across regulations while providing concrete implementation
    guidance. The UCF reduces duplication of effort, ensures comprehensive coverage,
    and provides a foundation for automation, enabling organizations to achieve responsible
    AI governance without sacrificing innovation speed.'
  url: https://arxiv.org/abs/2503.05937
  dateCreated: 2025-03-07
  dateModified: 2025-03-07
  author: Ian W. Eisenberg, Lucía Gamboa, Eli Sherman
- id: doc-EU AI Office2025
  name: 'EU AI Act: General Purpose AI Code of Practice (Draft 3)'
  description: The implementing guidance for the EU AI Act's requirements on general-purpose
    AI systems, detailing specific measures for systemic risk assessment, mitigation,
    and governance.
  url: https://code-of-practice.ai/
  dateCreated: 2025-07-10
  dateModified: 2025-07-10
  author: EU AI Office
- id: doc-Gipiškis2024
  name: Risk sources and risk management measures in support of standards for general-purpose
    AI systems
  description: There is an urgent need to identify both short and long-term risks
    from newly emerging types of Artificial Intelligence (AI), as well as available
    risk management measures. In response, and to support global efforts in regulating
    AI and writing safety standards, we compile an extensive catalog of risk sources
    and risk management measures for general-purpose AI (GPAI) systems, complete with
    descriptions and supporting examples where relevant. This work involves identifying
    technical, operational, and societal risks across model development, training,
    and deployment stages, as well as surveying established and experimental methods
    for managing these risks. To the best of our knowledge, this paper is the first
    of its kind to provide extensive documentation of both GPAI risk sources and risk
    management measures that are descriptive, self-contained and neutral with respect
    to any existing regulatory framework. This work intends to help AI providers,
    standards experts, researchers, policymakers, and regulators in identifying and
    mitigating systemic risks from GPAI systems. For this reason, the catalog is released
    under a public domain license for ease of direct use by stakeholders in AI governance
    and standards.
  url: https://arxiv.org/abs/2410.23472
  dateCreated: 2024-10-30
  dateModified: 2024-10-30
  author: Rokas Gipiškis, Ayrton San Joaquin, Ze Shen Chin, Adrian Regenfuß, Ariel
    Gil, Koen Holtman
- id: doc-UK Government2023
  name: Emerging Processes for Frontier AI Safety
  description: The UK recognises the enormous opportunities that AI can unlock across
    our economy and our society. However, without appropriate guardrails, such technologies
    can pose significant risks. The AI Safety Summit will focus on how best to manage
    the risks from frontier AI such as misuse, loss of control and societal harms.
    Frontier AI organisations play an important role in addressing these risks and
    promoting the safety of the development and deployment of frontier AI. The UK
    has therefore encouraged frontier AI organisations to publish details on their
    frontier AI safety policies ahead of the AI Safety Summit hosted by the UK on
    1 to 2 November 2023. This will provide transparency regarding how they are putting
    into practice voluntary AI safety commitments and enable the sharing of safety
    practices within the AI ecosystem. Transparency of AI systems can increase public
    trust, which can be a significant driver of AI adoption. This document complements
    these publications by providing a potential list of frontier AI organisations'
    safety policies. These have been gathered after extensive research and will need
    updating regularly given the emerging nature of this technology. The safety processes
    are not listed in order of importance but are summarised in themes. The government
    is not suggesting or mandating any particular combination of policies – merely
    detailing the current suite available so that others can understand, interpret
    and compare frontier companies' safety policies. This document contains the world's
    first overview of emerging safety processes focused on frontier AI and is intended
    to be a useful tool to boost transparency. This conversation is for frontier AI
    and whilst it is important that safety is applied throughout the AI sector, it
    is also important that innovation is not stifled, hence why policies must be proportionate
    and based on capabilities which are the key driver of risk. This document contains
    processes and associated practices that some frontier AI organisations are already
    implementing and others that are being considered within academia and broader
    civil society. It is intended as a guide for readers of frontier AI companies'
    AI safety policies to better understand what good policy might look like, though
    organisations themselves will be best placed to determine their applicability.
    Through this exercise, the government intends to help inform dialogue on potential
    appropriate measures for individual organisations to consider at the UK AI Safety
    Summit.
  url: https://www.gov.uk/government/publications/emerging-processes-for-frontier-ai-safety
  dateCreated: 2023-10-27
  dateModified: 2023-10-27
  author: UK Government
- id: doc-Campos2025
  name: 'A Frontier AI Risk Management Framework: Bridging the Gap Between Current
    AI Practices and Established Risk Management'
  description: 'The recent development of powerful AI systems has highlighted the
    need for robust risk management frameworks in the AI industry. Although companies
    have begun to6 implement safety frameworks, current approaches often lack the
    systematic rigor found in other high-risk industries. This paper presents a comprehensive
    risk management framework for the development of frontier AI that bridges this
    gap by integrating established risk management principles with emerging AI-specific
    practices. The framework consists of four key components: (1) risk identification
    (through literature review, open-ended red-teaming, and risk modeling), (2) risk
    analysis and evaluation using quantitative metrics and clearly defined thresholds,
    (3) risk treatment through mitigation measures such as containment, deployment
    controls, and assurance processes, and (4) risk governance establishing clear
    organizational structures and accountability. Drawing from best practices in mature
    industries such as aviation or nuclear power, while accounting for AI''s unique
    challenges, this framework provides AI developers with actionable guidelines for
    implementing robust risk management. The paper details how each component should
    be implemented throughout the life-cycle of the AI system - from planning through
    deployment - and emphasizes the importance and feasibility of conducting risk
    management work prior to the final training run to minimize the burden associated
    with it'
  url: https://arxiv.org/pdf/2502.06656
  dateCreated: 2025-02-19
  dateModified: 2025-02-19
  author: Simeon Campos, Henry Papadatos, Fabien Roger, Chloé Touzet, Otter Quarks,
    Malcolm Murray
- id: doc-Barrett2024
  name: AI Risk Management Standards Profile for GPAIS
  description: Increasingly multi-purpose AI systems, such as cutting-edge large language
    models or other 'general-purpose AI' systems (GPAI or GPAIS), 'foundation models,'
    generative AI, and 'frontier models' (typically all referred to hereafter with
    the umbrella term GPAIS except where greater specificity is needed), can provide
    many beneficial capabilities but also risks of adverse events with profound consequences.
    This document provides risk-management practices or controls for identifying,
    analyzing, and mitigating risks of GPAIS. We intend this document primarily for
    developers of large-scale, state-of-the-art GPAIS; others that can benefit from
    this guidance include downstream developers of end-use applications that build
    on a GPAIS platform. This document facilitates conformity with or use of leading
    AI risk management-related standards, adapting and building on the generic voluntary
    guidance in the NIST AI Risk Management Framework and ISO/IEC 23894, with a focus
    on the unique issues faced by developers of GPAIS.
  url: https://cltc.berkeley.edu/wp-content/uploads/2023/11/Berkeley-GPAIS-Foundation-Model-Risk-Management-Standards-Profile-v1.0.pdf#page=83
  dateCreated: 2024-11-01
  dateModified: 2024-11-01
  author: Barrett
- id: credo-doc
  name: 'The Unified Control Framework: Establishing a Common Foundation for Enterprise
    AI Governance, Risk Management and Regulatory Compliance'
  description: The rapid advancement and deployment of AI systems have created an
    urgent need for standard safety-evaluation frameworks. This paper introduces AILuminate
    v1.0, the first comprehensive industry-standard benchmark for assessing AI-product
    risk and reliability. Its development employed an open process that included participants
    from multiple fields. The benchmark evaluates an AI system's resistance to prompts
    designed to elicit dangerous, illegal, or undesirable behavior in 12 hazard categories,
    including violent crimes, nonviolent crimes, sex-related crimes, child sexual
    exploitation, indiscriminate weapons, suicide and self-harm, intellectual property,
    privacy, defamation, hate, sexual content, and specialized advice (election, financial,
    health, legal). Our method incorporates a complete assessment standard, extensive
    prompt datasets, a novel evaluation framework, a grading and reporting system,
    and the technical as well as organizational infrastructure for long-term support
    and evolution. In particular, the benchmark employs an understandable five-tier
    grading scale (Poor to Excellent) and incorporates an innovative entropy-based
    system-response evaluation. In addition to unveiling the benchmark, this report
    also identifies limitations of our method and of building safety benchmarks generally,
    including evaluator uncertainty and the constraints of single-turn interactions.
    This work represents a crucial step toward establishing global standards for AI
    risk and reliability evaluation while acknowledging the need for continued development
    in areas such as multiturn interactions, multimodal understanding, coverage of
    additional languages, and emerging hazard categories. Our findings provide valuable
    insights for model developers, system integrators, and policymakers working to
    promote safer AI deployment.
  url: https://arxiv.org/pdf/2503.05937v1
  dateCreated: 2025-03-07
  dateModified: 2025-03-07
- id: doc-un-ethical-use-of-ai-principles
  name: Principles for the ethical use of artificial intelligence in the United Nations
    system
  description: 'This set of ten principles, grounded in ethics and human rights, aims
    to guide the use of artificial intelligence (AI) across all stages of an AI system
    lifecycle across United Nations system entities. It is intended to be read with
    other related policies and international law, and includes the following principles:
    do no harm; defined purpose, necessity and proportionality; safety and security;
    fairness and non-discrimination; sustainability; right to privacy, data protection
    and data governance; human autonomy and oversight; transparency and explainability;
    responsibility and accountability; and inclusion and participation.'
  url: https://unsceb.org/principles-ethical-use-artificial-intelligence-united-nations-system
  dateCreated: 2022-09-01
  author: United Nations System Chief Executives Board for Coordination
