  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0475_NIST2024
  name: Provenance Testing Practices
  description: Apply TEVV practices for content provenance (e.g., probing a system's
    synthetic data generation capabilities for potential misuse or vulnerabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0479_NIST2024
  name: Adversarial Role-Playing
  description: Conduct adversarial role-playing exercises, GAI red-teaming, or chaos
    testing to identify anomalous or unforeseen failure modes.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0485_NIST2024
  name: Demographic Metric Disaggregation
  description: Disaggregate evaluation metrics by demographic factors to identify
    any discrepancies in how content provenance mechanisms work across diverse populations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0486_NIST2024
  name: Feedback Exercise Metrics
  description: Develop a suite of metrics to evaluate structured public feedback exercises
    informed by representative AI Actors.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0487_NIST2024
  name: Novel Risk Measurement Methods
  description: Evaluate novel methods and technologies for the measurement of GAI-related
    risks including in content provenance, offensive cyber, and CBRN, while maintaining
    the models' ability to produce valid, reliable, and factually accurate outputs.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0489_NIST2024
  name: Data Quality Evaluation
  description: Evaluate the quality and integrity of data used in training and the
    provenance of AI-generated content, for example by employing techniques like chaos
    engineering and seeking stakeholder feedback.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0490_NIST2024
  name: Feedback Exercise Use Cases
  description: Define use cases, contexts of use, capabilities, and negative impacts
    where structured human feedback exercises, e.g., GAI red-teaming, would be most
    beneficial for GAI risk measurement and management based on the context of use.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0493_NIST2024
  name: External Evaluation Engagement
  description: Engage in internal and external evaluations, GAI red-teaming, impact
    assessments, or other structured human feedback exercises in consultation with
    representative AI Actors with expertise and familiarity in the context of use,
    and/or who are representative of the populations associated with the context of
    use.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0494_NIST2024
  name: Feedback Independence Verification
  description: Verify those conducting structured human feedback exercises are not
    directly involved in system development tasks for the same GAI model.
  isCategorizedAs:
