- id: atlas-hallucination
  name: Hallucination
  description: Hallucinations generate factually inaccurate or untruthful content
    relative to the model's training data or input. Hallucinations are also sometimes
    referred to lack of faithfulness or lack of groundedness. In some instances, synthetic
    data that is generated by large language models might include hallucinations that
    result in the data possibly being inaccurate, fabricated, or disconnected from
    reality. Hallucinations can compromise model performance, accuracy, and relevance.
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/hallucination.html
  dateCreated: 2024-03-06
