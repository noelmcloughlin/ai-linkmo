    impact. Different model architectural choices result in varying environmental
    costs, and identifying and adopting more energy-efficient options can result in
    significant environmental savings, especially when implemented at scale. Consideration
    should be given to both training energy usage, and deployment (“inference”) usage
    for the expected model lifecycle.
