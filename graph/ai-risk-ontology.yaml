- id: A0808_UK_Government2023
  name: Reporting Security Details to Government Authorities
  description: Report any details of security or safety incidents or near-misses to
    relevant government authorities. This includes any compromise to the security
    of the organisation or its systems, or any incident where an AI system – deployed
    or not – causes substantial harm or is close to doing so. This will enable government
    authorities to build a clear picture of when safety and security incidents occur
    and make it easier to anticipate and mitigate future risks. Incident reports could
    include a description of the incident, the location, start and end date, details
    of any parties affected and harms occurred, any specific models involved, any
    relevant parties responsible for managing and responding to the incident, as well
    as ways in which the incident could have been avoided. It is important that incidents
    indicative of more severe risks are reported as soon as possible after they occur.
    High-level details of safety and security incidents - with sensitive information
    removed - could also be made public, such as have been shared in the AI incident
    database.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.3
  type: Action
  hasDocumentation:
