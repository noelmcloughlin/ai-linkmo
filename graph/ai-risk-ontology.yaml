  name: Unauthorized use
  description: "Unauthorized use: If attackers can gain access to the AI agent and\
    \ its components, they can perform actions that can have different levels of harm\
    \ depending on the agent's capabilities and information it has access to. Examples:\n\
    \ Using stored personal information to mimic identity or impersonate with an\n\
    intent to deceive.\n Manipulating AI agent's behavior via feedback to the AI agent\
    \ or corrupting\nits memory to change its behavior.\n Manipulating the problem\
    \ description or the goal to get the AI agent to behave\nbadly or run harmful\
    \ commands."
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/unauthorized-use-agentic.html
