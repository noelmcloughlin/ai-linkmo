  description: Foundational models provided by third-party SaaS vendors are vulnerable
    to supply chain risks, including tampering with training data, model weights,
    or infrastructure components such as GPU firmware and ML libraries. Malicious
    actors may introduce backdoors or adversarial triggers during training or fine-tuning,
    leading to unsafe or unfiltered behaviour under specific conditions. Without transparency
    or control over model provenance and update processes, consumers of these models
