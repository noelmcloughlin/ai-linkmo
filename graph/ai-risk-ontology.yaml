- id: atlas-legal-accountability
  name: Legal accountability
  description: Determining who is responsible for an AI model is challenging without
    good documentation and governance processes. The use of synthetic data in model
    development adds further complexity, since the lack of standardized frameworks
    for recording synthetic data design choices and verification steps makes accountability
    harder to establish.
