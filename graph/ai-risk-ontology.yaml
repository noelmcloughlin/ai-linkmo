- id: A0873_UK_Government2023
  name: Reliability and controllability (or “alignment”) research
  description: Improving the consistency of an AI system in adhering to the specifications
    it was programmed to carry out and operating in accordance with the designer’s
    intentions, and decreasing its potential to behave in ways its user or developer
    does not want (e.g. producing offensive or biased responses, not refusing harmful
    requests, or employing harmful capabilities without prompting)
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0896_UK_Government2023
  name: Fine-Tuning Models
  description: Fine-tune models to reduce the tendency to produce harmful outputs.
    This may involve using reinforcement learning from human or AI-generated feedback
    regarding the appropriateness of different model outputs e.g. a constitutional
    based approach where human input to the fine-tuning process is provided by a list
    of principles. It may also involve fine-tuning models on curated datasets of appropriate
    responses to prompts. Where human feedback is used, the mental wellbeing of moderators
    may need to be considered.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0929_UK_Government2023
  name: Harmful Data for Reduction of Dangerous Capabilities
  description: For some kinds of risks, explore options to use harmful data to reduce
    AI systems’ dangerous capabilities or to help develop mitigation tools. For example,
    by fine-tuning a system using labelled harmful content to refuse requests related
    to the harmful information.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0978_Gipiškis2024
  name: AI model-assisted oversight of AI systems
  description: 'AI model-assisted oversight can help monitor and supervise the training
    of increasingly capable GPAI systems, which may become difficult to oversee at
    scale by human supervisors during training or testing. Monitoring and supervision
    may become especially difficult in cases where increasingly advanced GPAIs perform
    near or above human level in some specialized domains, where supervision quality
    might fail to keep pace with capabilities improvement. The training signal may
    include labeled data, reward function, and user feedback on produced outputs.
    Currently, there are two broad approaches to provide scalable training signals
    to such systems:

    1. Scalable oversight: Improving of the supervisor’s capabilities to supervise,
    such that they can provide accurate training signals quickly and at scale [31].

    For example, a debate format can be used between two GPAI systems (two instances
    of the same GPAI, or similarly capable systems). A Human supervisor judges the
    debate, making it easier to assess correct responses in domains which might otherwise
    require significant time investment of domain specific expertise [102].

    2. Weak-to-strong generalization: Enhance the training signals while ensur- ing
    that the enhanced signal remains faithful to the intentions of the orig- inal
    human-provided signal [37].

    For example, a hierarchical (“bootstrapping”) oversight approach can be implemented:
    A series of GPAI models with increasing capabilities are used, where each model
    in the hierarchy provides oversight for the next more capable model. The least
    capable model at the base of the hierarchy is the only one directly overseen by
    human supervisors, as it is easier to oversee than the more capable models.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1011_Gipiškis2024
  name: GPAI models explaining model outputs in a zero-sum debate game
  description: 'Debate is a technique that aims to produce reliable explanations of
    AI model outputs that are too complicated for humans to understand, by letting
    two GPAI models role-playing in a debate produce an explanation in a dialogue
    [102].

    For example, an AI model may produce an output which is time-consuming for humans
    to verify as doing so may require going through extensive sources.

    Given such an output, the developer can use two natural language AI systems in
    an adversarial two-player setup to explain the output. These two natural language
    AI systems can be copies of the AI model that produced the output.

    In this setup, one AI system gives a short explanation of the output. The second
    AI system responds to this explanation with a counter-explanation or an argument
    why the first explanation was not correct. This continues for a fixed number of
    turns, with the two AI systems pointing out inconsistencies in each others’ explanations.

    After this sequence of statements, a human or an AI judge evaluates the ex- planations
    of both AI systems to determine which one is more convincing. The results of this
    debate can then be used for further training of the models via reinforcement learning,
    where outputs that are more truthful and convincing arguments and explanations
    are positively reinforced, while misleading or false outputs are negatively reinforced.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1026_Uuk2024
  name: Harmlessness training
  description: State-of-the-art reinforcement learning and fine-tuning techniques,
    such as Reinforcement Learning from Human Feedback (RLHF) or Direct Preference
    Optimization (DPO), to ensure models do not engage in unsafe behavior.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.2
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A0017_Bengio2025
  name: Safety Analysis
  description: 'Helps understand the dependencies between components and the system
    that they are part of, in order to anticipate how component failures could lead
    to system-level hazards.


    This approach is used across safety- critical fields, e.g. to anticipate and prevent
    aircraft crashes or nuclear reactor core meltdowns'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0019_Bengio2025
  name: Safety of The Intended Function
  description: 'An approach that requires engineers to provide evidence that a system
    is safe when operating as intended.


    This approach is used in many engineering fields, such as in the construction
    and testing of road vehicles.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0118_Future_of_Life_Institute2024
  name: Hazardous Knowledge Unlearning
  description: Has your organization removed hazardous knowledge from its flagship
    model via unlearning techniques before deployment?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0270_EU_AI_Office2025
  name: Safety Mitigations
  description: 'Signatories commit to: (1) implementing technical safety mitigations
    along the entire model lifecycle that are proportionate to the systemic risks
    arising from the development, the making available on the market, and/or the use
    of GPAISRs, in order to reduce the systemic risks of such models to acceptable
    levels, and further reduce systemic risk as appropriate; and (2) ensuring that
    safety mitigations are proportionate and state-of-the-art.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-EU AI Office2025
- id: A0417_NIST2024
  name: Threat Modeling Process
  description: Engage in threat modeling to anticipate potential risks from GAI systems
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0480_NIST2024
  name: Threat Profiling
  description: Profile threats and negative impacts arising from GAI systems interacting
    with, manipulating, or generating content, and outlining known and potential vulnerabilities
    and the likelihood of their occurrence.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0495_NIST2024
  name: Statistical Bias Management
  description: Assess and manage statistical biases related to GAI content provenance
    through techniques such as re-sampling, re-weighting, or adversarial training.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0498_NIST2024
  name: Privacy-Enhancing Technologies
  description: Use techniques such as anonymization, differential privacy or other
    privacy-enhancing technologies to minimize the risks associated with linking AI-generated
    content back to individual human subjects.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0514_NIST2024
  name: Inappropriate Query Handling
  description: Verify that systems properly handle queries that may give rise to inappropriate,
    malicious, or illegal usage, including facilitating manipulation, extortion, targeted
    impersonation, cyber-attacks, and weapons creation.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0518_NIST2024
  name: User Satisfaction Survey
  description: Conduct user surveys to gather user satisfaction with the AI-generated
    content and user perceptions of content authenticity. Analyze user feedback to
    identify concerns and/or current literacy levels related to content provenance
    and understanding of labels on content.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0529_NIST2024
  name: ML Explanation Application
  description: 'Apply and document ML explanation results such as: Analysis of embeddings,
    Counterfactual prompts, Gradient-based attributions, Model compression/surrogate
    models, Occlusion/term reduction.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0731_NIST2024
  name: Information Security; Harmful Bias and Homogenization
  description: 'Evaluate GAI content and data for representational biases and employ

    techniques such as re-sampling, re-ranking, or adversarial training to mitigate

    biases in the generated content. (AI Deployment, AI Impact Assessment, Governance
    and Oversight, Operation and Monitoring).'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0872_UK_Government2023
  name: Robustness Research
  description: Improving the resilience of AI systems e.g. against attacks intended
    to disrupt their proper functioning
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0874_UK_Government2023
  name: Bias and discrimination Research
  description: Improving our ability to address bias and discrimination in AI systems
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0878_UK_Government2023
  name: Research into other Societal Harms
  description: Improving our ability to prevent other societal harms arising from
    the use of AI systems, including psychological harm, misinformation, and other
    societal harms.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0879_UK_Government2023
  name: Built-in Tools for Harm Mitigation
  description: When a probable and consequential harm from a frontier AI organisation’s
    system is identified, investigate whether there are tools that can be built to
    mitigate this harm. For instance, recognizing the rise in AI-generated child exploitation
    and abuse content, some social media platforms are developing tools for identifying
    and removing child sexual abuse content.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0892_UK_Government2023
  name: Content Filters
  description: Apply content filters to both model inputs and model outputs. The input
    filters can block harmful requests (e.g. requests for advice on building weapons)
    from being processed by the model. Content modifiers could adjust harmful prompts
    to elicit non-harmful responses. The output filters can block harmful model outputs
    (e.g. instructions on building weapons) from being sent back to the user.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0894_UK_Government2023
  name: Robust Content Filters
  description: Invest in making content filters robust to “jailbreaking” attempts.
    Work to ensure filters are robust to jailbreaking attempts, for instance by including
    examples of jailbreaking attempts in the datasets used to develop filters.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0897_UK_Government2023
  name: Model Prompting
  description: Prompt models to avoid harmful behaviour. This may involve, for instance,
    using a “meta prompt” to instruct a model that it should ignore requests to cause
    harm. Alternatively, prompt distillation or other methods can be used to fine-tune
    their models to behave as though they have received particular prompts.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0898_UK_Government2023
  name: Rejection Sampling
  description: Consider also applying “rejection sampling” methods to model outputs.
    These methods involve generating several outputs, scoring them on their harmfulness,
    and then only presenting the least harmful outputs to the user.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0908_UK_Government2023
  name: Exploration of New Safeguards
  description: Explore new safeguards and countermeasures in response to patterns
    of misuse, recognising that appropriate measures may vary based on model type,
    usage patterns, and our technical understanding of model capabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0911_UK_Government2023
  name: Reduction of Costs for Users
  description: Explore strategies for reducing the costs of safeguards to users, such
    as “structured transparency” methods to reduce the cost of usage monitoring to
    user privacy, or tiered access to models with different safeguards for differently
    qualified users.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0935_Gipiškis2024
  name: Restrict web access during AI training
  description: Developers can restrict or disable AI systems’ internet access during
    training. For example, developers can restrict web access to read-only (e.g.,
    by disabling write-access through HTTP POST requests and access to web forms)
    or limit the access of the AI system to a local network
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0936_Gipiškis2024
  name: Adversarial training
  description: 'Adversarial training [83] is a technique for training AI models in
    which adver- sarial inputs are generated for a model, and the model is then trained
    to give the correct outputs for those adversarial inputs.

    Adversarial training can involve adversarial examples generated by human experts,
    human users, or other AI systems.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0939_Gipiškis2024
  name: Incorporating the estimation of atypical input samples or classes for better
    model reliability
  description: Incorporating the estimation of rare atypical input samples or classes
    might improve a model’s reliability, both with respect to its predictions and
    confidence calibration. Model predictions for rare inputs and classes may have
    a tendency of being overconfident and have worse accuracy scores [232]. For LLMs,
    the negative log-likelihood can be used as an atypicality measure. For discriminative
    models, Gaussian Mixture Models can be employed to estimate conditional and marginal
    distributions, which are then used in atypicality measurement.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0947_Gipiškis2024
  name: Enforcing model output interpretability post-training
  description: 'While a resulting trained model may be opaque with respect to its
    predictions, the final output in a system that involves the model can nonetheless
    be com- pletely interpretable.

    For example, a neuro-symbolic system for robot navigation can use a language model
    to generate potential navigation plans, then have a deterministic solver simulate
    executing valid plans [128]. The optimal plan found is executed in the real world
    and is interpretable.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0948_Gipiškis2024
  name: Paraphrasing to reduce hidden information
  description: Paraphrasing can mitigate steganography and encoded reasoning by reducing
    the physical size of the hidden information encoded in text [166].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0951_Gipiškis2024
  name: Modification of model internal representation
  description: 'Model providers can modify the internal representation of the model
    [135, 237] up to the granular level and in consultation with other tools that
    aid in under- standing what the internal representation of the model is.

    For example, if a model that is meant to give factual health data learned an incorrect
    fact, the model provider can use Linear Artificial Tomography (LAT) [237] to identify
    the representations responsible for the incorrect fact, and then modify that representation
    via modifying individual weights, or modify the en- tire representation itself
    by modifying entire layers.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0952_Gipiškis2024
  name: Incorporating goal uncertainty into AI systems to mitigate risky behaviors
  description: Incorporating uncertainty into AI system goals can prevent rushed decision-
    making and incentivize such systems to gather additional information or to refer
    to human oversight when faced with ambiguity [228].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0973_Gipiškis2024
  name: Pop-up interventions in LLMs
  description: 'Supplementary information can be shown to the user in specific query
    topics where factual accuracy is critical. This intervention can effectively divert
    users from potential inaccuracies generated by AI models in sensitive contexts.
    For example, during electoral processes, where model hallucinations can be particu-
    larly costly or have a negative impact on society, LLMs can offer their users
    the option of being redirected to accurate and up-to-date information sources
    [11].

    Since pop-up interventions can be intrusive to workflows, they are best used in
    situations where the benefits of the information outweigh the cost of distraction.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0983_Gipiškis2024
  name: Least Privilege access
  description: 'Deployers of an AI system can restrict its permissions to a whitelisted
    set of pre- determined options, such that all options not on the whitelist are
    not accessible to the AI [200, 146].

    The entries on the whitelist can be chosen to be as small as possible for the
    AI system to fulfill its intended purpose, to reduce the attack surface of external
    attackers, and to decrease the probability that the AI system accidentally takes
    actions with large unintended side-effects.

    For example, such whitelisting can apply to network connections, execution of
    other programs, access to knowledge bases, and the action space of the AI system.
    It can be implemented through running the AI system on an OS-level virtualization,
    on networks behind a firewall, and in extreme cases on air-gapped machines.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0990_Gipiškis2024
  name: Debiasing methods
  description: 'Providers of AI models can apply techniques to reduce the biases of
    their models.

    Current debiasing methods focus on three main types of bias:

    • Racial and religious bias - Stereotypes based on religious beliefs or racial
    beliefs.

    • Gender bias - Stereotypes tied to gender roles and expectations.

    • Political and cultural bias - Propagation of dominant ideologies or extrem-

    ist attitudes.

    Debiasing methods can be categorized based on their application during AI development:

    • Data pre-processing - Removing or correcting unwanted and biased data, and augmenting
    quality data to offset data bias, such as rebalancing datasets with counterfactual
    data augmentation.

    • During training - Intervening on the training dynamics of the AI model, such
    as introducing debiasing terms in the objective function or by nega- tively reinforcing
    biased outputs.

    • Post-training - Applying techniques to correct a trained but biased model, such
    as modifying the embedding space.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0991_Gipiškis2024
  name: Knowledge unlearning techniques
  description: Knowledge unlearning techniques allow specific information to be “forgotten”
    without the need for retraining the entire model, preserving its general capabil-
    ities. These techniques can be used to reduce privacy risks and protect against
    copyrighted or harmful content [96, 188].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1014_Gipiškis2024
  name: Tamper-resistant safeguards for open-weight models
  description: Training and implementing safeguards can improve the robustness of
    open- weight models against modifications from fine-tuning or other methods to
    change the learned weights of the models, especially those aimed at removing safety
    re- strictions. These safeguards can be resilient even after extensive fine-tuning,
    ensuring that the model retains its protective measures [199].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1019_Uuk2024
  name: Adversarial Robustness
  description: State-of-the-art methods such as adversarial training to make models
    robust to adversarial attacks (e.g., jailbreaking).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1021_Uuk2024
  name: Capability restrictions
  description: Restricting risky capabilities of deployed models, such as advanced
    autonomy (e.g., self-assigning new sub-goals, executing long-horizon tasks) or
    tool use functionalities (e.g., function calls, web browsing).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1027_Uuk2024
  name: Input and output filtering
  description: Monitoring for dangerous outputs (e.g., code that appears to be malware
    or viral genome sequences) and inputs that violate acceptable use policies to
    ensure models do not engage in harmful behavior.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A1042_Uuk2024
  name: Unlearning Techniques
  description: Removing specific harmful capabilities (e.g., pathogen design) from
    models using unlearning techniques.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.3
  type: Action
  hasDocumentation:
  - doc-Uuk2024
- id: A0033_Casper2025
  name: Labeling AI-generated content
  description: To aid in digital forensics, content produced from AI systems can be
    labeled with metadata, watermarks, and notices.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-Casper2025
- id: A0059_Eisenberg2025
  name: Implement content moderation system
  description: Implement automated and/or human-in-the-loop content moderation mechanisms
    to detect and filter harmful content in real-time, including content classification,
    blocking procedures, and automated enforcement of safety boundaries. Include detection
    of potential malicious use patterns.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0060_Eisenberg2025
  name: Implement content safety incident response
  description: Establish procedures for investigating, documenting, and remediating
    harmful content incidents that bypass moderation systems, including coordination
    with relevant authorities, root cause analysis, and system improvement protocols.
    Include specific procedures for suspected malicious use cases.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0087_Future_of_Life_Institute2024
  name: AI-Generated Content Watermarking
  description: 'Are the outputs of your firm’s AI systems tagged with watermarks that
    indicate that an AI generates the material?

    - Video

    - Image'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0108_Future_of_Life_Institute2024
  name: Deepfake creation policy
  description: Can individuals use your firm’s AI systems to create deepfakes (i.e.,
    synthetic audio or visual representations) of a specific individual?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0161_Future_of_Life_Institute2024
  name: Watermarking
  description: Information regarding integrated watermarking systems.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0398_NIST2024
  name: Harmful Content Prevention
  description: Establish policies and mechanisms to prevent GAI systems from generating
    CSAM, NCII or content that violates the law.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0424_NIST2024
  name: Provenance Method Measurement
  description: Establish policies for measuring the effectiveness of employed content
    provenance methodologies (e.g., cryptography, watermarking, steganography, etc.)
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0456_NIST2024
  name: Fact-Checking Deployment
  description: Deploy and document fact-checking techniques to verify the accuracy
    and veracity of information generated by GAI systems, especially when the information
    comes from multiple (or unknown) sources.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0457_NIST2024
  name: Synthetic Content Detection
  description: Develop and implement testing techniques to identify GAI produced content
    (e.g., synthetic media) that might be indistinguishable from human-generated content.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0473_NIST2024
  name: PII Detection Methods
  description: Leverage approaches to detect the presence of PII or sensitive data
    in generated output text, image, video, or audio.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0476_NIST2024
  name: Provenance Harm Identification
  description: Identify potential content provenance harms of GAI, such as misinformation
    or disinformation, deepfakes, including NCII, or tampered content. Enumerate and
    rank risks based on their likelihood and potential impact, and determine how well
    provenance solutions address specific risks and/or harms.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0483_NIST2024
  name: Origin Tracing Methods
  description: Employ methods to trace the origin and modifications of digital content.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0484_NIST2024
  name: Provenance Analysis Tools
  description: Integrate tools designed to analyze content provenance and detect data
    anomalies, verify the authenticity of digital signatures, and identify patterns
    associated with misinformation or manipulation.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0520_NIST2024
  name: Authentication Method Reliability
  description: Measure reliability of content authentication methods, such as watermarking,
    cryptographic signatures, digital fingerprints, as well as access controls, conformity
    assessment, and model integrity verification, which can help support the effective
    implementation of content provenance techniques. Evaluate the rate of false positives
    and false negatives in content provenance, as well as true positives and true
    negatives for verification.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0527_NIST2024
  name: Digital Content Transparency
  description: Use digital content transparency solutions to enable the documentation
    of each instance where content is generated, modified, or shared to provide a
    tamper-proof history of the content, promote transparency, and enable traceability.
    Robust version control systems can also be applied to track changes across the
    AI lifecycle over time.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0867_UK_Government2023
  name: Identification of AI-generated content
  description: Research techniques that allow AI-generated content to be identified.
    Invest in researching how AI-generated content may be watermarked, including AI-
    generated text, photos and videos, and experiment with the implementation of such
    techniques. It is particularly technically difficult to attach watermarks and
    prove the provenance of text.One method could involve making the model more statistically
    likely to use certain phrases or words in a way that is unnoticeable to humans,
    but can be picked up by a detector, provided a long enough sequence of text. However,
    this approach may not be robust to attempts to scrub off the watermark e.g. by
    having another AI model paraphrase the text.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0868_UK_Government2023
  name: Robust Watermarks for AI generated content
  description: Explore the use of watermarks for AI generated content that are robust
    to various perturbations. Explore the use of watermarks for AI generated content
    that are robust to various perturbations after their creation, including attempts
    at removal. To make the removal of watermarks more difficult, developers of generative
    AI models may need to consider how they distribute certain information about their
    watermarking methods or open-sourcing their classifiers. This may also include
    monitoring ways in which adversarial users are attempting to scrub off their watermarks
    and patching, where relevant, such means of circumvention. It also includes a
    recognition that watermarking however may not be appropriate in all circumstances
    given the limitations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0869_UK_Government2023
  name: AI Output Databases
  description: Explore databases of content generated or manipulated by a model to
    identify AI- generated content. These databases could be queried by third parties,
    including auditors and regulators, facilitating identification of potentially
    AI-generated content. Such databases could include only a subset of generated
    content, which is flagged as potentially important. To ensure user privacy, privacy-preserving
    techniques could be explored in conjunction with such databases, such as hashing
    technologies. This allows for the identification of AI-generated content without
    the need to store the actual content, thereby respecting user privacy. Additionally,
    common standards between different databases from various frontier AI organisations
    could facilitate a unified search, allowing for the identification of AI-generated
    content across all frontier AI organisations simultaneously.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0974_Gipiškis2024
  name: AI identification
  description: 'AI identifiers can be used to indicate that an AI is involved in a
    process or an interaction [40].

    For AI systems that interact directly with users, a visible output may be used,
    e.g., a displayed text message saying “I am an AI language model”, accompanied
    with the appropriate warnings and caveats relevant to the user, [40]. Whereas,
    for AI systems that interact with other systems or applications, other forms of
    watermark or unique identifiers can be used. In either situation, agent cards
    can serve as an identifier, where further details about the underlying AI system,
    the specific instance of the AI agent, and other information relevant to the development
    of the agent, can be included.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0975_Gipiškis2024
  name: AI output watermaking
  description: Output produced by or with AI assistance can be marked to clearly identify
    its origin. Verification of the watermark can involve the use of statistical tests
    or having the mark immediately visible to a human inspector. Ideally, the watermark
    does not significantly alter the utility of the output, and is robust against
    digital and physical manipulation that results in data degradation [216, 145].
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0976_Gipiškis2024
  name: AI output metadata
  description: Output produced or whose production is aided by AI can contain metadata
    to record its origin and the transformations it has undergone. Metadata is evidence
    that subsequent versions or its derivatives come from this original version. The
    metadata can include the original AI model source, along with ownership, and its
    subsequent edits [169]. For example, an image produced by an AI model can contain
    metadata showing the date of creation and the AI model that produced it. Subsequent
    versions can reference this information and, if they are intermediary versions,
    can include descriptions of any editing that has taken place.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2.4
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0937_Gipiškis2024
  name: Cost-inducing training of AI models specifically for malicious use
  description: AI models can be designed to make further post-training modifications
    (e.g., fine-tuning) too costly for malicious uses while preserving normal adaptability
    for non-malicious uses
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-2
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0001_Bengio2025
  name: Audits
  description: 'A formal review of an organisation’s compliance with standards, policies,
    and procedures, typically carried out by an external party.


    AI auditing is a rapidly growing field, but builds on long histories of auditing
    in other fields, including financial, environmental, and health regulation.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0002_Bengio2025
  name: Benchmarks
  description: A standardised, often quantitative test or metric used to evaluate
    and compare the performance of AI systems on a fixed set of tasks designed to
    represent real- world usage
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0010_Bengio2025
  name: Model Evaluation
  description: 'Processes to assess and measure an AI system''s performance on a particular
    task.

    There are countless AI evaluations to assess different capabilities and risks,
    including for security.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0011_Bengio2025
  name: Red Teaming
  description: An exercise in which a group of people or automated systems pretend
    to be an adversary and attack an organisation’s systems in order to identify vulnerabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Bengio2025
- id: A0053_Eisenberg2025
  name: Establish and apply performance testing and validation framework
  description: Implement comprehensive performance requirements, testing protocols,
    and validation procedures to ensure AI systems meet capability requirements and
    maintain reliable operation across intended use cases.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0055_Eisenberg2025
  name: Establish and apply fairness testing and validation framework
  description: Implement comprehensive procedures to validate model fairness during
    development and pre-deployment, including test dataset creation, metric definition,
    and systematic assessment of performance disparities across demographic groups.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0063_Eisenberg2025
  name: Implement adversarial testing and red team program
  description: Conduct systematic adversarial testing and red team exercises focused
    on probing AI system capabilities, identifying potential misuse vectors, and exposing
    unintended harmful behaviors. Testing should explore ways the system could be
    manipulated to produce dangerous outputs, bypass safety guardrails, or exhibit
    undesired emergent behaviors. Include scenarios involving both individual and
    coordinated attempts to exploit the system’s capabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.1
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0093_Future_of_Life_Institute2024
