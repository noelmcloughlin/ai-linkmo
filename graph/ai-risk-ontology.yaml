  description: Document training data sources to trace the origin and provenance of
    AI generated content (AI Deployment, AI Impact Assessment, Governance and Oversight,
    Operation and Monitoring).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0760_NIST2024
  name: Human-AI Configuration
  description: 'Use visualizations or other methods to represent GAI model behavior
    to ease

    non-technical stakeholders understanding of GAI system functionality'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.1
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0817_UK_Government2023
  name: Information Sharing with Downstream Users
  description: Share specific information with downstream users of the model to enable
    more effective risk mitigation across the AI supply chain and build consumer confidence.
    This could include uses of the model that are against their terms of service,
    and could be provided to users through user terms or published information about
    the model.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0826_UK_Government2023
  name: Data Documentation
  description: Document data, models, prompts, evaluation materials and other assets,
    using commonly used structures such as data cards, model cards and software bills
    of materials (SBOMs). This will allow you to identify and share key information,
    including particular security concerns, quickly and easily.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0926_UK_Government2023
  name: Documentation of Results of Input Data Audits
  description: Document the results of input data audits, including metadata. Frontier
    AI organisations could look to emerging standards when documenting the results
    of input data audits, such as datasheets for datasets
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.1
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0938_Gipiškis2024
  name: Calibrated confidence measures for model pre- dictions
  description: Incorporating calibrated confidence measures alongside a model’s predictions
    and standard performance metrics, such as accuracy, can help users identify in-
    stances of overconfidence in incorrect predictions or underconfidence in correct
    ones [85]. These additional measures can provide users with more information to
    better interpret the model’s decisions and assess whether its predictions can
    be trusted.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.1
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0034_Casper2025
  name: Model registration
  description: Developers can be required to register (McKernon et al., 2024) frontier
    systems with governing bodies (regardless of whether they will be externally deployed).
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Casper2025
- id: A0082_Eisenberg2025
  name: Implement a risk reporting mechanism
  description: Establish processes to identify and disclose known or reasonably foreseeable
    risks, the discovery of new risks, or instances of non-conformity to third parties.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Eisenberg2025
- id: A0130_Future_of_Life_Institute2024
  name: Notify government about large training runs
  description: Does your organization notify the appropriate government authorities
    about large upcoming training runs?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0138_Future_of_Life_Institute2024
  name: Pre-deployment risk disclosure
  description: Does your organization share the results of its pre-deployment risk
    assessments with the appropriate government(s) before deploying a new model? Does
    this reporting include details on internal safety evaluations and any safety evaluations
    completed by independent third parties? Is the government provided with a justification
    for why the firm deems the system safe enough to deploy and is willing to accept
    the remaining risks? Please check all that apply.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0141_Future_of_Life_Institute2024
  name: Pre-training risk disclosure
  description: Does your organization share the results of model-specific pre-training
    risk assessments with the appropriate government authorities before launching
    large training runs?
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0149_Future_of_Life_Institute2024
  name: Safety evaluation transparency
  description: We highlight the main sources of information about content and results
    of the safety evaluations.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-FLI2024
- id: A0193_Schuett2023
  name: Notify a state actor before deployment
  description: AGI labs should notify appropriate state actors before deploying powerful
    models.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0194_Schuett2023
  name: Notify affected parties
  description: AGI labs should notify parties who will be negatively affected by a
    powerful model before deploying it.*
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0201_Schuett2023
  name: Publish internal risk assessment results
  description: AGI labs should publish the results or summaries of internal risk assessments,
    unless this would unduly reveal proprietary information or itself produce significant
    risk. This should include a justification of why the lab is willing to accept
    remaining risks.*
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0220_Schuett2023
  name: Notify other labs
  description: AGI labs should notify other labs before deploying powerful models.*
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0221_Schuett2023
  name: Pre-registration of large training runs
  description: AGI labs should register upcoming training runs above a certain size
    with an appropriate state actor.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-4.2
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0257_Wiener2024
  name: Report new model deployments to the AG within 30 days
  description: ''
