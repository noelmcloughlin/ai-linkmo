documents:
- id: granite-guardian-paper
  name: Granite Guardian
  description: We introduce the Granite Guardian models, a suite of safeguards designed
    to provide risk detection for prompts and responses, enabling safe and responsible
    use in combination with any large language model (LLM). These models offer comprehensive
    coverage across multiple risk dimensions, including social bias, profanity, violence,
    sexual content, unethical behavior, jailbreaking, and hallucination-related risks
    such as context relevance, groundedness, and answer relevance for retrieval-augmented
    generation (RAG). Trained on a unique dataset combining human annotations from
    diverse sources and synthetic data, Granite Guardian models address risks typically
    overlooked by traditional risk detection models, such as jailbreaks and RAG-specific
    issues. With AUC scores of 0.871 and 0.854 on harmful content and RAG-hallucination-related
    benchmarks respectively, Granite Guardian is the most generalizable and competitive
    model available in the space. Released as open-source, Granite Guardian aims to
    promote responsible AI development across the community.
  url: https://arxiv.org/abs/2412.07724
- id: arxiv.org/pdf/2406.17864
  name: The AI Risk Taxonomy (AIR 2024)
  description: We present a comprehensive AI risk taxonomy derived from eight government
    policies from the European Union, United States, and China and 16 company policies
    worldwide, making a significant step towards establishing a unified language for
    generative AI safety evaluation. We identify 314 unique risk categories, organized
    into a four-tiered taxonomy. At the highest level, this taxonomy encompasses System
    & Operational Risks, Content Safety Risks, Societal Risks, and Legal & Rights
    Risks. The taxonomy establishes connections between various descriptions and approaches
    to risk, highlighting the overlaps and discrepancies between public and private
    sector conceptions of risk. By providing this unified framework, we aim to advance
    AI safety through information sharing across sectors and the promotion of best
    practices in risk mitigation for generative AI models and systems.
  url: https://arxiv.org/pdf/2406.17864
  dateCreated: 2024-09-05
  dateModified: 2024-09-05
- id: shieldgemma-paper
  name: ShieldGemma
  description: ShieldGemma is a comprehensive suite of LLM-based safety content moderation
    models built on Gemma 2. The family includes three variants (2B, 9B, 27B parameters)
    designed to provide robust, state-of-the-art predictions of safety risks across
    four key harm types - sexually explicit content, dangerous content, hate speech,
    and harassment. ShieldGemma models demonstrate superior performance compared to
    existing solutions, with the 9B variant achieving +10.8% AU-PRC improvement over
    Llama Guard on public benchmarks.
  url: https://arxiv.org/abs/2407.21772
  dateCreated: 2024-07-30
- id: doc-mit-draft-ai-risk-repository
  name: 'Mapping AI Risk Mitigations: Evidence Scan & Draft Mitigation Taxonomy'
  description: 'The AI Risk Mitigation Taxonomy has three parts: The AI Risk Mitigation
    Database captures 831 mitigations extracted from 13 existing frameworks and classifications
    of AI risk mitigations The Draft AI Risk Mitigation Taxonomy organizes mitigations
    into 4 main categories and 23 subcategories. The Taxonomy Categories include:
    Governance & Oversight Controls, Technical & Security Controls, Operational Process
    Controls, and Transparency & Accountability Controls'
  url: https://cdn.prod.website-files.com/669550d38372f33552d2516e/6887e58496902e3bcad04a5a_1b0850b4406f7dc6a79365c4b56f0f51_Mapping%20AI%20Risk%20Mitigations.pdf
  dateCreated: 2025-07-28
  dateModified: 2025-07-28
  author: Alexander K. Saeri, Sophia Lloyd George, Jess Graham, Clelia LaCarriere,
    Peter Slattery, Neil Thompson
- id: doc-Bengio2025
  name: International AI Safety Report
  description: The first International AI Safety Report comprehensively synthesizes
    the current evidence on the capabilities, risks, and safety of advanced AI systems.
    The report was mandated by the nations attending the AI Safety Summit in Bletchley,
    UK. Thirty nations, the UN, the OECD, and the EU each nominated a representative
    to the report's Expert Advisory Panel. A total of 100 AI experts contributed,
    representing diverse perspectives and disciplines. Led by the report's Chair,
    these independent experts collectively had full discretion over the report's content.
  url: https://arxiv.org/abs/2501.17805
  dateCreated: 2025-01-29
  dateModified: 2025-01-29
  author: Yoshua Bengio, Sören Mindermann, Daniel Privitera, Tamay Besiroglu, Rishi
    Bommasani, Stephen Casper, Yejin Choi, Philip Fox, Ben Garfinkel, Danielle Goldfarb,
    Hoda Heidari, Anson Ho, Sayash Kapoor, Leila Khalatbari, Shayne Longpre, Sam Manning,
