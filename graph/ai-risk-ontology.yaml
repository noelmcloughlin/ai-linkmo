- id: A0121_Future_of_Life_Institute2024
  name: Internal Audit Team
  description: Does your firm have an internal audit team tasked with overseeing the
    effectiveness of its risk management practices? If yes, please briefly describe
    the team's responsibilities, size, powers, reporting lines, and whether it is
    led by a chief audit executive in the leadership team. In your response, please
