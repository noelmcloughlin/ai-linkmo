    data poison- ing attack their model may be a victim of based on a set of symptoms,
    such as analysis of target algorithm and architecture, perturbation scope and
    dimen- sion, victim model, and data type [39]. This framework includes known defenses
    against the diagnosed attack, which providers can then apply to the model.
