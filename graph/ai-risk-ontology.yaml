- id: A0726_NIST2024
  name: Information Security
  description: 'Document trade-offs, decision processes, and relevant measurement
    and

    feedback results for risks that do not surpass organizational risk tolerance,
    for

    example, in the context of model release: Consider different approaches for

    model release, for example, leveraging a staged release approach. Consider

    release approaches in the context of the model and its projected use cases.

    Mitigate, transfer, or avoid risks that surpass organizational risk tolerances.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0742_NIST2024
  name: Value Chain and Component Integration; Intellectual Property
  description: 'Apply organizational risk tolerances and controls (e.g., acquisition
    and

    procurement processes; assessing personnel credentials and qualifications,

    performing background checks; filtering GAI input and outputs, grounding, fine

    tuning, retrieval-augmented generation) to third-party GAI resources: Apply

    organizational risk tolerance to the utilization of third-party datasets and other

    GAI resources; Apply organizational risk tolerances to fine-tuned third-party

    models; Apply organizational risk tolerance to existing third-party models

    adapted to a new domain; Reassess risk measurements after fine-tuning thirdparty
    GAI models'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0751_NIST2024
  name: Information Integrity; Harmful Bias and Homogenization
  description: 'Collaborate with external researchers, industry experts, and community

    representatives to maintain awareness of emerging best practices and

    technologies in measuring and managing identified risks.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - NIST.AI.600-1
- id: A0764_UK_Government2023
  name: Rigorous Risk Assessment Processes
  description: 'Develop rigorous risk assessment processes for models, which: 1) Attempt
    to encompass all plausible and consequential risks from AI systems, including
    low-probability risks of severe harm; 2) Are informed by factors including, but
    not limited to: Model evaluations and red teaming, evidence of previous models''
    impacts and capabilities, knowledge of the latest research and developments in
    the field, domain expertise both internally and externally, and the results of
    data input audits. Take into account the difficulty of producing reliable risk
    assessments, creating a culture that takes seriously the significant uncertainty
    underlying predictions of the risks associated with frontier models. Take into
    account the potential benefits of the model. Include learnings from information
    exchanges with industry, academia and government on the capabilities of comparable
    models'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0765_UK_Government2023
  name: Pre-Deployment Risk Assessments
  description: Devote resources to pre-development risk assessments, alongside prioritising
    pre- deployment risk assessments. Pre-development risk assessments are also important,
    because training a high-risk system can still lead to harm if the model is leaked,
    stolen, or otherwise unintentionally distributed.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0766_UK_Government2023
  name: Development and Post-Deployment Monitoring
  description: Monitor systems both during development and after deployment. New risk
    assessments could be carried out in cases of fine-tuning or other substantial
    changes that could increase the danger of a model, such as the model gaining access
    to tools or plugins. This could occur alongside attempts to detect unexpected
    developments and new information that might have changed the results of the existing
    risk assessment, and which could also trigger a new risk assessment.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0767_UK_Government2023
  name: Risk Thresholds for Specific Models
  description: Describe and continually refine risk assessment results for each model
    (“risk thresholds”) that would trigger particular risk-reducing actions, defining
    such results in terms of risk to all relevant stakeholders given currently existing
    mitigations. Given the high uncertainty around future model capabilities, risk
    thresholds may be refined periodically.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0768_UK_Government2023
  name: Defining Risk Thresholds
  description: Define risk thresholds, based on the outcomes that would constitute
    a breach of the threshold and linked to dangerous capabilities that a given model
    or combination of models could exhibit. For example, a frontier AI organisation
    might identify the objective of avoiding deploying an AI system that significantly
    increases the risk of cyberattacks or fraud.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0769_UK_Government2023
  name: Operationalizing Risk Thresholds
  description: 'Operationalise risk thresholds, including specific, testable observations,
    such that multiple observers with access to the same information would agree on
    whether a given threshold had been met. Specific observations would provide frontier
    AI organisations with opportunities to determine proactively how they would respond
    in difficult potential situations, and so respond immediately to such situations
    should they arise, as well as allowing for accountability and external verification.

    Given the nascent science of AI evaluation, however, it is unlikely to be possible
    to define a set of testable observations that detect all identified risks sufficiently
    reliably. Instead of relying solely on these predefined tests, risk assessments
    may take into account wider sources of evidence, such as concerning and unexpected
    observations that show up in exploratory analyses, expert forecasts, or risk related
    information from other frontier AI organisations. In particular, consideration
    may be given to any risks caused by the combination of a given model with other
    models or tools, whether developed by the same frontier AI organisation or otherwise.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0770_UK_Government2023
  name: Refinement of Risk Evaluation Frameworks
  description: Continue to refine and redefine risk evaluation frameworks for models
    as necessary, aiming to reduce the gap between the intended objectives of risk
    thresholds and their present operationalisations. Such gaps are expected to exist
    due to limitations in the science of evaluation and in the state of knowledge
    surrounding capabilities, so progress towards a robust framework will probably
    be iterative. Risk evaluation frameworks may use multiple methods, including probability
    estimations and qualitative assessments of current capabilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0771_UK_Government2023
  name: Mitigation of Overshooting Risk Thresholds
  description: Mitigate the risk of ‘overshooting’ risk thresholds. This may be achieved
    by setting deliberately conservative thresholds, including using intentionally
    lower buffer thresholds to trigger actions, such that the most concerning thresholds
    are difficult to overshoot without having already implemented mitigations at an
    earlier stage.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0772_UK_Government2023
  name: Risk Threshold Engagement with Relevant External Stakeholders
  description: Engage with relevant external stakeholders when developing risk thresholds.
    Risk thresholds often concern externalities frontier AI organisations place on
    society, including both the potentially significant benefits of AI advancement
    and negative effects that might disproportionately affect specific stakeholder
    groups. As such, their risk thresholds may be made public to allow for external
    scrutiny, with thresholds set in consultation with relevant external stakeholders
    including relevant government authorities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0774_UK_Government2023
  name: Reassessment of Residual Risk
  description: After putting in place mitigations, reassess any residual risk posed
    to determine whether additional mitigations are required. Due to the unpredictability
    of capabilities advancements and the limitations of model evaluation science,
    pre-agreed mitigations may prove insufficient to place a given model within a
    risk threshold. Risk acceptance criteria may be used, as is standard in many other
    contexts, and may provide an important tool for clarification. These criteria
    may evolve with time, and could be quantitative or qualitative. For example, risk
    may only be accepted if it has been reduced to a level ‘as low as reasonably practicable’.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0775_UK_Government2023
  name: Disclosure of Risk Threshold to Government Authorities
  description: Inform relevant government authorities when a risk threshold has been
    met, along with proposed mitigations. Inform governments again, in advance of
    deployment, when the mitigations and residual risk assessment have been carried
    out. Proactively engage other relevant actors in addition to governments as appropriate.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0776_UK_Government2023
  name: Adaptation of Mitigations to Development and Deployment Stages
  description: 'When planning required mitigations, consider the full range of development
    and deployment stages. In general, meeting a risk threshold could require mitigations
    at multiple such stages. Important stages may include the following: 1) Continued
    training of model; 2) Deployment of model in small-scale ways, e.g., internal
    use; 3) Deployment of model in large-scale ways e.g., public release via API ;
    4) Extension of model through greater affordances, e.g., tool use or internet
    access; 5) Irreversible deployment e.g. open-sourcing of models'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0777_UK_Government2023
  name: Adaptation of Mitigations for Unintended Model Use
  description: Adapt mitigations in recognition of risks from unintended model use
    or use in unexpected contexts, such as a model that is modified to remove safeguards
    after open- sourcing or a model that is combined with another model for unanticipated
    purposes. For example, at a given risk threshold, information security control
    mitigations might be put in place before even internal use of a model within a
    frontier AI organisation. In general, the use of caution may be helpful, given
    current limitations in information security controls and the prediction of models’
    emergent abilities.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0778_UK_Government2023
  name: Recognition of Dangerous Model Possession
  description: Recognise that even the possession of some models may be dangerous,
    even if not deployed or not deployed widely, due to the risk of being unable to
    secure a model sufficiently to prevent, for instance, a bad actor obtaining the
    model weights. In contrast, other models may pose significant risk only if deployed
    in a large-scale or irreversible way.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.2
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0781_UK_Government2023
  name: Risks of Open-Source Models
  description: Acknowledge that some models may pose additional risks if made available
    “open-source”, even after mitigation attempts. This is because of the inability
    of recalling an open-sourced model and the potential ability of users to remove
    safeguards and introduce new (and potentially dangerous) capabilities. However,
    it is also important to bear in mind the significant benefits of “open-source”
    AI systems for researchers, including for advancing AI safety, which may in some
    cases outweigh these potential risks.
