  description: Employ diverse monitoring techniques to balance comprehensiveness,
    scalability, and privacy. A strong monitoring setup will generally combine automated
    and human review, in recognition that automated reviews may miss intricate issues,
    while human reviews are not always scalable and can pose privacy issues.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.5
  type: Action
  hasDocumentation:
  - doc-UK Government2023
- id: A0950_Gipiškis2024
  name: Dashboard of model properties
  description: 'A dashboard [41] displays all the relevant information about the model’s
    internal state and the model’s physical properties to the user. It is used to
    ensure that the user is informed about factors that influence the behavior of
    the model and to ensure that the user maintains control over the model. Allowing
    only the user to access the dashboard can aid in information asymmetry between
    the user and model, thus supporting the user oversight over the model.

    Examples of the model’s internal state include its representations of the world,
    representation of users, and the strategies it is currently pursuing; while examples
    of the model’s physical properties include the model’s compute and energy consumption,
    physical storage occupied, and physical networks it is connected to.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.5
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0977_Gipiškis2024
  name: Monitoring of model capabilities
  description: 'AI models are often trained to develop specific capabilities by using
    appropriate training data and training goals. However, models may develop capabilities
    that they were not specifically trained for. One subset of this is emergent capabilities,
    i.e., capabilities that emerged in larger models but not smaller models given
    a similar training process [215].

    These capabilities can be monitored, allowing models to be tested not only for
    their intended capabilities but also for capabilities that are not intended.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.5
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0979_Gipiškis2024
  name: Post-deployment ongoing monitoring for unexpected use cases
  description: 'Ongoing monitoring of AI systems can uncover emergent or newly identified
    capabilities and limitations, in particular when new use cases are found, or in
    a large-scale deployment with a diverse population of users. These new capa- bilities
    or limitations can inform ongoing risk analysis. New use-cases can be discovered
    via monitoring publications, online forums, or APIs [131].

    For example, a LLM might have unexpectedly high competence at giving con- vincing
    medical advice, despite not being directly developed for that purpose, nor verified
    for accuracy. In that case, the potential risks of this newly found competence
    can be assessed.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.5
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A0980_Gipiškis2024
  name: Monitoring protocols for po- tentially adversarial GPAI systems
  description: 'Similar to cybersecurity protocols, AI providers can prepare in advance
    for po- tential adversarial action from AI systems by developing and stress-testing
    protocols for potential adversarial action [179]. Such adversarial action may
    range from hiding code exploits, to strategic deception or loss of control related
    be- haviors.

    AI systems may be adversarial due to malicious actors (e.g., data poisoning),
    or due to unintended issues of control (lack of alignment with human intent).
    Alongside improving the system alignment, external monitoring and restrictions
    may be deployed in advance to “catch” these adversarial model malfunctions before
    harm is done.

    Like with cybersecurity red teaming, any protocol which assumes adversarial action
    can be stress tested in advance. For example, this can be done by pro- jecting
    the plausible capabilities and affordances of the adversarial actor (e.g., in
    the case of a tech company - a hacker, or a disgruntled employee). From this process,
    measures that better anticipate possible adversarial action can be deployed, and
    catch unsuccessful attempts at adversarial behavior.

    If such unsuccessful attempts are caught, they can be reported in incident re-
    ports, and serve as an input to further risk analysis. Depending on their severity,
    it may be advisable to recall the system if deployed. Examples of these protocols
    include [84]:

    • Flagging of suspicious frontier AI system code generation for human over- sight,
    with the help of better proven (“trusted”) AI systems or automated keyword detection.

    • Using a better proven (“trusted”) AI system to edit the code produced by a frontier
    AI system if suspicious.• Monitoring of AI system with another instance of this
    same system, with filters to prevent collusion.

    • Restriction of access of the AI system to private information.'
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-3.5
  type: Action
  hasDocumentation:
  - doc-Gipiškis2024
- id: A1005_Gipiškis2024
