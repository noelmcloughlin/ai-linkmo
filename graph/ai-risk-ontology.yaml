- id: aiuc1-ctrl-a001-1
  name: 'A001.1 Documentation: Policy for input data ownership, usage and retention'
  description: Defining and communicating input data usage policies. Including specifying
    how customer data is used for inference and model training, establishing data
    retention periods, and documenting customer data rights.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Terms of Service
  - Privacy Policy
  - DPA
  hasRequirement: aiuc1-req-a001
  hasTypicalEvidence: Typically demonstrated by Terms of Service, Privacy Policy or
    Data Processing Agreement
- id: aiuc1-ctrl-a001-2
  name: 'A001.2 Config: Data retention implementation'
  description: Implementing technical controls to enforce data retention and deletion
    policies. For example, automating data deletion based on retention schedules,
    using secure removal mechanisms, and managing data lifecycles.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  - Engineering Practice
  hasRequirement: aiuc1-req-a001
  hasTypicalEvidence: Screenshot of automated deletion implementation or data lifecycle
    system - may include cron job or scheduled task deleting expired data, deletion
    script in Python/Bash with retention period logic, data lifecycle management tool
    configuration (e.g., AWS S3 lifecycle rules, database TTL settings), or deletion
    audit logs from database or storage system.
- id: aiuc1-ctrl-a001-3
  name: 'A001.3 Documentation: Data subject right processes'
  description: Documenting processes for handling end-user data subject rights. For
    example, handling requests for opt-in/opt-out rights, access, portability, or
    deletion of input data.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Data Processing Agreement
  - Privacy Policy
  hasRequirement: aiuc1-req-a001
  hasTypicalEvidence: May be included in DPA, GDPR appendix, External Privacy Policy
    or similar internal or external policies documenting processes for data handling
- id: aiuc1-ctrl-a002-1
  name: 'A002.1 Documentation: Output usage and ownership policy'
  description: 'Establishing output ownership and usage rights policies. For example,
    specifying customer ownership of AI-generated outputs versus AI inputs, defining
    permitted uses of outputs (commercial use, redistribution, modification), documenting
    usage restrictions or limitations, and clarifying how ownership applies to different
    output types or use cases.

    - Disclosing opt-out and deletion procedures for AI outputs. For example, documenting
    how customers can opt out of output storage or reuse, explaining deletion request
    processes, specifying retention periods and data handling practices, and clarifying
    how customers can control or revoke permissions for their outputs.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Terms of Service
  hasRequirement: aiuc1-req-a002
  hasTypicalEvidence: Typically demonstrated by Terms of Service, Data Processing
    Agreement, Master Service Agreement, Privacy Policy, or AI Addendum. May be a
    combination of these policies.
- id: aiuc1-ctrl-a003-1
  name: 'A003.1 Config: Data collection scoping'
  description: Configuring data collection limits to reduce data and privacy exposure.
    For example, limiting data collection to task-relevant information based on context,
    implementing scoping based on user roles or workflow requirements, and avoiding
    persistent or out-of-scope data access.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-a003
  hasTypicalEvidence: Code implementing data collection restrictions - may include
    RAG retrieval function with document filtering logic, session scoping configuration
    limiting data access per session ID, workflow conditional logic gating data collection
    by stage, permission decorators or middleware checking user roles before data
    access, or scoping functions rejecting out-of-scope queries with error messages.
- id: aiuc1-ctrl-a003-2
  name: 'A003.2 Config: Alerting system for auth failures'
  description: Deploying monitoring mechanisms. Including ensuring AI systems only
    perform necessary inference and logging deviations from defined operational scope.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-a003
  hasTypicalEvidence: Screenshot of code showing an alert or error handling system
    is triggered upon authz check failure, or screenshot of alerting configurations
    in logging software (e.g. Posthog, Sentry, Datadog, Axiom, or downstream alert
    in Slack)
- id: aiuc1-ctrl-a003-3
  name: 'A003.3 Config: Authorization system integration'
  description: Integrating with existing authorization systems to align agent access
    permissions with organizational policies.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-a003
  hasTypicalEvidence: Screenshot of code showing authorization checks when context
    is collected or before tool execution using existing authorization systems (e.g.
    oAuth, OSO, custom IAM) - should verify that authorization is checked at time
    of data collection/tool call, not just at initial agent invocation
- id: aiuc1-ctrl-a004-1
  name: 'A004.1 Documentation: User guidance on confidential information'
  description: Providing user guidance on protecting confidential information. For
    example, instructing employees not to input trade secrets, proprietary code, or
    confidential business information into AI systems, communicating data handling
    policies for AI tool usage, or establishing clear guidelines on what information
    can and cannot be shared with AI agents.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-a004
  hasTypicalEvidence: Policy document, training materials, or user guidelines instructing
    users on protecting confidential information when using AI systems.
- id: aiuc1-ctrl-a004-2
  name: 'A004.2 Documentation: foundational model IP protections'
  description: Leveraging foundation model provider protections. For example, using
    providers with zero data retention policies, requiring contractual commitments
    that inputs are not used for training, selecting models with enhanced privacy
    guarantees for sensitive use cases.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Vendor Contracts
  hasRequirement: aiuc1-req-a004
  hasTypicalEvidence: Provider contracts, terms of service, or documentation showing
    IP protection commitments. Often found in third party's terms of use/service,
    DPA or AI Addendum/Schedule
- id: aiuc1-ctrl-a004-3
  name: 'A004.3 Config: IP detection implementation'
  description: Implementing technical controls to detect proprietary information in
    outputs.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  - Product
  hasRequirement: aiuc1-req-a004
  hasTypicalEvidence: Screenshot of code or configuration detecting proprietary information
    patterns in AI outputs - may include labelling proprietary files, filtering rules
    for internal identifiers/data labels/API keys, scanning logic for trade secret
    terminology, or rejection demonstrations showing appropriate responses to proprietary
    requests.
- id: aiuc1-ctrl-a004-4
  name: 'A004.4 Config: IP disclosure monitoring'
  description: Establishing output monitoring for high-risk IP scenarios. For example,
    logging AI responses that accessed confidential data sources, implementing human
    review workflows for outputs flagged as potentially containing sensitive information.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  - Logs
  hasRequirement: aiuc1-req-a004
  hasTypicalEvidence: Logs, audit trails, or review workflow documentation for AI
    outputs potentially containing sensitive information - may include logs of responses
    accessing confidential sources, flagged output review queues, or human approval
    workflows for high-risk disclosures.
- id: aiuc1-ctrl-a005-1
  name: 'A005.1 Documentation: Consent for combined data usage'
  description: Establishing explicit consent and disclosure for combined data usage.
    For example, informing customers when their data will be combined with competitor
    data, disclosing data anonymization and abstraction policies, providing opt-out
    mechanisms.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Data Processing Agreement
  - Terms of Service
  hasRequirement: aiuc1-req-a005
  hasTypicalEvidence: Typically demonstrated by Data Processing Agreement or Terms
    of Service
- id: aiuc1-ctrl-a005-2
  name: 'A005.2 Config: Customer data isolation controls'
  description: Implementing customer data isolation controls. For example, enforcing
    strict logical and physical separation of customer data, applying tenant-specific
    encryption, validating data flow boundaries in shared infrastructure, establishing
    technical barriers between customer datasets during training.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-a005
  hasTypicalEvidence: Screenshot showing app_IDs in database schema, screenshot showing
    that namespace by appID is used in vector store for RAG or that logical isolation
    is implemented in an equivalent way, or screenshot of authz check in code verifying
    appIDs match before returning objects.
- id: aiuc1-ctrl-a005-3
  name: 'A005.3 Config: Privacy-enhancing controls'
  description: Implementing specific privacy-enhancing technologies (PETs) to reduce
    competitive exposure.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-a005
  hasTypicalEvidence: May include tokenization, hashing, or anonymization techniques
    (robust to prevent re-identification or reversal) making data algorithmic-usable
    but not human-readable, differential privacy implementation obfuscating individual
    contributions, federated learning configuration avoiding centralized raw data,
    or data masking/pseudonymization protecting customer identities.
- id: aiuc1-ctrl-a006-1
  name: 'A006.1 Config: PII detection and filtering'
  description: Implementing safeguards to prevent personal data leakage through AI
    system outputs and logs. For example, filtering prompts and outputs for personal
    identifiers before storage or display, implementing automated PII detection and
    redaction in system logs, preventing retention of outputs containing sensitive
    personal information, or blocking responses that would expose personal identifiers.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - 'Eng: LLM output filtering logic'
  - 'Eng: User LLM input filtering logic'
  hasRequirement: aiuc1-req-a006
  hasTypicalEvidence: Screenshot of code filtering LLM inputs and/or outputs for personal
    identifiers - may include keyword checks or regex patterns detecting PII (e.g.
    names, emails, SSNs, phone numbers), scrubbing functions removing personal data
    before storage or logging, output filtering blocking responses containing personal
    identifiers, log redaction configuration removing PII from application or system
    logs, or structured logging with PII isolation controls.
- id: aiuc1-ctrl-a006-2
  name: 'A006.2 Config: PII access controls'
  description: Requiring authentication and authorization for PII access. For example,
    role-based access controls for PII-containing systems, multi-factor authentication
    for sensitive data access, or approval-gated access to customer information.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-a006
  hasTypicalEvidence: Screenshot of IAM configuration or user roles list for systems
    containing PII - e.g. role-based access controls for log aggregation tools or
    internal dashboards with PII, authentication requirements for PII access, or approval
    workflow documentation (Jira tickets, approval systems) for internal workforce
    requests to view customer data.
- id: aiuc1-ctrl-a006-3
  name: 'A006.3 Config: DLP system integration'
  description: Integrating with existing data loss prevention (DLP) systems to monitor
    and block outputs containing personal data in violation of policy.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-a006
  hasTypicalEvidence: Screenshot of output pipeline integrating with DLP system to
    scan and block PII policy violations - may include DLP integration code scanning
    AI outputs before delivery to users, DLP configuration rules for PII detection,
    or logs showing blocked outputs containing personal data.
- id: aiuc1-ctrl-a007-1
  name: 'A007.1 Documentation: Model provider IP infringement protections'
  description: Documenting foundation model provider IP protections which may serve
    as primary infringement safeguards. For example, indemnification clauses or copyright/trademark
    guardrails.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Vendor Contracts
  hasRequirement: aiuc1-req-a007
  hasTypicalEvidence: Foundation model provider contract, terms of service, or data
    processing agreement showing IP protection commitments including copyright/trademark
    handling policies, indemnification clauses, liability coverage, and any documented
    limitations or exclusions. May include vendor questionnaire responses or certification
    documents addressing IP protections.
- id: aiuc1-ctrl-a007-2
  name: 'A007.2 Config: IP infringement filtering'
  description: Establishing supplementary content filtering mechanisms where provider
    protections have gaps or limitations. For example, detecting copyrighted material
    in outputs, implementing trademark screening.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  - 'Eng: LLM output filtering logic'
  hasRequirement: aiuc1-req-a007
  hasTypicalEvidence: Screenshot of code, API configuration, or filtering system showing
    detection of copyrighted material, trademark screening, or content validation
    checks applied to AI outputs - this could be pattern matching logic, third-party
    API integration (e.g. copyright detection services), or custom filtering rules.
- id: aiuc1-ctrl-a007-3
  name: 'A007.3 Logs: User-facing notices'
  description: 'Implementing user guidance and guardrails to reduce IP risk. For example,
    usage policies that explain prohibited content types, user warnings in product,
    restricting output generation in known infringement domains.

    - Implementing restrictions in AI acceptable use policy.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  - Acceptable Use Policy
  hasRequirement: aiuc1-req-a007
  hasTypicalEvidence: Screenshot of user-facing IP risk guidance - may include warning
    messages when attempting high-risk operations, help center articles about IP infringement
    guidance, or UI elements explaining prohibited use cases.
- id: aiuc1-ctrl-b001-1
  name: 'B001.1 Report: adversarial testing results'
  description: 'Establishing a taxonomy for adversarial risks. For example, drawing
    on NIST''s AI 100-2e2023 attack classifications and aligning these to system architecture
    and use cases.

    - Conducting comprehensive adversarial testing at least quarterly. For example,
    performing structured red-teaming, prompt injection assessments, jailbreaking
    attempts, adversarial perturbation testing, semantic manipulation, and simulated
    malicious tool invocations.

    - Maintaining secure testing documentation. For example, recording test cases,
    methods, outcomes, and system behaviors with restricted access controls, implementing
    secure storage for sensitive testing materials.

    - Establishing improvement processes based on findings. For example, assigning
    owners and remediation timelines based on test severity, tracking fixes through
    risk registers or issue management systems, documenting updates to safeguards
    and procedures.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - THIRD_PARTY_EVALS
  hasTypicalLocation:
  - Third-party evaluation report
  hasRequirement: aiuc1-req-b001
  hasTypicalEvidence: Third-party evaluation report showing adversarial robustness
    testing - must include risk taxonomy tested, testing methodology and findings,
    secure documentation practices, and improvement tracking with remediation timelines
    and documentation.
- id: aiuc1-ctrl-b001-2
  name: 'B001.2 Documentation: Security program integration'
  description: Aligning adversarial testing with broader security testing programs.
    For example, integrating AI-specific test cases into broader penetration testing,
    sharing threat models across red/blue teams, aligning test cycles with security
    audit and compliance calendars.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Engineering Practice
  - Internal processes
  hasRequirement: aiuc1-req-b001
  hasTypicalEvidence: Penetration test reports with AI-specific test cases, shared
    threat models, and testing calendars, or documentation of broader security program
    incorporating AI adversarial testing requirements.
- id: aiuc1-ctrl-b002-1
  name: 'B002.1 Config: Adversarial input detection and alerting'
  description: Establishing detection and alerting. For example, implementing monitoring
    for prompt injection patterns, jailbreak techniques, adversarial input attempts,
    and exceeding rate limits, configuring alerts and threat notifications for suspicious
    activities.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b002
  hasTypicalEvidence: Screenshot of monitoring system, SIEM, or detection code showing
    rules and alerts for adversarial inputs - may include prompt injection detection
    patterns, jailbreak technique signatures, rate limit monitoring with threshold
    alerts, or notification configurations (Slack, PagerDuty, email)
- id: aiuc1-ctrl-b002-2
  name: 'B002.2 Logs: Adversarial incident and response'
  description: Implementing incident logging and response procedures. For example,
    logging suspected adversarial attacks with relevant context, escalating to designated
    personnel based on severity, and documenting response actions in a centralized
    system.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Logs
  - Engineering Tooling
  hasRequirement: aiuc1-req-b002
  hasTypicalEvidence: Screenshot of incident management system or logs showing adversarial
    attack handling - may include log entries with timestamps and user/session context,
    escalation runbooks defining severity thresholds, or incident tickets in Jira/PagerDuty/ServiceNow
    documenting response actions and workflows.
- id: aiuc1-ctrl-b002-3
  name: 'B002.3 Documentation: Updates to detection config'
  description: Maintaining detection effectiveness through quarterly reviews. For
    example, updating detection rules based on emerging adversarial techniques, analyzing
    incident patterns and documenting system improvements.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  - Internal processes
  hasRequirement: aiuc1-req-b002
  hasTypicalEvidence: Quarterly review documentation showing detection updates - for
    example, review meeting notes with incident pattern analysis, updated detection
    rules with version history, or tracking records showing rule improvements (e.g.
    GitHub/Jira tickets).
- id: aiuc1-ctrl-b002-4
  name: 'B002.4 Config: Pre-processing adversarial detection'
  description: Implementing adversarial input detection prior to AI model processing
    where feasible. For example, using pre-processing filters to flag likely threats
    before model processing.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b002
  hasTypicalEvidence: Screenshot of pre-processing filtering logic or gateway - may
    include pattern-matching or heuristic code checking inputs before model processing,
    WAF or API gateway rules blocking adversarial patterns, or IP-based filtering.
- id: aiuc1-ctrl-b002-5
  name: 'B002.5 Config: AI security alerts'
  description: Integrating adversarial input detection into existing security operations
    tooling. For example, forwarding flagged inputs to SIEM platforms, correlating
    detection with authentication and network logs, enabling SOC teams to triage AI-related
    security events.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  hasRequirement: aiuc1-req-b002
  hasTypicalEvidence: Screenshot of SIEM platform, SOC tooling, or log forwarding
    configuration showing adversarial detection integration - may include Splunk/Datadog/Elastic
    SIEM ingesting AI adversarial alerts, correlation rules linking AI events with
    authentication or network logs, SOC dashboard displaying AI security event triage,
    or code forwarding flagged inputs to security platforms.
- id: aiuc1-ctrl-b003-1
  name: 'B003.1 Documentation: Technical information disclosure guidelines'
  description: 'Documenting limitations on technical information release. For example,
    limiting public disclosure of model architectures, algorithms, training data details,
    system configurations, and performance metrics, requiring approval before sharing
    technical specifications or implementation details.

    - Controlling organizational information to balance transparency with security.
    For example, limiting disclosure of AI team details, development timelines, and
    other information that could reveal technical capabilities, reviewing public communications
    for sensitive information.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal policies
  hasRequirement: aiuc1-req-b003
  hasTypicalEvidence: Policy document, SOP, or handbook section defining limitations
    and approval requirements for publicly sharing AI system technical details - may
    include communication policy limiting disclosure of model architectures or configurations,
    engineering handbook with approval workflows for technical specifications, or
    internal procedures controlling release of organizational AI information.
- id: aiuc1-ctrl-b003-2
  name: 'B003.2 Documentation: Public disclosure approval records'
  description: Establishing approval processes. For example, requiring designated
    review for public content referencing AI capabilities in e.g. publications, presentations,
    and marketing materials, and documenting approved disclosures with business justification.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-b003
  hasTypicalEvidence: Approval email, ticket, or review documentation for public AI
    communications - may include approval requests in email or Jira/Slack for blog
    posts or press releases, marketing review records for AI capability disclosures,
    or periodic security review logs for public-facing AI content.
- id: aiuc1-ctrl-b004-1
  name: 'B004.1 Config: Anomalous usage detection'
  description: Implementing systems distinguishing between high-volume legitimate
    usage and adversarial behavior. For example, using behavioral analytics and user
    profiling to calibrate detection thresholds and prevent false positives against
    trusted users.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  - Engineering Code
  hasRequirement: aiuc1-req-b004
  hasTypicalEvidence: Screenshot of anomaly detection system or configuration file
    - may include behavioral analytics dashboard (Datadog, Elastic, Splunk) with user
    scoring rules, rate limiting configuration with tier-based thresholds (config.yaml,
    API gateway settings), user allowlists or reputation tables, or code implementing
    session-based threshold logic.
- id: aiuc1-ctrl-b004-2
  name: 'B004.2 Config: Rate limits'
  description: Implementing rate limiting and query restrictions. For example, establishing
    per-user quotas to prevent model extraction, blocking excessive query patterns,
    implementing progressive restrictions for suspicious behavior, or using economic
    disincentives for high-volume usage.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  hasRequirement: aiuc1-req-b004
  hasTypicalEvidence: Screenshot of rate limiting configuration for API endpoints
    - may include per-user quota settings, query throttling rules, progressive restriction
    policies, WAF configuration (Cloudflare, AWS WAF, Azure Application Gateway) with
    blocking rules for excessive patterns, or pricing tier settings implementing usage-based
    cost increases.
- id: aiuc1-ctrl-b004-3
  name: 'B004.3 Report: External pentest of AI endpoints'
  description: Conducting simulated external attack testing of AI endpoints. For example,
    performing automated attack simulations, testing endpoint protection effectiveness
    against high-volume and distributed attacks, and documenting methodologies appropriate
    to organizational threat profile.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-b004
  hasTypicalEvidence: Third-party penetration test report for AI endpoints including
    attack simulations tested (e.g. scraping attempts, brute force, reconnaissance),
    rate limiting and endpoint protection validation, distributed attack testing,
    test methodology, and findings on protection effectiveness.
- id: aiuc1-ctrl-b004-4
  name: 'B004.4 Documentation: Vulnerability remediation'
  description: Maintaining endpoint security through remediation. For example, tracking
    identified vulnerabilities, implementing protective measures based on testing
    outcomes, and regularly updating endpoint defenses and detection thresholds.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-b004
  hasTypicalEvidence: Screenshot of issue tracking system (GitHub, Jira, Linear) showing
    endpoint vulnerability lifecycle - must include vulnerability identification,
    remediation proposal, implementation, and production deployment with timestamps
    and approval records.
- id: aiuc1-ctrl-b005-1
  name: 'B005.1 Config: Input filtering'
  description: Integrating automated moderation tools to filter inputs before they
    reach the foundation model. For example, integrating third-party moderation APIs,
    implementing custom filtering rules, configuring blocking or warning actions for
    flagged content, and establishing confidence thresholds based on risk category
    and severity
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - 'Eng: User LLM input filtering logic'
  - Engineering Tooling
  hasRequirement: aiuc1-req-b005
  hasTypicalEvidence: 'Screenshot of moderation tool integration showing API configuration,
    filtering rules, action settings (block/warn/modify), and confidence thresholds
    for different violation categories - this could be screenshots of configuration
    files, admin dashboard settings, or API integration code.

    Example moderation tools: OpenAI Moderation API, Claude content filtering, VirtueAI/Hive/Spectrum
    Labs'
- id: aiuc1-ctrl-b005-2
  name: 'B005.2 Documentation: Input moderation approach'
  description: Documenting the moderation logic and rationale. For example, explaining
    chosen moderation tools, threshold justifications, and decision criteria for different
    risk categories.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Internal processes
  - Engineering Practice
  hasRequirement: aiuc1-req-b005
  hasTypicalEvidence: Document explaining moderation approach including tool selection
    rationale, threshold settings with justifications, action logic for different
    violation types, and examples of how different input categories are handled.
- id: aiuc1-ctrl-b005-3
  name: 'B005.3 Demonstration: Warning for blocked inputs'
  description: Providing feedback to users when inputs are blocked.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-b005
  hasTypicalEvidence: Screenshot of user-facing messages or UI flows showing how blocked
    inputs are communicated to users - this could be error messages, warning dialogs,
    or alternative suggestions provided when content is filtered.
- id: aiuc1-ctrl-b005-4
  name: 'B005.4 Logs: Input filtering'
  description: Logging flagged prompts for analysis and refinement of filters, while
    ensuring compliance with privacy obligations.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Logs
  hasRequirement: aiuc1-req-b005
  hasTypicalEvidence: Screenshot of logging system showing how flagged inputs are
    captured, what metadata is included/excluded for privacy, retention policies,
    and audit trail - may include privacy documentation explaining logging disclosures
    to users.
- id: aiuc1-ctrl-b005-5
  name: 'B005.5 Documentation: Input filter performance'
  description: Periodically evaluating filter performance and adjusting thresholds
    accordingly. For example, accuracy, latency, false positives/negatives.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-b005
  hasTypicalEvidence: Report or dashboard showing analysis of filter performance metrics
    (false positives, false negatives, accuracy, latency) and documented threshold
    adjustments made based on performance data - should include timestamps and rationale
    for changes.
- id: aiuc1-ctrl-b006-1
  name: 'B006.1 Config: Agent service access restrictions'
  description: Implementing technical restrictions that limit agent capabilities to
    authorized scope. For example, restricting agent access to approved backend services
    and APIs, enforcing network segmentation or API gateway rules, or implementing
    service-level authorization preventing access to sensitive systems.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b006
  hasTypicalEvidence: Screenshot of configuration showing technical limitations on
    agent backend access - may include API gateway rules restricting accessible services,
    network policies defining allowed endpoints, service-level authorization configuration,
    or architecture diagram showing agent isolation boundaries.
- id: aiuc1-ctrl-b006-2
  name: 'B006.2 Config: Agent security monitoring and alerting'
  description: Deploying monitoring and alerting for agent actions that exceed security
    boundaries. For example, logging all agent service interactions, alerting on access
    attempts to unauthorized systems or APIs, or anomaly detection flagging unusual
    connection patterns.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  - Logs
  hasRequirement: aiuc1-req-b006
  hasTypicalEvidence: Screenshot of monitoring configuration tracking agent security-relevant
    actions - may include logging setup capturing agent service calls and authentication
    attempts, alert rules for unauthorized system access, security monitoring dashboard
    showing agent infrastructure interactions, or example logs demonstrating boundary
    violations are detected.
- id: aiuc1-ctrl-b007-1
  name: 'B007.1 Config: User access controls'
  description: 'Implementing system-level access controls tailored to AI systems.
    For example, using role-based or attribute-based access to restrict access to
    model configuration, training datasets, tool-calling capabilities, or prompt logs,
    based on job function and system sensitivity.

    - Restricting administrative and configuration privileges to authorized personnel.
    For example, limiting ability to alter system behavior, tools, or models.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  hasRequirement: aiuc1-req-b007
  hasTypicalEvidence: Screenshot of IAM platform, permission files, or admin panel
    showing role-based or attribute-based access restrictions for AI system resources
    (model configurations, training datasets, tool-calling capabilities, prompt logs)
    - may include IAM role assignments, permission policies, or authorization code
    validating user permissions before accessing sensitive AI components.
- id: aiuc1-ctrl-b007-2
  name: 'B007.2 Documentation: Access reviews'
  description: Conducting access reviews and updates at least quarterly. For example,
    validating access assignments, updating based on policy or role changes,  documenting
    access changes with AI-specific context (e.g. model access justification, changes
    to agent capability boundaries, or access to sensitive prompt/response history).
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-b007
  hasTypicalEvidence: Quarterly access review documentation - may include access review
    meeting notes, tracking records of access changes with justifications, or reports
    documenting role changes and access modifications based on policy updates.
- id: aiuc1-ctrl-b008-1
  name: 'B008.1 Config: Model access controls'
  description: Implementing model access protection. For example, restricting access
    to production AI models based on job function and operational need, implementing
    MFA for model system access, maintaining user access reviews appropriate to organizational
    size.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  - Internal processes
  hasRequirement: aiuc1-req-b008
  hasTypicalEvidence: Screenshot of IAM configuration, permission settings, or admin
    panel showing role-based access restrictions for production AI models covering
    IAM role assignments restricting model access by job function, MFA configuration
    for model system access, and access review records validating model permissions.
- id: aiuc1-ctrl-b008-2
  name: 'B008.2 Config: API deployment security'
  description: Establishing deployment security controls. For example, applying scoped
    API tokens or signed requests, using TLS for all endpoint traffic, implementing
    schema validation to protect model APIs from malformed or adversarial input.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b008
  hasTypicalEvidence: Screenshot of API security configuration for model endpoints
    - may include scoped API token implementation, TLS/HTTPS certificate configuration
    for model API traffic, or schema validation code protecting model APIs from malformed
    or adversarial input.
- id: aiuc1-ctrl-b008-3
  name: 'B008.3 Config: Model hosting security'
  description: Securing model hosting environments. For example, using up-to-date
    and minimal container images, scanning for known vulnerabilities in dependencies
    and base images, and applying infrastructure-level isolation techniques based
    on risk level (e.g. container namespaces, VM separation, or dedicated GPU access).
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b008
  hasTypicalEvidence: Screenshot of container configuration or infrastructure setup
    for model hosting - may include Dockerfile with minimal base images and up-to-date
    dependencies, vulnerability scanning results from Trivy or Snyk for container
    images, or infrastructure configuration showing isolation techniques (container
    namespaces, VM separation, network policies, dedicated GPU allocation).
- id: aiuc1-ctrl-b008-4
  name: 'B008.4 Config: Model integrity verification'
  description: Verifying model integrity before and during deployment. For example,
    using cryptographic checksums or signed artifacts to detect tampering, scanning
    model files for malicious payloads.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b008
  hasTypicalEvidence: Screenshot of deployment pipeline or code implementing model
    integrity checks - may include cryptographic checksum verification, model artifact
    signature validation, hash comparison before deployment, model scanning configuration
    detecting malicious payloads (e.g. Pickle, ONNX) using tools like Cisco's pickle-fuzzer,
    Trail of Bit's Fickling, or deployment logs recording model version hashes.
- id: aiuc1-ctrl-b009-1
  name: 'B009.1 Config: Output volume limits'
  description: Reducing or limiting the number of results shown in outputs to relevant
    only to balance security and utility. For example, character limits, limits on
    inference time.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  - Product
  hasRequirement: aiuc1-req-b009
  hasTypicalEvidence: Screenshot of code or configuration implementing output restrictions
    - may include character or token limits, inference time limits, result count restrictions,
    or timeout configurations preventing excessive output. Can be demonstrated by
    product demo showing system timeout when requesting output exceeding limits.
- id: aiuc1-ctrl-b009-2
  name: 'B009.2 Demonstration: User output notices'
  description: Providing user-facing notices or documentation about output limitations.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-b009
  hasTypicalEvidence: Screenshot of product interface showing user notices about output
    limitations - may include messages indicating truncated or suppressed outputs
    for security or privacy reasons, user documentation explaining limitation policies,
    or help articles describing output restrictions.
- id: aiuc1-ctrl-b009-3
  name: 'B009.3 Config: Output precision controls'
  description: Limiting the fidelity of model outputs in certain use cases. For example,
    applying output rounding, threshold bands, or obfuscation techniques to reduce
    the risk of model inversion.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-b009
  hasTypicalEvidence: Screenshot of code implementing output fidelity limitations
    - may include rounding logic for numerical outputs, threshold bands reducing precision,
    or obfuscation techniques preventing model inversion, precision-sensitive data
    disclosure, or adversarial model extraction attacks.
- id: aiuc1-ctrl-c001-1
  name: 'C001.1 Documentation: AI risk taxonomy'
  description: 'Defining risk categories with severity levels and examples based on
    industry and deployment context. For example, classifying harmful outputs such
    as distressed outputs, angry responses, high-risk advice, offensive content, bias,
    and deception, identifying other high-risk use cases such as safety-critical instructions,
    legal recommendations, financial advice.

    - Aligning risk taxonomy with external frameworks and standards.

    - Establishing severity grading appropriate to organizational context and risk
    tolerance. For example, implementing consistent scoring methodology across risk
    categories, defining thresholds for flagging and human review.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal policies
  hasRequirement: aiuc1-req-c001
  hasTypicalEvidence: Internal policy document, risk framework, or taxonomy defining
    AI risk categories with severity levels and examples specific to deployment context.
    Example taxonomies to draw upon include NIST AI RMF functions, EU AI Act article
    9, ISO42001 controls.
- id: aiuc1-ctrl-c001-2
  name: 'C001.2 Documentation: Risk taxonomy reviews'
  description: Maintaining taxonomy currency with documented change management. For
    example, updating based on emerging threats or incidents.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-c001
  hasTypicalEvidence: Meeting notes, change log, or review documentation showing quarterly
    reviews of the risk taxonomy. Could include review dates, participants, decisions
    made (categories added/removed/modified, threshold adjustments), rationale for
    changes, approvals records, and version history showing taxonomy updates over
    time with timestamps. Can be standalone or part of broader internal audit/review
    or change management procedures.
- id: aiuc1-ctrl-c002-1
  name: 'C002.1 Documentation: Pre-deployment test and approval records'
  description: 'Conducting pre-deployment testing with documented results and identified
    issues. For example, structured hallucination testing, adversarial prompting,
    safety unit tests, and scenario-based walkthroughs.

    - Completing risk assessments of identified issues before system deployment. For
    example, potential impact analysis, mitigation strategies, and residual risk evaluation.

    - Obtaining approval sign-offs from designated accountable. For example, documented
    rationale for approval decisions and maintained records for review purposes.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-c002
  hasTypicalEvidence: Test results with identified issues and severity ratings, risk
    assessment with mitigation decisions, and approval sign-offs with rationale -
    may be combined in deployment gate documentation or provided as separate documents
    (e.g., test suite outputs from GitHub Actions/pytest, Jira/Linear tickets with
    risk assessment and approval, staging environment test reports, deployment checklist
    with sign-offs).
- id: aiuc1-ctrl-c002-2
  name: 'C002.2 Config: SDLC integration'
  description: '- Integrating AI system testing into established software development
    lifecycle (SDLC) gates. For example, including threat modelling and risk evaluation
    during design phases, requiring risk evaluation and sign-off at staging or pre-production
    milestones, aligning with CI/CD or MLOps pipelines, and documenting test artefacts
    in shared repositories.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-c002
  hasTypicalEvidence: CI/CD pipeline configuration or workflow showing AI testing
    integrated as deployment gate - may include GitHub Actions/Jenkins/GitLab CI config
    files requiring test passage, pull request templates with testing checklists,
    or branch protection rules enforcing pre-deployment validation.
- id: aiuc1-ctrl-c002-3
  name: 'C002.3 Documentation: Vulnerability scan results'
  description: Implementing pre-deployment vulnerability scanning of AI artifacts
    and dependencies. For example, scanning AI models and ML libraries for security
    vulnerabilities, validating runtime behavior for unsafe operations, and analyzing
    outputs for harmful content before deployment.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  hasRequirement: aiuc1-req-c002
  hasTypicalEvidence: Screenshot of security scanning tools or CI/CD pipeline showing
    vulnerability analysis of AI artifacts and dependencies - may include GitHub/GitLab
    security tab with dependency alerts, Snyk or Dependabot vulnerability findings,
    pip-audit or safety check terminal output showing CVE scans, model file scanning
    results, or CI/CD logs showing security scan execution.
- id: aiuc1-ctrl-c003-1
  name: 'C003.1 Config: Harmful output filtering'
  description: Implementing content filtering for harmful output types. For example,
    detecting and blocking distressed responses, angry language, offensive content,
    biased statements, and deceptive information.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - 'Eng: LLM output filtering logic'
  hasRequirement: aiuc1-req-c003
  hasTypicalEvidence: Screenshot of content filtering rules, moderation API configuration,
    or classifier settings showing detection and blocking logic for harmful output
    types - may include filtering rules in code, third-party moderation tool configuration
    (e.g., OpenAI Moderation API, Perspective API), or custom classifier model settings
    with harm category definitions.
- id: aiuc1-ctrl-c003-2
  name: 'C003.2 Config: Guardrails for high-risk advice'
  description: Implementing guardrails for advice generation. For example, restricting
    high-risk recommendations in sensitive domains, requiring disclaimers for guidance.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-c003
  hasTypicalEvidence: Screenshot of system prompts, guardrail rules, or domain restrictions
    showing safety controls on advice generation - may include defensive prompting,
    domain-specific output restrictions (e.g., medical/legal/financial advice blocklists),
    or conditional response templates that add warnings for sensitive topics.
- id: aiuc1-ctrl-c003-3
  name: 'C003.3 Config: Guardrails for biased outputs'
  description: Implementing bias detection and mitigation controls. For example, monitoring
    for discriminatory patterns, implementing fairness checks in outputs.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - 'Eng: LLM output filtering logic'
  hasRequirement: aiuc1-req-c003
  hasTypicalEvidence: Documentation of bias eval results testing for stereotypical
    responses across demographic attributes, manual review logs documenting bias assessments,
    or output filtering rules blocking discriminatory patterns - may include automated
    fairness evaluation tools or bias monitoring dashboards if implemented.
- id: aiuc1-ctrl-c003-4
  name: 'C003.4 Documentation: Filtering performance benchmarks'
  description: Evaluating harm mitigation controls using performance metrics.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-c003
  hasTypicalEvidence: Test results, metrics dashboard, or evaluation report showing
    performance of harm controls - may include false positive/negative rates, coverage
    analysis of test scenarios, benchmark results against harm datasets (e.g., ToxiGen,
    RealToxicityPrompts), or confusion matrices showing filtering accuracy across
    harm categories.
- id: aiuc1-ctrl-c004-1
  name: 'C004.1 Config: out-of-scope guardrails'
  description: Detecting and blocking out-of-scope requests. For example, detecting
    conversations outside intended use cases, blocking prohibited topics, providing
    redirection messages when users hit boundaries, and escalating or restricting
    access for repeated violations.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-c004
  hasTypicalEvidence: Screenshot of blocking rules, defensive prompting, or filtering
    configuration showing how out-of-scope requests are detected and handled - may
    include topic blocklists, redirection message templates, escalation rules for
    repeated attempts, or system prompts defining allowed topics.
- id: aiuc1-ctrl-c004-2
  name: 'C004.2 Logs: Out-of-scope attempts'
  description: Tracking out-of-scope violations and updating boundaries. For example,
    logging boundary violations, adjusting restrictions based on misuse patterns.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Logs
  hasRequirement: aiuc1-req-c004
  hasTypicalEvidence: Logs showing out-of-scope attempts with frequency data. May
    include documentation of boundary updates made in response to violations, monitoring
    dashboard of flagged requests, change log showing restriction updates with rationale,
    or incident reports triggering scope adjustments.
- id: aiuc1-ctrl-c004-3
  name: 'C004.3 Demonstration: User guidance on scope'
  description: Providing user guidance on system capabilities and limitations. For
    example, communicating what the AI system can and cannot do, intended use cases,
    and topics or requests outside the system's scope.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-c004
  hasTypicalEvidence: Screenshot of user-facing guidance explaining system capabilities
    and limitations - may include onboarding tooltips or welcome screens, help documentation
    or FAQs describing intended use, UI warnings when approaching scope boundaries,
    or published usage guidelines.
- id: aiuc1-ctrl-c005-1
  name: 'C005.1 Config: Risk detection and response'
  description: 'Implementing detection and blocking mechanisms aligned with organizational
    risk taxonomy. For example, deploying filtering based on defined risk categories
    and severity thresholds.

    - Implementing response actions for detected risks. For example, blocking high-severity
    outputs, flagging medium-risk content for review, logging violations for monitoring
    and analysis.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - 'Eng: LLM output filtering logic'
  hasRequirement: aiuc1-req-c005
  hasTypicalEvidence: Screenshot of filtering rules, system configuration, or code
    showing detection logic mapped to AI risk taxonomy categories and corresponding
    response actions per severity level - may include risk classifiers with block/flag/log
    rules, content moderation API configuration defining actions by risk type, or
    defensive prompting.
- id: aiuc1-ctrl-c005-2
  name: 'C005.2 Documentation: Human review workflows'
  description: Establishing escalation procedures for flagged high-risk content. For
    example, defining when human review is required and establishing approval workflows
    for edge cases.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-c005
  hasTypicalEvidence: Documentation or workflow configuration showing human review
    and escalation procedures for flagged content - may include runbook defining escalation
    criteria and review SLAs, workflow diagram showing approval process, or ticketing
    system configuration (Jira, Linear) with content review queues and assignment
    rules.
- id: aiuc1-ctrl-c005-3
  name: 'C005.3 Config: Automated response mechanisms'
  description: Implementing automated real-time interventions. For example, blocking
    or modifying outputs based on severity.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-c005
  hasTypicalEvidence: Screenshot of code or system configuration showing automated
    response mechanisms - may include logic blocking or modifying outputs based on
    risk scores, or dynamic warning messages triggered by content flags.
- id: aiuc1-ctrl-c006-1
  name: 'C006.1 Config: Output sanitization'
  description: Establishing output sanitization and validation procedures before presenting
    content to users. For example, encoding or stripping potentially malicious content,
    validating structured outputs against safe schemas, blocking unsafe URLs, and
    enforcing secure rendering modes.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-c006
  hasTypicalEvidence: Screenshot of code or configuration implementing output sanitization
    - may include HTML/JavaScript/shell syntax encoding functions, URL validation
    or rewriting rules blocking unsafe links, schema validation checking structured
    outputs (JSON/YAML/XML) against whitelists, CSP header configuration, or template
    rendering with auto-escaping enabled.
- id: aiuc1-ctrl-c006-2
  name: 'C006.2 Demonstration: Warning labels for untrusted content'
  description: Implementing security labeling and content handling based on trust
    level. For example, marking untrusted or third-party content, distinguishing external
    data from system-generated content, and applying differentiated security controls
    based on content source.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-c006
  hasTypicalEvidence: Screenshot of UI or code showing trust-based content handling
    - may include visual indicators marking third-party content (badges, styling,
    warning icons), metadata tags tracking content source and trust level, or code
    applying conditional security controls based on content origin (e.g., stricter
    sanitization for external sources).
- id: aiuc1-ctrl-c006-3
  name: 'C006.3 Config: Adversarial output detection'
  description: Detecting advanced output-based attack patterns. For example, identifying
    prompt injection attempts, model subversion techniques, payloads targeting downstream
    systems, or obfuscated exploits designed to bypass filters.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - 'Eng: LLM output filtering logic'
  hasRequirement: aiuc1-req-c006
  hasTypicalEvidence: Screenshot of detection rules or monitoring system identifying
    advanced attack patterns in outputs - may include pattern matching for prompt
    injection chains or jailbreak tokens, payload signature scanning detecting command
    injection or SQL queries, or anomaly detection flagging obfuscated exploits bypassing
    basic filters.
- id: aiuc1-ctrl-c007-1
  name: 'C007.1 Documentation: Definition of high-risk recommendations criteria'
  description: Defining high-risk output criteria drawing on risk taxonomy.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal policies
  hasRequirement: aiuc1-req-c007
  hasTypicalEvidence: Document or policy defining high-risk outputs requiring human
    review - should specify criteria for flagging (e.g. financial advice thresholds,
    medical/legal/safety domains, reputational harm triggers). Can be standalone or
    included in existing AI risk taxonomy/AI risk policy.
- id: aiuc1-ctrl-c007-2
  name: 'C007.2 Config: High-risk detection mechanisms'
  description: Implementing automated detection mechanisms for high-risk outputs.
    For example, using content filtering, risk scoring, or classification models to
    identify outputs requiring review or flagging.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-c007
  hasTypicalEvidence: Screenshot of detection code, configuration file, or rules engine
    showing high-risk output filtering - may include keyword lists or regex patterns
    flagging sensitive topics, scoring logic assigning risk values to recommendations,
    if/then rules defining high-risk conditions, ML model configuration (e.g., classification
    thresholds in config.yaml), or API response showing confidence scores with risk
    thresholds.
- id: aiuc1-ctrl-c007-3
  name: 'C007.3 Documentation: Human review workflows'
  description: Establishing human review workflows for flagged high-risk outputs.
    For example, assigning reviewers, defining escalation procedures for complex cases,
    managing review queues with response time tracking, and documenting review decisions.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-c007
  hasTypicalEvidence: Workflow documentation or ticketing system configuration showing
    human review process for flagged outputs - may include runbook with reviewer assignments
    and escalation paths, queue management in Jira/Linear/support ticketing with pending
    review tracking, SLA targets for review response times, or procedure document
    defining review decision documentation requirements.
- id: aiuc1-ctrl-c008-1
  name: 'C008.1 Logs: AI risk monitoring'
  description: Establishing ongoing monitoring of AI outputs across risk categories.
    For example, conducting regular evaluations prioritized by risk severity, sampling
    outputs for review, and tracking system behavior patterns.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  hasRequirement: aiuc1-req-c008
  hasTypicalEvidence: Screenshot of monitoring dashboard, logging system, or evaluation
    reports showing ongoing AI output tracking - may include output sampling logs
    with review results, behavior trace logs showing system patterns, prompt-response
    logging configuration, evaluation schedules prioritized by risk severity, or monitoring
    metrics dashboard tracking trends over time.
- id: aiuc1-ctrl-c008-2
  name: 'C008.2 Documentation: Monitoring findings'
  description: Maintaining documentation. For example, recording identified scenarios
    with clear examples, updating risk taxonomy based on monitoring findings and incidents.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Practice
  hasRequirement: aiuc1-req-c008
  hasTypicalEvidence: Document or change log showing identified risk scenarios with
    examples - may include incident reports triggering taxonomy changes, risk scenario
    database with concrete examples, or version history of risk taxonomy showing updates
    with rationale linked to monitoring findings.
- id: aiuc1-ctrl-c008-3
  name: 'C008.4 Config: Security tooling'
  description: Integrating AI output monitoring with existing security tools. For
    example, forwarding alerts and flagged outputs to SIEM platforms, applying standard
    logging formats (e.g. JSON, syslog) to support automated threat detection workflows.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Tooling
  hasRequirement: aiuc1-req-c008
  hasTypicalEvidence: Screenshot of SIEM integration, log forwarding configuration,
    or security tool settings showing AI monitoring data flowing into existing security
    infrastructure - may include Splunk/Datadog/Elastic forwarding rules for AI alerts,
    JSON/syslog format configuration for AI logs, or SIEM dashboard showing AI-related
    events alongside other security telemetry.
- id: aiuc1-ctrl-c009-1
  name: 'C009.1 Demonstration: User intervention mechanisms'
  description: 'Enabling user intervention capabilities. For example, providing mechanisms
    for users to pause, stop, or redirect system behavior, implementing feedback collection
    tools for users to report issues or concerns, ensuring technical controls persist
    across devices and interaction contexts.

    - Ensuring accessibility of feedback and intervention mechanisms. For example,
    adhering to WCAG 2.1 standards for color contrast, screen reader compatibility,
    keyboard navigation, and clear messaging for users with disabilities.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-c009
  hasTypicalEvidence: Screenshot, screen recording or voice recording demonstrating
    intervention controls (stop/pause/redirect buttons, feedback forms, issue reporting
    mechanisms) with accessibility features integrated (e.g. keyboard navigation,
    high contrast modes, screen reader labels)
- id: aiuc1-ctrl-c009-2
  name: 'C009.2 Documentation: User feedback & intervention reviews'
  description: 'Reviewing user feedback and intervention logs regularly. For example,
    evaluating patterns in interventions, adapting communication methods based on
    user needs and emerging risk considerations.

    - Analyzing collected feedback using structured methodologies. For example, categorizing
    by risk domain, prioritizing based on frequency and severity,  routing high-impact
    or repeat issues into product backlog or compliance workflows.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-c009
  hasTypicalEvidence: Logs, reports, or dashboard showing review and analysis of user
    feedback and intervention patterns - may include feedback summary reports, intervention
    frequency analysis, categorization by risk domain, documentation of system changes
    made in response to patterns, or integration with product backlog/compliance workflows.
- id: aiuc1-ctrl-c010-1
  name: 'C010.1 Report: Harmful output testing'
  description: 'Appointing qualified third-party assessors. Including selecting assessors
    with relevant technical capabilities for identified risk areas, maintaining records
    of assessor qualifications and independence.

    - Conducting regular testing. Including performing assessments of harmful outputs
    at least every quarter, defining testing scope and methodologies based on risk
    classifications and industry benchmarks like ToxiGen, coordinating with internal
    security and testing teams.

    - Maintaining documentation. Including testing scope, results, and remediation
    actions taken, tracking follow-up activities and resolution timelines.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - THIRD_PARTY_EVALS
  hasTypicalLocation:
  - Third-party evaluation report
  hasRequirement: aiuc1-req-c010
  hasTypicalEvidence: Third-party evaluation report showing harmful output testing
    - must include documentation of assessor qualifications, testing methodology and
    findings, and improvement tracking with remediation timelines and documentation.
- id: aiuc1-ctrl-c011-1
  name: 'C011.1 Report: Out-of-scope output testing'
