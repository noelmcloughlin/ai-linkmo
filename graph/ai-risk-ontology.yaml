  name: ShieldGemma 27B
  description: 'ShieldGemma 27B is a 27-billion parameter safety content moderation
    model built on Gemma 2. As the largest variant in the ShieldGemma family, it provides
    the highest accuracy for detecting sexually explicit content, dangerous content,
    hate speech, and harassment across diverse and challenging contexts. The model
