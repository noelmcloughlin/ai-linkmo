  name: 'E013.5 Documentation: Stakeholder communication procedures'
  description: Documenting communication procedures with regulatory authorities and
    stakeholders. For example, establishing protocols for regulatory reporting, stakeholder
    notifications for incidents, and procedures for authority interactions.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  hasRequirement: aiuc1-req-e013
  hasTypicalEvidence: Procedures document or communication protocols - may include
    incident reporting templates or protocols to regulatory authorities, stakeholder
    notification procedures for serious incidents, guidelines for interacting with
    competent authorities or notified bodies, or escalation procedures for regulatory
    communications.
- id: aiuc1-ctrl-e014-1
  name: E014.1 Not applicable
  description: This requirement was merged into E017 at the Q1, 2026 standard update.
    See aiuc-1.com/changelog for more information
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasRequirement: aiuc1-req-e014
  hasTypicalEvidence: Not applicable
- id: aiuc1-ctrl-e015-1
  name: 'E015.1 Config: Logging implementation'
  description: Capturing system activity details to support incident investigation
    and behavior explanation. For example, logging inputs, processing steps, outputs,
    and metadata for AI systems.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Logs
  hasRequirement: aiuc1-req-e015
  hasTypicalEvidence: Screenshot of logging code or configuration showing what system
    activity is captured - may include code logging inputs and outputs, logging configuration
    file specifying what to log, or example log entries showing captured information
    (timestamps, inputs, outputs, user actions).
- id: aiuc1-ctrl-e015-2
  name: 'E015.2 Config: Log storage'
  description: Implementing log storage with appropriate retention periods, access
    controls, and data sanitation to support auditing and incident response.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Logs
  - Engineering Tooling
  hasRequirement: aiuc1-req-e015
  hasTypicalEvidence: Screenshot of log storage system showing retention policies,
    access controls and sanitation practices - may include log management platform
    (Datadog, Splunk, CloudWatch) with retention period settings and PII-masking,
    access control configuration showing who can view logs, or storage settings with
    automatic deletion rules.
- id: aiuc1-ctrl-e015-3
  name: 'E015.3 Config: Log integrity protection'
  description: Implementing technical controls to ensure logs are tamper-evident and
    independently verifiable. For example, ensuring that captured records cannot be
    modified or deleted after creation, ensuring sequence integrity so that gaps,
    omissions, and reordering are detectable during incident investigation or audit.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Logs
  - Engineering Code
  hasRequirement: aiuc1-req-e015
  hasTypicalEvidence: Screenshot or documentation of log immutability controls - for
    example, write-once-read-many (WORM) storage configuration, cryptographic hashing
    of log entries, append-only database settings, or third-party log management platform
    features.
- id: aiuc1-ctrl-e016-1
  name: 'E016.1 Demonstration: Text AI disclosure'
  description: Implementing AI disclosure for text-based interactions. For example,
    displaying clear notices when users interact with AI chatbots, virtual assistants,
    or automated messaging systems.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-e016
  hasTypicalEvidence: Screenshot of text-based AI disclosure - may include chatbot
    interface with 'You're chatting with AI' notice, messaging system showing AI agent
    identifier, website chat widget with AI disclosure banner, or automated email/SMS
    with AI generation notice.
- id: aiuc1-ctrl-e016-2
  name: 'E016.2 Demonstration: Voice AI disclosure'
  description: Implementing AI disclosure for voice-based interactions. For example,
    providing audio notifications at the beginning of voice calls or interactions.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-e016
  hasTypicalEvidence: Screenshot of transcript or audio recording of voice AI disclosure.
- id: aiuc1-ctrl-e016-3
  name: 'E016.3 Demonstration: Labelling AI-generated content'
  description: Labelling AI-generated media and documents in a machine-readable and
    detectable format. For example, marking AI-generated images, videos, audio, or
    documents with metadata, watermarks, or labels indicating artificial generation.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-e016
  hasTypicalEvidence: Screenshot showing AI generation labeling implementation - may
    include Content Credentials or C2PA metadata embedded in files, visible watermarking
    system with AI generation marks, classifier output detecting and flagging AI-generated
    content, or metadata tagging system marking files as artificially generated.
- id: aiuc1-ctrl-e016-4
  name: 'E016.4 Demonstration: Automation AI disclosure'
  description: Disclosing when autonomous AI agents or automated workflows are performing
    actions. For example, notifying users when AI systems are making decisions, processing
    requests, or executing tasks without human oversight.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-e016
  hasTypicalEvidence: Screenshot showing AI automation disclosure in product - may
    include 'Powered by AI' or 'AI Agent' labels in interface, workflow dashboard
    displaying AI-automated tasks, status indicators showing 'AI is handling this'
    or 'Automated by AI', or notification messages stating AI agent completed your
    request.
- id: aiuc1-ctrl-e016-5
  name: 'E016.5 Demonstration: System response to AI inquiry'
  description: Establishing reactive disclosure capabilities when users ask if they
    are interacting with AI.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Product
  hasRequirement: aiuc1-req-e016
  hasTypicalEvidence: Screenshot of chatbot or voice agent transcript responding to
    'Are you AI?'
- id: aiuc1-ctrl-e017-1
  name: 'E017.1 Documentation: Transparency policy'
  description: Establishing a transparency policy defining documentation requirements
    for major AI systems. For example, specifying required documentation elements,
    establishing documentation standards.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Internal policies
  hasRequirement: aiuc1-req-e017
  hasTypicalEvidence: Policy document defining transparency documentation requirements
    - may include criteria for systems requiring documentation, required documentation
    elements (capabilities, limitations, use cases, risks), or documentation standards
    and templates.
- id: aiuc1-ctrl-e017-2
  name: 'E017.2 Documentation: Model cards and system documentation'
  description: Creating transparency documentation for major AI systems. For example,
    documenting system characteristics, data provenance, and model behavior for systems
    meeting documentation criteria.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-e017
  hasTypicalEvidence: Transparency documentation artifacts - may include model card
    (PDF, Markdown, web page) with system capabilities/limitations/intended use, datasheet
    showing training data sources and characteristics, interpretability report with
    example inputs/outputs and decision explanations, technical documentation describing
    model architecture and performance metrics, or an AI Bill of Materials (may follow
    CycloneDX or SPDX 3.0)
- id: aiuc1-ctrl-e017-3
  name: 'E017.3 Documentation: Transparency report sharing policy'
  description: 'Defining policies for sharing transparency documentation with external
    stakeholders. For example, establishing when reports are shared, specifying recipient
    categories, determining what information is disclosed to each stakeholder type.

    - Documenting sharing procedures including approval workflows, version control,
    and distribution tracking. For example, establishing approval requirements before
    external sharing, maintaining version control of shared documents, tracking which
    stakeholders received which versions.'
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - OPERATIONAL_PRACTICES
  hasTypicalLocation:
  - Internal processes
  - Internal policies
  hasRequirement: aiuc1-req-e017
  hasTypicalEvidence: Policy document defining transparency sharing practices - may
    include sharing triggers, recipient categories with disclosure levels (regulators,
    customers, affected parties, public), or matrix mapping stakeholder types to shared
    documentation (model cards, datasheets, performance reports, incident summaries).
- id: aiuc1-ctrl-f001-1
  name: 'F001.1 Documentation: Foundation model cyber capabilities'
  description: Results of testing from foundation model developer on offensive cyber
    capabilities and mitigations.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Vendor Contracts
  hasRequirement: aiuc1-req-f001
  hasTypicalEvidence: Provider model cards, cybersecurity assessment reports from
    model developers, or foundation model documentation describing offensive cyber
    capabilities and mitigations
- id: aiuc1-ctrl-f001-2
  name: 'F001.2 Config: Cyber use detection'
  description: Implementing malicious use detection and blocking. For example, deploying
    available content filtering to detect requests for malicious code generation,
    attack planning, and vulnerability exploitation guidance, configuring automated
    blocking of cyber attack assistance requests, maintaining databases of prohibited
    use patterns.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-f001
  hasTypicalEvidence: Content filtering rules blocking cyber attack requests, keyword
    or pattern matching detecting malicious code generation attempts, automated blocking
    configuration for exploit development queries, or prohibited use pattern database.
- id: aiuc1-ctrl-f002-1
  name: 'F002.1 Documentation: Foundation model CBRN capabilities'
  description: Results of testing from foundation model developer on CBRN capabilities
    and mitigations.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityObligation
  hasControlApplication: CORE
  hasEvidenceCategory:
  - LEGAL_POLICIES
  hasTypicalLocation:
  - Vendor Contracts
  hasRequirement: aiuc1-req-f002
  hasTypicalEvidence: List of foundation models used with CBRN capability information
    - may include provider model cards with CBRN assessments, weapons of mass destruction
    risk evaluations from model developers, or other documentation describing CBRN-related
    capabilities and mitigations.
- id: aiuc1-ctrl-f002-2
  name: 'F002.2 Config: Catastrophic misuse monitoring'
  description: Establishing catastrophic misuse monitoring. For example, monitoring
    AI system interactions for patterns indicating weapons development or mass harm
    intent, implementing real-time alerting for detected catastrophic misuse attempts,
    documenting suspicious queries and system responses.
  isDefinedByTaxonomy: aiuc1
  type: ControlActivityRecommendation
  hasControlApplication: SUPPLEMENTAL
  hasEvidenceCategory:
  - TECHNICAL_IMPLEMENTATION
  hasTypicalLocation:
  - Engineering Code
  hasRequirement: aiuc1-req-f002
  hasTypicalEvidence: Monitoring dashboard or alert configuration for catastrophic
    misuse patterns - may include usage monitoring flagging CBRN-related queries,
    alert rules for weapons development patterns, logs of detected and blocked catastrophic
    misuse attempts, or incident records documenting suspicious CBRN-related interactions.

