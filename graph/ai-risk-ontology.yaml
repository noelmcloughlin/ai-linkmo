  - mit-ai-risk-subdomain-7.4
  - credo-risk-007
  broad_mappings:
  - nist-information-security
  isDefinedByTaxonomy: ibm-risk-atlas
  isPartOf: ibm-risk-atlas-explainability
  type: Risk
  tag: unreliable-source-attribution
  risk_type: output
  descriptor:
  - specific to generative AI
  - amplified by synthetic data
  concern: Low-quality attributions make it difficult for users, model validators,
    and auditors to understand and trust the model. The use of synthetic data can
    complicate source attribution, as the model may be unable to identify synthetic
    data or accurately identify the original source of the synthetic data, potentially
    leading to incorrect or misleading attributions.
- id: atlas-temporal-gap
  name: Temporal gap
  description: Temporal gaps in synthetic data refer to the discrepancies between
    the constantly evolving real-world data and the fixed conditions that are captured
    by synthetic data. Temporal gaps potentially cause synthetic data to become outdated
    or obsolete over time. Gaps arise because synthetic data is generated from seed
    data that is tied to a specific point in time, which limits its ability to reflect
    ongoing changes.
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/temporal-gap.html
  dateCreated: 2025-10-10
  dateModified: 2025-10-13
  isDefinedByTaxonomy: ibm-risk-atlas
  isPartOf: ibm-risk-atlas-governance
  type: Risk
  tag: temporal-gap
  risk_type: non-technical
  descriptor:
  - amplified by synthetic data
  concern: Temporal gaps in synthetic data can render it outdated or obsolete as real-world
    conditions evolve, leading to mismatches between current realities and the assumptions
    embedded in the data, potentially compromising model performance, accuracy and
    relevance. However, in prioritizing current realities, there is also a risk of
    erasing historical or cultural contexts, highlighting the need to strike a balance
    between adapting to evolving conditions and preserving valuable knowledge and
    perspectives.
- id: atlas-lack-domain-expertise
  name: Lack of domain expertise
  description: A lack of domain expertise occurs when synthetic data generation processes
    do not involve sufficient consultation with domain experts. This results in a
    lack of understanding of the specific requirements and nuances of the domain.
    This can also lead to synthetic data that may not accurately capture the complexities
    and challenges of a real-world scenario.
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/lack-domain-expertise.html
  dateCreated: 2025-10-10
  dateModified: 2025-10-10
  isDefinedByTaxonomy: ibm-risk-atlas
  isPartOf: ibm-risk-atlas-governance
  type: Risk
  tag: lack-domain-expertise
  risk_type: non-technical
  descriptor:
  - specific to synthetic data
  concern: Lack of domain expertise can lead to AI models that are not well-suited
    to address the specific challenges and needs of a particular domain or generalize
    effectively to real-world scenarios, potentially resulting in poor model performance,
    reduced model accuracy, and decreased predictive power.
- id: atlas-exclusion
  name: Exclusion
  description: Exclusion refers to the risk that synthetic data generation processes
    may overlook or fail to consult with marginalized populations. Such exclusion
    results in synthetic data that does not accurately represent their experiences,
    needs, or perspectives.
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/exclusion.html
  dateCreated: 2025-10-10
  dateModified: 2025-10-10
  isDefinedByTaxonomy: ibm-risk-atlas
  isPartOf: ibm-risk-atlas-societal-impact
  type: Risk
  tag: exclusion
  risk_type: non-technical
  descriptor:
  - specific to synthetic data
  concern: Exclusion can lead to unfair model outcomes, erosion of trust, and potential
    harm to marginalized groups, as the synthetic data used to train foundation models
    may perpetuate existing biases and inequalities, potentially resulting in discriminatory
    outcomes, the exacerbation of social and economic disparities, and the erosion
    of trust in AI systems among marginalized communities.
- id: atlas-overfitting
  name: Overfitting
  description: Overfitting occurs when a model or algorithm memorizes and fits too
    closely or exactly to its training data. Overfitting results in a model that might
    not be able to make accurate predictions or conclusions from any data other than
    the training data and potentially fails in unexpected scenarios. Overfitting is
    also related to model collapse, which involves repeatedly training generative
    models on synthetic data that is generated with LLMs causing the model to lose
    information and become less accurate.
  url: https://www.ibm.com/docs/en/watsonx/saas?topic=SSYOK8/wsj/ai-risk-atlas/overfitting.html
  dateCreated: 2025-10-10
  dateModified: 2025-10-13
  isDefinedByTaxonomy: ibm-risk-atlas
  isPartOf: ibm-risk-atlas-accuracy
  type: Risk
  tag: overfitting
  risk_type: training-data
  descriptor:
  - amplified by synthetic data
  concern: Overfitting to synthetic data can undermine the broad applicability and
    adaptability of foundation models, which are designed to be general-purpose and
    widely applicable. If a foundation model overfits to the synthetic data, it may
    fail to perform well in diverse real-world scenarios, limiting its potential to
    provide value and support decision-making in a wide range of contexts. This raises
    the need to negotiate issues with alignment or contextual relevance for model
    use and balance the benefits of fine-tuning with the risks of overfitting.
- id: principle-oecd-inclusive-growth
  name: Inclusive growth, sustainable development and well-being (Principle 1.1)
  description: 'This Principle highlights the potential for trustworthy AI to contribute
    to overall growth and prosperity for all – individuals, society, and planet –
    and advance global development objectives.

    Stakeholders should proactively engage in responsible stewardship of trustworthy
    AI in pursuit of beneficial outcomes for people and the planet, such as augmenting
    human capabilities and enhancing creativity, advancing inclusion of underrepresented
    populations, reducing economic, social, gender and other inequalities, and protecting
    natural environments, thus invigorating inclusive growth, well-being, sustainable
    development and environmental sustainability.'
  hasDocumentation:
  - doc-oecd-ai-principles
  type: Principle
- id: principle-oecd-human-rights
  name: Human rights and democratic values, including fairness and privacy (Principle
    1.2)
  description: 'AI systems should be designed in a way that respects the rule of law,
    human rights, democratic values and diversity, and should include appropriate
    safeguards to ensure a fair and just society.

    AI actors should respect the rule of law, human rights, democratic and human-centred
    values throughout the AI system lifecycle. These include non-discrimination and
    equality, freedom, dignity, autonomy of individuals, privacy and data protection,
    diversity, fairness, social justice, and internationally recognised labour rights.
    This also includes addressing misinformation and disinformation amplified by AI,
    while respecting freedom of expression and other rights and freedoms protected
    by applicable international law.

    To this end, AI actors should implement mechanisms and safeguards, such as capacity
    for human agency and oversight, including to address risks arising from uses outside
    of intended purpose, intentional misuse, or unintentional misuse in a manner appropriate
    to the context and consistent with the state of the art.'
  hasDocumentation:
  - doc-oecd-ai-principles
  type: Principle
- id: principle-oecd-transparency
  name: Transparency and explainability (Principle 1.3)
  description: 'This principle is about transparency and responsible disclosure around
    AI systems to ensure that people understand when they are engaging with them and
    can challenge outcomes.

    AI Actors should commit to transparency and responsible disclosure regarding AI
    systems. To this end, they should provide meaningful information, appropriate
    to the context, and consistent with the state of art: to foster a general understanding
    of AI systems, including their capabilities and limitations, to make stakeholders
    aware of their interactions with AI systems, including in the workplace, where
    feasible and useful, to provide plain and easy-to-understand information on the
    sources of data/input, factors, processes and/or logic that led to the prediction,
    content, recommendation or decision, to enable those affected by an AI system
    to understand the output, and, to provide information that enable those adversely
    affected by an AI system to challenge its output.'
  hasDocumentation:
  - doc-oecd-ai-principles
  type: Principle
- id: principle-oecd-robustness
  name: Robustness, security and safety (Principle 1.4)
  description: 'AI systems must function in a robust, secure and safe way throughout
    their lifetimes, and potential risks should be continually assessed and managed.

    AI systems should be robust, secure and safe throughout their entire lifecycle
    so that, in conditions of normal use, foreseeable use or misuse, or other adverse
    conditions, they function appropriately and do not pose unreasonable safety and/or
    security risks.

    Mechanisms should be in place, as appropriate, to ensure that if AI systems risk
    causing undue harm or exhibit undesired behaviour, they can be overridden, repaired,
    and/or decommissioned safely as needed.

    Mechanisms should also, where technically feasible, be in place to bolster information
    integrity while ensuring respect for freedom of expression.'
  hasDocumentation:
  - doc-oecd-ai-principles
  type: Principle
- id: principle-oecd-accountability
  name: Accountability (Principle 1.5)
  description: 'Organisations and individuals developing, deploying or operating AI
    systems should be held accountable for their proper functioning in line with the
    OECD’s values-based principles for AI.

    AI actors should be accountable for the proper functioning of AI systems and for
    the respect of the above principles, based on their roles, the context, and consistent
    with the state of the art.

    To this end, AI actors should ensure traceability, including in relation to datasets,
    processes and decisions made during the AI system lifecycle, to enable analysis
    of the AI system’s outputs and responses to inquiry, appropriate to the context
    and consistent with the state of the art.

    AI actors, should, based on their roles, the context, and their ability to act,
    apply a systematic risk management approach to each phase of the AI system lifecycle
    on an ongoing basis and adopt responsible business conduct to address risks related
    to AI systems, including, as appropriate, via co-operation between different AI
    actors, suppliers of AI knowledge and AI resources, AI system users, and other
    stakeholders. Risks include those related to harmful bias, human rights including
    safety, security, and privacy, as well as labour and intellectual property rights.'
  hasDocumentation:
  - doc-oecd-ai-principles
  type: Principle
