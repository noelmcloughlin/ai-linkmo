  name: Chief risk officer
  description: AGI labs should have a chief risk officer (CRO), i.e. a senior executive
    who is responsible for risk management.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-Schuett2023
- id: A0275_EU_AI_Office2025
  name: Systemic Risk Responsibility Allocation
  description: Signatories commit to (1) clearly defining and allocating responsibilities
    for managing systemic risk from their GPAISRs across all levels of the organisation;
    (2) allocating appropriate resources to actors who have been assigned responsibilities
    for managing systemic risk; and (3) promoting a healthy risk culture.
  isCategorizedAs:
  - mit-draft-ai-risk-mitigation-group-1.1
  type: Action
  hasDocumentation:
  - doc-EU AI Office2025
